<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    body { background: #060a14; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <div class="max-w-3xl mx-auto px-5 py-10">
    <header class="flex items-center justify-between mb-8">
      <div>
        <div class="text-xs uppercase tracking-widest text-indigo-400 mono" data-i18n="poc_badge"></div>
        <h1 class="text-2xl sm:text-3xl font-bold mt-1">{{H1}}</h1>
        <p class="text-slate-400 mt-2 text-sm">{{TAGLINE}}</p>
      </div>
      <div class="text-xs text-slate-500 flex flex-col gap-1 items-end">
        <a id="langToggle" class="underline hover:text-indigo-300 cursor-pointer">EN / ES</a>
        <a href="{{BASE}}dashboard" class="underline hover:text-indigo-300" data-i18n="nav_historial"></a>
        <a href="{{BASE}}privacidad" class="underline hover:text-indigo-300" data-i18n="nav_privacidad"></a>
      </div>
    </header>

    <!-- Token -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <label class="block text-sm font-semibold mb-1" data-i18n="token_label"></label>
      <input id="jwt" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 mono text-sm" placeholder="eyJ…">
      <p class="text-xs text-slate-500 mt-1" data-i18n="token_hint"></p>
    </section>

    <!-- Horse -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <h2 class="text-sm font-semibold mb-3 text-indigo-300" data-i18n="horse_section"></h2>
      <select id="horseSel" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3">
        <option value="" data-i18n="horse_select"></option>
      </select>
      <details class="text-sm">
        <summary class="cursor-pointer text-slate-400" data-i18n="horse_new"></summary>
        <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-3">
          <input id="hName" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm" data-i18n-ph="horse_name">
          <input id="hBreed" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm" data-i18n-ph="horse_breed">
        </div>
        <button id="createHorse" class="mt-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg px-4 py-2 text-sm font-semibold" data-i18n="horse_create_btn"></button>
      </details>
    </section>

    <!-- Upload -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <h2 class="text-sm font-semibold mb-3 text-indigo-300" data-i18n="upload_section"></h2>
      <input id="wav" type="file" accept=".wav,audio/wav,audio/x-wav" class="w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-indigo-600 file:text-white">
      <p class="text-xs text-slate-500 mt-2" data-i18n="upload_hint"></p>
      <button id="analyze" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 rounded-lg px-4 py-3 font-semibold" data-i18n="analyze_btn"></button>
      <p id="status" class="text-xs text-slate-400 mt-2 mono"></p>
    </section>

    <!-- Result card -->
    <section id="result" class="hidden bg-slate-900 border border-slate-700 rounded-xl p-6 mb-5">
      <h2 class="text-lg font-bold mb-4" data-i18n="result_title"></h2>
      <div id="verdictBadge" class="inline-block px-3 py-1 rounded-full text-sm font-bold mb-4"></div>
      <p id="recommendation" class="text-slate-300 text-sm mb-5"></p>
      <div class="grid grid-cols-3 gap-3 text-center">
        <div class="bg-slate-950 rounded-lg p-3">
          <div class="text-2xl font-bold mono" id="mCadence">—</div>
          <div class="text-xs text-slate-500 mt-1" data-i18n="metric_cadence"></div>
        </div>
        <div class="bg-slate-950 rounded-lg p-3">
          <div class="text-2xl font-bold mono" id="mCv">—</div>
          <div class="text-xs text-slate-500 mt-1" data-i18n="metric_cv"></div>
        </div>
        <div class="bg-slate-950 rounded-lg p-3">
          <div class="text-2xl font-bold mono" id="mBeats">—</div>
          <div class="text-xs text-slate-500 mt-1" data-i18n="metric_beats"></div>
        </div>
      </div>
    </section>

    <footer class="text-center text-xs text-slate-600 mt-10">Digit2AI · {{TITLE}}</footer>
  </div>

  <script>window.__I18N = {{DICT_JSON}}; window.__BASE = "{{BASE}}"; window.__LANG = "{{LANG}}";</script>
  <script src="{{BASE}}app.js"></script>
</body>
</html>
