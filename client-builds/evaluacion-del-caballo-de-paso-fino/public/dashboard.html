<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="{{BASE}}equimind-icon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}equimind-apple-180.png">
<link rel="manifest" href="{{BASE}}manifest.webmanifest">
<meta name="theme-color" content="#0E120F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EquiMind">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{BASE}}equimind-theme.css">
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    body { background: #060a14; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <script>if(/[?&]embed=1/.test(location.search)){var _st=document.createElement('style');_st.textContent='header{display:none!important}';document.head.appendChild(_st);}</script>
  <div class="max-w-4xl mx-auto px-5 py-10">
    <header class="flex items-center justify-between mb-8">
      <div>
        <div class="text-xs uppercase tracking-widest text-indigo-400 mono" data-i18n="poc_badge"></div>
        <h1 class="text-2xl sm:text-3xl font-bold mt-1" data-i18n="history_title"></h1>
      </div>
      <div class="text-xs text-slate-500 flex flex-col gap-1 items-end">
        <a id="langToggle" class="underline hover:text-indigo-300 cursor-pointer">EN / ES</a>
        <a href="{{BASE}}juez" class="text-indigo-300 font-semibold hover:text-indigo-200" data-i18n="nav_juez"></a>
        <a href="{{BASE}}" class="underline hover:text-indigo-300" data-i18n="nav_evaluar"></a>
        <a href="{{BASE}}privacidad" class="underline hover:text-indigo-300" data-i18n="nav_privacidad"></a>
      </div>
    </header>

    <!-- Mis análisis Caballo de Paso (permalinks -> informe completo) -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-8">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold" data-i18n="hist_mine_title"></h2>
        <a href="{{BASE}}juez" target="_blank" rel="noopener" class="text-xs text-indigo-300 underline" data-i18n="act_new_analysis"></a>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b border-slate-800">
            <th class="py-2 pr-4" data-i18n="col_date"></th>
            <th class="py-2 pr-4" data-i18n="col_caballo"></th>
            <th class="py-2 pr-4" data-i18n="res_modalidad"></th>
            <th class="py-2 pr-4" data-i18n="col_puntaje"></th>
            <th class="py-2 pr-4"></th>
          </tr></thead>
          <tbody id="myChampRows"></tbody>
        </table>
        <p id="myChampEmpty" class="text-slate-500 text-sm py-3" data-i18n="hist_empty"></p>
      </div>
    </section>

    <!-- Championship ranking by category -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-8">
      <h2 class="text-lg font-bold mb-3" data-i18n="rank_title"></h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm mb-4">
        <select id="rankEventoSel" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2"><option value="" data-i18n="sel_evento"></option></select>
        <select id="rankCategoriaSel" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2"><option value="" data-i18n="sel_categoria"></option></select>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b border-slate-800">
            <th class="py-2 pr-4" data-i18n="col_puesto"></th>
            <th class="py-2 pr-4" data-i18n="col_competidor"></th>
            <th class="py-2 pr-4" data-i18n="col_caballo"></th>
            <th class="py-2 pr-4" data-i18n="col_puntaje"></th>
            <th class="py-2 pr-4" data-i18n="col_obs"></th>
          </tr></thead>
          <tbody id="rankRows"></tbody>
        </table>
        <p id="rankEmpty" class="text-slate-500 text-sm py-3" data-i18n="rank_pick"></p>
      </div>
    </section>

    <!-- Coach de Salto (Jump Coach) history -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-8">
      <h2 class="text-lg font-bold mb-3" data-i18n="jump_hist_title"></h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b border-slate-800">
            <th class="py-2 pr-4" data-i18n="col_date"></th>
            <th class="py-2 pr-4" data-i18n="col_file"></th>
            <th class="py-2 pr-4" data-i18n="col_duration"></th>
            <th class="py-2 pr-4" data-i18n="col_apex"></th>
            <th class="py-2 pr-4" data-i18n="col_faults"></th>
          </tr></thead>
          <tbody id="jumpRows"></tbody>
        </table>
        <p id="jumpEmpty" class="text-slate-500 text-sm py-3" data-i18n="jump_hist_empty"></p>
      </div>
    </section>

    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <select id="horseSel" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm">
        <option value="" data-i18n="horse_select"></option>
      </select>
    </section>

    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-slate-500 border-b border-slate-800">
            <th class="py-2 pr-4" data-i18n="col_date"></th>
            <th class="py-2 pr-4" data-i18n="col_cadence"></th>
            <th class="py-2 pr-4" data-i18n="col_cv"></th>
            <th class="py-2 pr-4" data-i18n="col_beats"></th>
            <th class="py-2 pr-4" data-i18n="col_verdict"></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <p id="empty" class="text-slate-500 text-sm py-4 hidden" data-i18n="history_empty"></p>
    </section>
  </div>

  <script>window.__I18N = {{DICT_JSON}}; window.__BASE = "{{BASE}}"; window.__LANG = "{{LANG}}"; window.__PAGE = "dashboard";</script>
  <script src="{{BASE}}app.js"></script>
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("{{BASE}}sw.js").catch(function(){});});}</script>
</body>
</html>
