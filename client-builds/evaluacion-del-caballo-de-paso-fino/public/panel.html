<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="{{BASE}}equimind-icon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}equimind-apple-180.png">
<link rel="manifest" href="{{BASE}}manifest.webmanifest">
<meta name="theme-color" content="#0E120F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EquiMind">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{BASE}}equimind-theme.css">
  <style>
    body{background:#0E120F}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:#98A199;font-size:14px;cursor:pointer}
    .navitem:hover{background:#1c2420;color:#ECE6DA}
    .navitem.active{background:linear-gradient(180deg,#E6C572,#C9A24B);color:#1a140a;font-weight:600}
    .navitem .ic{width:18px;text-align:center}
    #toolFrame{width:100%;height:calc(100vh - 64px);border:0;background:#0E120F}
    @media(max-width:767px){#sidebar{position:fixed;left:-260px;top:0;bottom:0;transition:left .2s;z-index:50;box-shadow:0 0 40px rgba(0,0,0,.6)}#sidebar.open{left:0}}
    #sbBackdrop{display:none;position:fixed;inset:0;background:rgba(2,6,20,.55);z-index:49}
    #sbBackdrop.on{display:block}
  </style>
</head>
<body class="text-slate-100">
  <div class="flex min-h-screen">
    <!-- Left sidebar -->
    <aside id="sidebar" class="w-[240px] shrink-0 bg-[#0d120d] border-r border-slate-800 flex flex-col">
      <div class="px-4 py-4 border-b border-slate-800">
        <div class="flex items-center gap-2">
          <img src="{{BASE}}equimind-mark.svg" alt="EquiMind" width="28" height="28" style="width:28px;height:28px">
          <span class="text-lg font-bold" style="font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.01em">Equi<span style="color:#E6C572">Mind</span></span>
        </div>
        <div class="text-[10px] uppercase tracking-widest mono mt-2" style="color:#98A199">Paso Fino · AI Jump Coach</div>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <div class="navitem active" data-view="inicio"><span class="ic">▣</span><span data-i18n="nav_inicio"></span></div>
        <div class="navitem" data-view="juez"><span class="ic">▶</span><span data-i18n="nav_juez"></span></div>
        <div class="navitem" data-view="jump"><span class="ic">⤢</span><span data-i18n="nav_jump"></span></div>
        <div class="navitem" data-view="ranking"><span class="ic">≣</span><span data-i18n="nav_historial"></span></div>
        <div class="border-t border-slate-800 my-2"></div>
        <div class="navitem" id="navRecharge"><span class="ic">＋</span><span data-i18n="recharge"></span></div>
        <div class="navitem" id="navLogout"><span class="ic">⏻</span><span data-i18n="logout"></span></div>
      </nav>
      <div class="p-3 text-xs text-slate-600 border-t border-slate-800">Digit2AI</div>
    </aside>
    <div id="sbBackdrop"></div>

    <!-- Main -->
    <main class="flex-1 min-w-0">
      <div class="h-16 flex items-center justify-between px-5 border-b border-slate-800 bg-[#0d120d]">
        <div class="flex items-center gap-3">
          <button id="menuBtn" class="md:hidden text-slate-400 text-xl">☰</button>
          <h1 id="sectionTitle" class="font-semibold"></h1>
        </div>
        <div class="flex items-center gap-3">
          <div id="creditChip"></div>
          <a id="langToggle" class="text-xs text-slate-400 hover:text-indigo-300 cursor-pointer">EN / ES</a>
        </div>
      </div>

      <!-- Inicio (overview) -->
      <section id="viewInicio" class="p-6">
        <h2 class="text-2xl font-bold" id="hello"></h2>
        <p class="text-slate-400 mt-1" data-i18n="panel_intro"></p>
        <div class="grid sm:grid-cols-3 gap-4 mt-6">
          <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-5">
            <div class="text-xs text-slate-500" data-i18n="credits_label"></div>
            <div class="text-3xl font-extrabold mono text-emerald-400 mt-1"><span id="ovCredits">—</span></div>
            <button class="mt-3 text-xs px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white" id="ovRecharge" data-i18n="recharge"></button>
          </div>
          <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 cursor-pointer hover:border-indigo-500" data-go="juez">
            <div class="font-semibold" data-i18n="tool_juez_t"></div>
            <div class="text-xs text-slate-400 mt-1" data-i18n="tool_juez_d"></div>
            <div class="text-indigo-300 text-sm mt-3" data-i18n="panel_open"></div>
          </div>
          <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 cursor-pointer hover:border-indigo-500" data-go="jump">
            <div class="font-semibold" data-i18n="tool_jump_t"></div>
            <div class="text-xs text-slate-400 mt-1" data-i18n="tool_jump_d"></div>
            <div class="text-indigo-300 text-sm mt-3" data-i18n="panel_open"></div>
          </div>
          <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 cursor-pointer hover:border-indigo-500" data-go="ranking">
            <div class="font-semibold" data-i18n="tool_rank_t"></div>
            <div class="text-xs text-slate-400 mt-1" data-i18n="tool_rank_d"></div>
            <div class="text-indigo-300 text-sm mt-3" data-i18n="panel_open"></div>
          </div>
        </div>

        <!-- Disciplinas — Próximamente -->
        <div class="mt-10 flex items-center gap-2 text-xs uppercase tracking-widest mono" style="color:#E6C572">
          <span class="w-2 h-2 rounded-full" style="background:#C9A24B"></span><span data-i18n="disc_title"></span>
        </div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-4">
          <a href="{{BASE}}coming-soon?d=jumper&lang={{LANG}}" target="_blank" rel="noopener" class="block bg-slate-900/50 border border-slate-800 hover:border-amber-500/60 rounded-2xl p-5 transition-colors">
            <div class="flex items-center justify-between mb-2"><span class="font-semibold">Jumper</span><span class="text-[10px] uppercase tracking-widest mono px-2 py-0.5 rounded-full" style="background:rgba(230,197,114,.14);color:#E6C572" data-i18n="disc_soon"></span></div>
            <div class="text-xs text-slate-400" data-i18n="disc_jumper_d"></div>
          </a>
          <a href="{{BASE}}coming-soon?d=hunter&lang={{LANG}}" target="_blank" rel="noopener" class="block bg-slate-900/50 border border-slate-800 hover:border-amber-500/60 rounded-2xl p-5 transition-colors">
            <div class="flex items-center justify-between mb-2"><span class="font-semibold">Hunter</span><span class="text-[10px] uppercase tracking-widest mono px-2 py-0.5 rounded-full" style="background:rgba(230,197,114,.14);color:#E6C572" data-i18n="disc_soon"></span></div>
            <div class="text-xs text-slate-400" data-i18n="disc_hunter_d"></div>
          </a>
          <a href="{{BASE}}coming-soon?d=ponies&lang={{LANG}}" target="_blank" rel="noopener" class="block bg-slate-900/50 border border-slate-800 hover:border-amber-500/60 rounded-2xl p-5 transition-colors">
            <div class="flex items-center justify-between mb-2"><span class="font-semibold">Ponies</span><span class="text-[10px] uppercase tracking-widest mono px-2 py-0.5 rounded-full" style="background:rgba(230,197,114,.14);color:#E6C572" data-i18n="disc_soon"></span></div>
            <div class="text-xs text-slate-400" data-i18n="disc_ponies_d"></div>
          </a>
          <a href="{{BASE}}coming-soon?d=equitation&lang={{LANG}}" target="_blank" rel="noopener" class="block bg-slate-900/50 border border-slate-800 hover:border-amber-500/60 rounded-2xl p-5 transition-colors">
            <div class="flex items-center justify-between mb-2"><span class="font-semibold">Equitation</span><span class="text-[10px] uppercase tracking-widest mono px-2 py-0.5 rounded-full" style="background:rgba(230,197,114,.14);color:#E6C572" data-i18n="disc_soon"></span></div>
            <div class="text-xs text-slate-400" data-i18n="disc_equitation_d"></div>
          </a>
        </div>
      </section>

      <!-- Tool iframe -->
      <iframe id="toolFrame" class="hidden" title="tool"></iframe>
    </main>
  </div>

  <script>window.__I18N={{DICT_JSON}};window.__BASE="{{BASE}}";window.__LANG="{{LANG}}";</script>
  <script src="{{BASE}}account.js"></script>
  <script>
  (function(){
    var I=window.__I18N||{},B=window.__BASE||'/',L=window.__LANG||'es';
    function t(k,f){return I[k]!=null?I[k]:(f||k);}
    document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(I[k]!=null)el.textContent=I[k];});
    document.getElementById('langToggle').addEventListener('click',function(){var u=new URL(location.href);u.searchParams.set('lang',L==='es'?'en':'es');location.href=u.toString();});

    var TOOLS={
      juez:{src:'juez',title:'nav_juez'},
      jump:{abs:'https://aiagent.ringlypro.com/ai-jump-coach-rider-pose-analyzer/',title:'nav_jump',needsToken:true},
      audio:{src:'',title:'nav_audio'},
      ranking:{src:'dashboard',title:'nav_historial',needsToken:true}
    };
    var frame=document.getElementById('toolFrame'), viewInicio=document.getElementById('viewInicio'), title=document.getElementById('sectionTitle');

    function setActive(view){
      document.querySelectorAll('.navitem[data-view]').forEach(function(n){ n.classList.toggle('active', n.getAttribute('data-view')===view); });
    }
    function show(view){
      if(view==='inicio'){ viewInicio.classList.remove('hidden'); frame.classList.add('hidden'); title.textContent=t('nav_inicio','Inicio'); setActive('inicio'); refreshOverview(); return; }
      var tl=TOOLS[view]; if(!tl) return;
      viewInicio.classList.add('hidden'); frame.classList.remove('hidden');
      title.textContent=t(tl.title,view); setActive(view);
      var src = tl.abs ? tl.abs : (B + tl.src);
      var base = src + (src.indexOf('?')>-1?'&':'?') + 'embed=1&lang=' + L;
      if (tl.needsToken) {
        // Sibling app on another origin: hand it a short-lived account token so
        // it can bill credits against this account.
        fetch(B+'api/v1/account/embed-token',{credentials:'same-origin'})
          .then(function(r){return r.json();})
          .then(function(j){ frame.src = base + (j && j.token ? ('&token='+encodeURIComponent(j.token)) : ''); })
          .catch(function(){ frame.src = base; });
      } else {
        frame.src = base;
      }
    }
    document.querySelectorAll('.navitem[data-view]').forEach(function(n){ n.addEventListener('click',function(){ show(n.getAttribute('data-view')); closeSidebar(); }); });
    document.querySelectorAll('[data-go]').forEach(function(c){ c.addEventListener('click',function(){ show(c.getAttribute('data-go')); }); });

    document.getElementById('navRecharge').addEventListener('click',function(){ if(window.ECPFAccount) window.ECPFAccount.openRecharge(); });
    document.getElementById('ovRecharge').addEventListener('click',function(){ if(window.ECPFAccount) window.ECPFAccount.openRecharge(); });
    document.getElementById('navLogout').addEventListener('click',function(){
      fetch(B+'api/v1/account/logout',{method:'POST',credentials:'same-origin'}).then(function(){ location.href=B+'inicio'; });
    });

    // Mobile sidebar toggle.
    var sb=document.getElementById('sidebar'), bd=document.getElementById('sbBackdrop');
    function closeSidebar(){ sb.classList.remove('open'); if(bd) bd.classList.remove('on'); }
    document.getElementById('menuBtn').addEventListener('click',function(){ var open=sb.classList.toggle('open'); if(bd) bd.classList.toggle('on', open); });
    if(bd) bd.addEventListener('click', closeSidebar);

    function refreshOverview(){
      fetch(B+'api/v1/account/config',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(j){
        if(!j.logged_in){ location.href=B+'login?next='+encodeURIComponent(location.pathname); return; }
        document.getElementById('ovCredits').textContent = j.credits!=null?j.credits:'—';
        document.getElementById('hello').textContent = (t('panel_hello','Hola')) + (j.email? (', '+j.email.split('@')[0]) : '') + '.';
      }).catch(function(){});
    }
    window.__onCreditsChanged=function(c){ var o=document.getElementById('ovCredits'); if(o)o.textContent=c; };

    // Embedded sibling apps (Jump Coach) post credit updates / recharge requests.
    window.addEventListener('message', function(ev){
      var d = ev.data || {};
      if (d.type === 'ecpf-credits' && window.ECPFAccount) { window.ECPFAccount.setCount(d.credits); var o=document.getElementById('ovCredits'); if(o)o.textContent=d.credits; }
      if (d.type === 'ecpf-recharge' && window.ECPFAccount) { window.ECPFAccount.openRecharge(); }
    });

    // Gate: require login.
    fetch(B+'api/v1/account/config',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(j){
      if(!j||!j.logged_in){ location.href=B+'login?next='+encodeURIComponent(location.pathname); return; }
      show('inicio');
    }).catch(function(){ location.href=B+'login?next='+encodeURIComponent(location.pathname); });
  })();
  </script>
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("{{BASE}}sw.js").catch(function(){});});}</script>
</body>
</html>
