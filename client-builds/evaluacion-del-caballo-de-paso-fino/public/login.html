<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="{{BASE}}equimind-icon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}equimind-apple-180.png">
<link rel="manifest" href="{{BASE}}manifest.webmanifest">
<meta name="theme-color" content="#0E120F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EquiMind">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{BASE}}equimind-theme.css">
  <style>body{background:#060a14}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center px-5 py-10">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <img src="{{BASE}}equimind-mark.svg" alt="EquiMind" width="52" height="52" style="width:52px;height:52px;margin:0 auto 10px">
      <div class="text-xs uppercase tracking-widest text-indigo-400 mono" data-i18n="auth_badge"></div>
      <h1 class="text-2xl font-bold mt-1 wordmark">Paso Fino <span style="color:#E6C572">&amp;</span> AI Jump Coach</h1>
      <p class="text-slate-400 text-sm mt-1" data-i18n="login_sub"></p>
    </div>
    <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-6">
      <h2 class="text-lg font-semibold mb-4" data-i18n="login_title"></h2>
      <label class="block text-xs text-slate-400 mb-1" data-i18n="field_email"></label>
      <input id="email" type="email" autocomplete="email" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3">
      <label class="block text-xs text-slate-400 mb-1" data-i18n="field_password"></label>
      <input id="password" type="password" autocomplete="current-password" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-2">
      <div id="msg" class="text-xs text-rose-400 min-h-[16px] mb-2"></div>
      <button id="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-lg px-4 py-3 font-semibold" data-i18n="login_btn"></button>
      <p class="text-xs text-right mt-2"><a id="forgotLink" class="text-slate-400 underline cursor-pointer" data-i18n="forgot_link"></a></p>

      <!-- Reset password (self-service) -->
      <div id="resetBox" class="hidden mt-4 pt-4 border-t border-slate-800">
        <div class="text-sm font-semibold mb-1" data-i18n="reset_title"></div>
        <p class="text-xs text-slate-500 mb-3" data-i18n="reset_sub"></p>
        <label class="block text-xs text-slate-400 mb-1" data-i18n="field_email"></label>
        <input id="rEmail" type="email" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3">
        <label class="block text-xs text-slate-400 mb-1" data-i18n="reset_new_password"></label>
        <input id="rPass" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-2">
        <div id="rMsg" class="text-xs min-h-[16px] mb-2"></div>
        <button id="rSubmit" class="w-full bg-emerald-600 hover:bg-emerald-500 rounded-lg px-4 py-2.5 font-semibold text-sm" data-i18n="reset_btn"></button>
      </div>

      <p class="text-xs text-slate-500 mt-4 text-center"><span data-i18n="login_no_account"></span> <a id="toSignup" class="text-indigo-300 underline" data-i18n="login_signup_link"></a></p>
      <p class="text-xs text-slate-600 mt-4 text-center"><a href="{{BASE}}" class="underline" data-i18n="back_home"></a></p>
    </div>
  </div>
  <script>window.__I18N={{DICT_JSON}};window.__BASE="{{BASE}}";window.__LANG="{{LANG}}";</script>
  <script>
  (function(){
    var I=window.__I18N||{},B=window.__BASE||'/';
    function t(k,f){return I[k]!=null?I[k]:(f||k);}
    document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(I[k]!=null)el.textContent=I[k];});
    var next=new URLSearchParams(location.search).get('next')||(B+'panel');
    document.getElementById('toSignup').href=B+'signup?next='+encodeURIComponent(next);
    function submit(){
      var email=document.getElementById('email').value.trim();
      var password=document.getElementById('password').value;
      var msg=document.getElementById('msg'); msg.textContent='';
      if(!email||!password){msg.textContent=t('err_fields','Completa email y contraseña.');return;}
      var b=document.getElementById('submit'); b.disabled=true; b.textContent=t('processing','Procesando…');
      fetch(B+'api/v1/account/login',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password})})
        .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
        .then(function(o){ if(!o.ok)throw new Error(o.j.error||'error'); location.href=next; })
        .catch(function(e){ msg.textContent=String(e.message||e); b.disabled=false; b.textContent=t('login_btn','Entrar'); });
    }
    document.getElementById('submit').addEventListener('click',submit);
    document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')submit();});

    // Prefill reset email from the login email; toggle the reset box.
    document.getElementById('forgotLink').addEventListener('click',function(){
      var box=document.getElementById('resetBox'); box.classList.toggle('hidden');
      if(!box.classList.contains('hidden')){ document.getElementById('rEmail').value=document.getElementById('email').value.trim(); document.getElementById('rEmail').focus(); }
    });
    function doReset(){
      var email=document.getElementById('rEmail').value.trim();
      var np=document.getElementById('rPass').value;
      var m=document.getElementById('rMsg'); m.textContent=''; m.className='text-xs min-h-[16px] mb-2 text-rose-400';
      if(!email||!np){m.textContent=t('err_fields','Completa email y contraseña.');return;}
      if(np.length<6){m.textContent=t('err_pass_short','La contraseña debe tener al menos 6 caracteres.');return;}
      var b=document.getElementById('rSubmit'); b.disabled=true; b.textContent=t('processing','Procesando…');
      fetch(B+'api/v1/account/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,new_password:np})})
        .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
        .then(function(o){
          if(!o.ok)throw new Error(o.j.error||'error');
          m.className='text-xs min-h-[16px] mb-2 text-emerald-400'; m.textContent=t('reset_done','Contraseña actualizada. Ya puedes iniciar sesión.');
          document.getElementById('email').value=email; document.getElementById('password').value=np;
        })
        .catch(function(e){ m.textContent=String(e.message||e); })
        .then(function(){ b.disabled=false; b.textContent=t('reset_btn','Restablecer contraseña'); });
    }
    document.getElementById('rSubmit').addEventListener('click',doReset);
    document.getElementById('rPass').addEventListener('keydown',function(e){if(e.key==='Enter')doReset();});
  })();
  </script>
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("{{BASE}}sw.js").catch(function(){});});}</script>
</body>
</html>
