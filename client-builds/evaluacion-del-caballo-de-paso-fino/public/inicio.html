<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#060a14}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.hero{background:radial-gradient(1200px 400px at 20% -10%,rgba(99,102,241,.25),transparent),radial-gradient(900px 400px at 90% 0%,rgba(139,92,246,.18),transparent)}</style>
</head>
<body class="text-slate-100 min-h-screen">
  <div class="hero">
  <header class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
    <div class="font-bold text-lg">Digit2AI <span class="text-indigo-300">· {{H1}}</span></div>
    <div class="flex items-center gap-3 text-sm">
      <a id="langToggle" class="text-slate-400 hover:text-indigo-300 cursor-pointer">EN / ES</a>
      <a id="loginLink" class="px-3 py-1.5 rounded-lg border border-slate-700 hover:border-indigo-500" data-i18n="login_cta"></a>
      <a id="signupLink" class="px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-semibold" data-i18n="landing_cta_signup"></a>
    </div>
  </header>

  <section class="max-w-6xl mx-auto px-6 pt-10 pb-16 grid md:grid-cols-2 gap-10 items-center">
    <div>
      <div class="text-xs uppercase tracking-widest text-indigo-400 mono" data-i18n="poc_badge"></div>
      <h1 class="text-4xl sm:text-5xl font-extrabold mt-3 leading-tight">{{H1}}</h1>
      <p class="text-slate-300 mt-4 text-lg" data-i18n="landing_hero_sub"></p>
      <div class="flex flex-wrap gap-3 mt-7">
        <a id="ctaStart" class="px-5 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold" data-i18n="landing_cta_start"></a>
        <a id="ctaPanel" class="px-5 py-3 rounded-xl border border-slate-700 hover:border-indigo-500 hidden" data-i18n="landing_cta_panel"></a>
        <a id="ctaLogin" class="px-5 py-3 rounded-xl border border-slate-700 hover:border-indigo-500" data-i18n="login_cta"></a>
      </div>
      <p class="text-xs text-slate-500 mt-4" data-i18n="landing_pricing_line"></p>
    </div>
    <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
      <div class="text-sm font-semibold text-indigo-300 mb-3" data-i18n="landing_tools_title"></div>
      <div class="space-y-3">
        <div class="flex items-start gap-3"><div class="w-9 h-9 rounded-lg bg-indigo-600/20 border border-indigo-600/40 flex items-center justify-center mono text-indigo-300">1</div><div><div class="font-semibold" data-i18n="tool_juez_t"></div><div class="text-xs text-slate-400" data-i18n="tool_juez_d"></div></div></div>
        <div class="flex items-start gap-3"><div class="w-9 h-9 rounded-lg bg-indigo-600/20 border border-indigo-600/40 flex items-center justify-center mono text-indigo-300">2</div><div><div class="font-semibold" data-i18n="tool_jump_t"></div><div class="text-xs text-slate-400" data-i18n="tool_jump_d"></div></div></div>
        <div class="flex items-start gap-3"><div class="w-9 h-9 rounded-lg bg-indigo-600/20 border border-indigo-600/40 flex items-center justify-center mono text-indigo-300">2</div><div><div class="font-semibold" data-i18n="tool_audio_t"></div><div class="text-xs text-slate-400" data-i18n="tool_audio_d"></div></div></div>
        <div class="flex items-start gap-3"><div class="w-9 h-9 rounded-lg bg-indigo-600/20 border border-indigo-600/40 flex items-center justify-center mono text-indigo-300">3</div><div><div class="font-semibold" data-i18n="tool_rank_t"></div><div class="text-xs text-slate-400" data-i18n="tool_rank_d"></div></div></div>
        <div class="flex items-start gap-3"><div class="w-9 h-9 rounded-lg bg-emerald-600/20 border border-emerald-600/40 flex items-center justify-center mono text-emerald-300">4</div><div><div class="font-semibold" data-i18n="tool_neural_t"></div><div class="text-xs text-slate-400" data-i18n="tool_neural_d"></div></div></div>
      </div>
    </div>
  </section>
  </div>

  <section class="max-w-6xl mx-auto px-6 py-14 border-t border-slate-900">
    <h2 class="text-2xl font-bold text-center mb-10" data-i18n="landing_how_title"></h2>
    <div class="grid sm:grid-cols-3 gap-6">
      <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 text-center"><div class="text-3xl font-extrabold text-indigo-300 mono">1</div><div class="font-semibold mt-2" data-i18n="how1_t"></div><div class="text-sm text-slate-400 mt-1" data-i18n="how1_d"></div></div>
      <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 text-center"><div class="text-3xl font-extrabold text-indigo-300 mono">2</div><div class="font-semibold mt-2" data-i18n="how2_t"></div><div class="text-sm text-slate-400 mt-1" data-i18n="how2_d"></div></div>
      <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 text-center"><div class="text-3xl font-extrabold text-indigo-300 mono">3</div><div class="font-semibold mt-2" data-i18n="how3_t"></div><div class="text-sm text-slate-400 mt-1" data-i18n="how3_d"></div></div>
    </div>
    <div class="text-center mt-10">
      <a id="ctaBottom" class="inline-block px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold" data-i18n="landing_cta_start"></a>
    </div>
  </section>

  <footer class="text-center text-xs text-slate-600 py-8 border-t border-slate-900">Digit2AI · {{H1}} · <a href="{{BASE}}privacidad" class="underline" data-i18n="nav_privacidad"></a></footer>

  <script>window.__I18N={{DICT_JSON}};window.__BASE="{{BASE}}";window.__LANG="{{LANG}}";</script>
  <script>
  (function(){
    var I=window.__I18N||{},B=window.__BASE||'/',L=window.__LANG||'es';
    document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(I[k]!=null)el.textContent=I[k];});
    document.getElementById('langToggle').addEventListener('click',function(){var u=new URL(location.href);u.searchParams.set('lang',L==='es'?'en':'es');location.href=u.toString();});
    var panel=B+'panel', signup=B+'signup?next='+encodeURIComponent(panel), login=B+'login?next='+encodeURIComponent(panel);
    document.getElementById('signupLink').href=signup;
    document.getElementById('loginLink').href=login;
    document.getElementById('ctaStart').href=signup;
    document.getElementById('ctaBottom').href=signup;
    document.getElementById('ctaLogin').href=login;
    document.getElementById('ctaPanel').href=panel;
    // If already logged in, surface a "Go to panel" CTA.
    fetch(B+'api/v1/account/config',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(j){
      if(j&&j.logged_in){ document.getElementById('ctaPanel').classList.remove('hidden'); document.getElementById('ctaStart').textContent=I.landing_cta_panel||'Ir al panel'; document.getElementById('ctaStart').href=panel; }
    }).catch(function(){});
  })();
  </script>
</body>
</html>
