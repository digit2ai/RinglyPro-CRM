<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="{{BASE}}equimind-icon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="{{BASE}}equimind-apple-180.png">
<link rel="manifest" href="{{BASE}}manifest.webmanifest">
<meta name="theme-color" content="#0E120F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EquiMind">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{BASE}}equimind-theme.css">
  <style>
    .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    body { background: #060a14; }
    .bar { transition: width .25s ease; }
    .timeline { position: relative; height: 38px; background:#0d1320; border:1px solid #243049; border-radius:8px; overflow:hidden; }
    .mark { position:absolute; top:0; width:2px; height:100%; }
    .mark.video { background:#38bdf8; } .mark.audio { background:#a78bfa; } .mark.both { background:#34d399; }
    .finding { border:1px solid #243049; border-left-width:4px; border-radius:10px; padding:12px 14px; background:#0d1320; }
    .finding.critical { border-left-color:#f43f5e; } .finding.high { border-left-color:#fb923c; }
    .finding.medium { border-left-color:#fbbf24; } .finding.low { border-left-color:#60a5fa; } .finding.info { border-left-color:#34d399; }
    .chip { font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.04em; }
    .chip.critical { background:#f43f5e22; color:#fda4af; } .chip.high { background:#fb923c22; color:#fdba74; }
    .chip.medium { background:#fbbf2422; color:#fde68a; } .chip.low { background:#60a5fa22; color:#bfdbfe; } .chip.info { background:#34d39922; color:#a7f3d0; }
    .dsec { border-left:2px solid #243049; padding-left:12px; }
    .dsec.critico { border-left-color:#f43f5e; } .dsec.aviso { border-left-color:#fbbf24; } .dsec.ok { border-left-color:#34d399; } .dsec.info { border-left-color:#334155; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <script>if(/[?&]embed=1/.test(location.search)){var _st=document.createElement('style');_st.textContent='header{display:none!important}';document.head.appendChild(_st);}</script>
  <div class="max-w-4xl mx-auto px-5 py-10">
    <header class="flex items-center justify-between mb-8">
      <div>
        <div class="text-xs uppercase tracking-widest text-indigo-400 mono" data-i18n="juez_badge"></div>
        <h1 class="text-2xl sm:text-3xl font-bold mt-1" data-i18n="juez_title"></h1>
        <p class="text-slate-400 mt-2 text-sm" data-i18n="juez_sub"></p>
      </div>
      <div class="text-xs text-slate-500 flex flex-col gap-2 items-end">
        <div id="creditChip"></div>
        <a id="langToggle" class="underline hover:text-indigo-300 cursor-pointer">EN / ES</a>
        <a href="{{BASE}}" class="underline hover:text-indigo-300" data-i18n="nav_audio"></a>
        <a href="{{BASE}}dashboard" class="underline hover:text-indigo-300" data-i18n="nav_historial"></a>
        <a href="{{BASE}}privacidad" class="underline hover:text-indigo-300" data-i18n="nav_privacidad"></a>
      </div>
    </header>

    <!-- Caballo: selecciona uno tuyo o registra uno nuevo -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-indigo-300" data-i18n="horse_title"></h2>
        <button id="horseNewToggle" class="text-xs bg-slate-800 hover:bg-slate-700 rounded-lg px-3 py-1.5" data-i18n="horse_add_new"></button>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
        <select id="horseSel" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2"><option value="" data-i18n="horse_pick"></option></select>
        <select id="disciplinaSel" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">
          <option value="paso_fino">Paso Fino</option><option value="trocha">Trocha</option><option value="trocha_galope">Trocha y Galope</option><option value="trote_galope">Trote y Galope</option>
        </select>
      </div>
      <!-- Alta de caballo nuevo (oculto por defecto) -->
      <div id="horseNewForm" class="hidden mt-3 grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm border-t border-slate-800 pt-3">
        <input id="hnNombre" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" data-i18n-ph="horse_f_nombre" placeholder="Nombre del caballo">
        <select id="hnSexo" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">
          <option value="" data-i18n="horse_f_sexo"></option><option value="macho">Macho</option><option value="hembra">Hembra</option><option value="castrado">Castrado</option>
        </select>
        <input id="hnCapa" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" data-i18n-ph="horse_f_capa" placeholder="Capa (color)">
        <input id="hnCriadero" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" data-i18n-ph="horse_f_criadero" placeholder="Criadero">
        <button id="hnSave" class="sm:col-span-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg px-3 py-2 font-semibold" data-i18n="horse_f_save"></button>
      </div>
      <p class="text-xs text-slate-500 mt-2" data-i18n="horse_hint"></p>
    </section>

    <!-- Carga: video + audio + superficie -->
    <section class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <h2 class="text-sm font-semibold text-indigo-300 mb-3" data-i18n="up_title"></h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1" data-i18n="up_video"></label>
          <input id="video" type="file" accept="video/mp4,video/quicktime,.mp4,.mov" class="w-full text-xs text-slate-300 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-600 file:text-white">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1" data-i18n="up_audio"></label>
          <input id="audio" type="file" accept=".wav,audio/wav" class="w-full text-xs text-slate-300 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-600 file:text-white">
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 text-sm">
        <div>
          <label class="block text-xs text-slate-400 mb-1" data-i18n="up_superficie"></label>
          <select id="superficieSel" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">
            <option value="tablado">Tablado</option><option value="arena">Arena</option><option value="asfalto">Asfalto</option><option value="tierra">Tierra</option><option value="cemento">Cemento</option>
          </select>
        </div>
      </div>
      <p class="text-xs text-slate-500 mt-2" data-i18n="up_nota"></p>
      <button id="evaluar" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 rounded-lg px-4 py-3 font-semibold disabled:opacity-50" data-i18n="up_evaluar"></button>
      <div id="progressWrap" class="hidden mt-4">
        <div class="h-2 bg-slate-800 rounded-full overflow-hidden"><div id="progressBar" class="bar h-full bg-indigo-500" style="width:0%"></div></div>
        <p id="progressMsg" class="text-xs text-slate-400 mt-2 mono"></p>
      </div>
    </section>

    <!-- Resultado del juez -->
    <section id="result" class="hidden bg-slate-900 border border-slate-700 rounded-xl p-6 mb-5">
      <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
        <div>
          <div class="text-xs text-slate-500" data-i18n="res_modalidad"></div>
          <div class="flex items-center gap-3">
            <span id="resModalidad" class="text-2xl font-bold"></span>
            <span id="resConf" class="text-sm mono text-slate-400"></span>
          </div>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500" data-i18n="res_puntaje"></div>
          <div id="resTotal" class="text-4xl font-extrabold mono text-emerald-400"></div>
          <button id="shareBtn" class="mt-2 text-xs px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-semibold hidden inline-flex items-center gap-1.5">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg>
            <span data-i18n="share_btn"></span>
          </button>
          <div id="shareMsg" class="text-xs text-emerald-400 mt-1"></div>
        </div>
      </div>
      <div id="simBanner" class="hidden mb-4 px-3 py-2 rounded-lg bg-amber-500/15 border border-amber-500/60 text-amber-200 text-sm" data-i18n="sim_banner"></div>
      <div id="resFlag" class="hidden mb-4 px-3 py-2 rounded-lg bg-rose-600/20 border border-rose-600 text-rose-300 text-sm"></div>

      <!-- Infographic dashboard (radial gauges) -->
      <div id="infographics" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4"></div>
      <!-- Cadence band meter -->
      <div id="cadenceMeter" class="mb-5"></div>

      <h3 class="text-sm font-semibold text-indigo-300 mb-2" data-i18n="res_desglose"></h3>
      <div id="breakdown" class="space-y-2 mb-5"></div>

      <h3 class="text-sm font-semibold text-indigo-300 mb-2" data-i18n="res_timeline"></h3>
      <div id="timeline" class="timeline mb-1"></div>
      <div class="text-xs text-slate-500 flex gap-4 mb-5">
        <span><span class="inline-block w-2 h-2 rounded-full" style="background:#34d399"></span> <span data-i18n="leg_both"></span></span>
        <span><span class="inline-block w-2 h-2 rounded-full" style="background:#38bdf8"></span> <span data-i18n="leg_video"></span></span>
        <span><span class="inline-block w-2 h-2 rounded-full" style="background:#a78bfa"></span> <span data-i18n="leg_audio"></span></span>
      </div>
      <video id="videoPlayer" class="w-full rounded-lg hidden" controls></video>

      <!-- Neural Intelligence: hallazgos que vigilan la marcha -->
      <div class="flex items-center justify-between mt-6 mb-2">
        <h3 class="text-sm font-semibold text-cyan-300 flex items-center gap-2">
          <span class="inline-block w-2 h-2 rounded-full bg-cyan-400"></span><span data-i18n="neural_title"></span>
        </h3>
        <span id="neuralCounts" class="text-xs mono text-slate-500"></span>
      </div>
      <p class="text-xs text-slate-500 mb-3" data-i18n="neural_sub"></p>
      <div id="neuralPanel" class="space-y-2 mb-6"></div>

      <h3 class="text-sm font-semibold text-indigo-300 mt-5 mb-1" data-i18n="res_dictamen"></h3>
      <p id="resResumen" class="text-slate-200 text-sm font-medium mb-3"></p>
      <div id="resDictamen" class="space-y-3 mb-3"></div>
      <div id="resReco" class="mb-2"></div>
      <p id="resFirma" class="text-xs text-slate-600 italic mt-3"></p>

      <!-- Compartir (enlace público al informe completo) + acciones -->
      <div class="mt-5 pt-4 border-t border-slate-800">
        <label class="block text-xs text-slate-400 mb-1" data-i18n="share_link_label"></label>
        <div class="flex gap-2">
          <input id="shareLink" readonly class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs mono text-slate-300" value="">
          <button id="shareCopy" class="text-xs px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-semibold whitespace-nowrap" data-i18n="share_copy"></button>
          <button id="shareOpen" class="text-xs px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold whitespace-nowrap" data-i18n="share_open"></button>
        </div>
        <div id="shareMsg2" class="text-xs text-emerald-400 mt-1"></div>
        <div class="flex flex-wrap gap-2 mt-4">
          <button id="newAnalysis" class="text-sm px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white font-semibold" data-i18n="act_new_analysis"></button>
          <button id="goHistory" class="text-sm px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold" data-i18n="act_view_history"></button>
        </div>
      </div>
    </section>

    <!-- Mis análisis: historial completo del cliente (permalinks -> informe completo) -->
    <section id="historySection" class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 mb-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-indigo-300" data-i18n="hist_mine_title"></h2>
        <button id="histRefresh" class="text-xs bg-slate-800 hover:bg-slate-700 rounded-lg px-3 py-1.5" data-i18n="hist_refresh"></button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b border-slate-800">
            <th class="py-2 pr-4" data-i18n="col_date"></th>
            <th class="py-2 pr-4" data-i18n="col_caballo"></th>
            <th class="py-2 pr-4" data-i18n="res_modalidad"></th>
            <th class="py-2 pr-4" data-i18n="col_puntaje"></th>
            <th class="py-2 pr-4"></th>
          </tr></thead>
          <tbody id="histRows"></tbody>
        </table>
        <p id="histEmpty" class="text-slate-500 text-sm py-3" data-i18n="hist_empty"></p>
      </div>
    </section>

    <footer class="text-center text-xs text-slate-600 mt-10">Digit2AI · {{TITLE}} &amp; <span data-i18n="brand_suffix">Entrenador de salto</span></footer>
  </div>

  <script>window.__I18N = {{DICT_JSON}}; window.__BASE = "{{BASE}}"; window.__LANG = "{{LANG}}"; window.__PAGE = "juez";</script>
  <script src="{{BASE}}account.js"></script>
  <script src="{{BASE}}juez.js"></script>
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("{{BASE}}sw.js").catch(function(){});});}</script>
</body>
</html>
