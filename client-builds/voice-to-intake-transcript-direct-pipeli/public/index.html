<!doctype html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <meta name="apple-mobile-web-app-title" content="Digit2Ai" />
  <meta name="application-name" content="Digit2Ai" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0b0f1a" />
  <link rel="manifest" href="{{MANIFEST_HREF}}" />
  <link rel="icon" type="image/png" href="https://assets.cdn.filesafe.space/3lSeAHXNU9t09Hhp9oai/media/6a3feadac408020f97ca4060.png" />
  <link rel="apple-touch-icon" href="https://assets.cdn.filesafe.space/3lSeAHXNU9t09Hhp9oai/media/6a3feadac408020f97ca4060.png" />
  <script>window.__VTI_BASE = '{{BASE}}';</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg:#0b0f1a; --bg2:#0d1320; --card:#141b29; --line:#243049; --txt:#e9eef7; --mut:#8a98b0; --acc:#6a4bff; --green:#36d399; }
    body { background:var(--bg); color:var(--txt); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .mic-dot { box-shadow: 0 0 0 0 rgba(106,75,255,.5); }
    .mic-dot.rec { animation: pulse 1.2s ease-in-out infinite; background:#ef4444; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)} 70%{box-shadow:0 0 0 18px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
  </style>
</head>
<body class="min-h-screen flex items-start justify-center p-4 sm:p-8">
  <main class="w-full max-w-2xl">
    <div class="flex justify-between items-center mb-6">
      <button id="inboxBtn" class="relative text-sm px-3 py-1 rounded-lg border" style="border-color:var(--line);color:var(--txt)">
        <span id="inboxTabLabel">{{INBOX_TAB}}</span>
        <span id="inboxBadge" class="absolute -top-2 -right-2 min-w-5 h-5 px-1 rounded-full text-xs font-bold flex items-center justify-center" style="background:#ef4444;color:#fff;display:none">0</span>
      </button>
      <button id="langBtn" class="text-sm px-3 py-1 rounded-lg border" style="border-color:var(--line);color:var(--txt)">{{LANG_TOGGLE}}</button>
    </div>

    <div class="flex justify-center mb-4">
      <img src="https://assets.cdn.filesafe.space/3lSeAHXNU9t09Hhp9oai/media/6a3feadac408020f97ca4060.png" alt="Digit2Ai" class="w-24 h-24 rounded-2xl" />
    </div>
    <h1 id="h1" class="text-3xl font-bold mb-2 text-center">{{H1}}</h1>
    <p id="subtitle" class="mb-6 text-center" style="color:var(--mut)">{{SUBTITLE}}</p>

    <!-- Champion install / notifications nudge (shown only when relevant) -->
    <div id="champBanner" class="rounded-2xl p-4 mb-4" style="display:none;background:rgba(106,75,255,.12);border:1px solid var(--acc)">
      <div id="champBannerText" class="text-sm mb-3" style="color:var(--txt)"></div>
      <button id="champBannerBtn" class="w-full rounded-xl py-2.5 font-semibold" style="display:none;background:var(--acc);color:#fff"></button>
    </div>

    <div id="submitView" class="rounded-2xl p-5 mb-4" style="background:var(--card);border:1px solid var(--line)">
      <div class="flex items-center gap-4 mb-4">
        <button id="micBtn" class="mic-dot w-16 h-16 rounded-full flex items-center justify-center"
                style="background:var(--acc);color:#fff" aria-label="record">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor" aria-hidden="true">
            <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-6a3.5 3.5 0 0 0-7 0v6A3.5 3.5 0 0 0 12 15z"/>
            <path d="M18 11.5a.9.9 0 0 0-1.8 0 4.2 4.2 0 0 1-8.4 0 .9.9 0 0 0-1.8 0 6 6 0 0 0 5.1 5.94V20H8.6a.9.9 0 0 0 0 1.8h6.8a.9.9 0 0 0 0-1.8H12.9v-2.56A6 6 0 0 0 18 11.5z"/>
          </svg>
        </button>
        <div>
          <div id="micLabel" class="font-semibold">{{MIC_START}}</div>
          <div id="status" class="text-sm mono" style="color:var(--mut)">&nbsp;</div>
        </div>
      </div>

      <label id="transcriptLabel" class="block text-sm mb-1" style="color:var(--mut)">{{TRANSCRIPT_LABEL}}</label>
      <textarea id="transcript" rows="6" class="mono w-full rounded-xl p-3 mb-4"
        style="background:var(--bg2);border:1px solid var(--line);color:var(--txt)"
        placeholder="{{TRANSCRIPT_PLACEHOLDER}}"></textarea>

      <!-- Auth: auto-detected CRM session token; manual paste is the fallback only. -->
      <div id="authStatus" class="text-sm mono mb-3" style="display:none"></div>
      <div id="tokenWrap" style="display:none">
        <input id="token" type="password" autocomplete="off"
          class="mono w-full rounded-xl p-2 mb-3 text-sm"
          style="background:var(--bg2);border:1px solid var(--line);color:var(--txt)"
          placeholder="{{TOKEN_PLACEHOLDER}}" />
      </div>

      <!-- Attachments: PDF / Word / text etc. uploaded alongside the request -->
      <div class="mb-3">
        <input id="fileInput" type="file" multiple
          accept=".txt,.md,.pdf,.doc,.docx,.csv,.rtf,text/plain,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/csv,application/rtf"
          style="display:none" />
        <button id="attachBtn" type="button" class="w-full rounded-xl py-2.5 text-sm font-semibold"
          style="background:var(--bg2);border:1px solid var(--line);color:var(--txt)">{{ATTACH_LABEL}}</button>
        <div id="attachHint" class="text-xs mt-1" style="color:var(--mut)">{{ATTACH_HINT}}</div>
        <div id="attachList" class="mt-2"></div>
      </div>

      <button id="sendBtn" class="w-full rounded-xl py-3 font-semibold"
        style="background:var(--green);color:#06281c">{{SEND_LABEL}}</button>
      <div id="result" class="text-sm mono mt-3" style="min-height:18px"></div>

      <!-- PoC teaser links (newest first) — the deliverables from submitted requests -->
      <div id="pocSection" class="mt-5 pt-4" style="border-top:1px solid var(--line)">
        <h3 id="pocHeading" class="text-sm font-bold mb-2" style="color:var(--mut)">{{POC_HEADING}}</h3>
        <div id="inboxList"></div>
      </div>
    </div>

    <!-- Champion Inbox: PoC teaser magic links ready to forward to the client -->
    <div id="inboxView" class="rounded-2xl p-5 mb-4" style="background:var(--card);border:1px solid var(--line);display:none">
      <div class="flex items-center justify-between mb-1">
        <h2 id="inboxHeading" class="text-xl font-bold">{{INBOX_TITLE}}</h2>
        <button id="inboxRefresh" class="text-sm px-3 py-1 rounded-lg border" style="border-color:var(--line);color:var(--mut)">↻</button>
      </div>
      <p id="inboxSub" class="text-sm mb-4" style="color:var(--mut)">{{INBOX_SUB}}</p>

      <!-- Intercom chat with the owner -->
      <div id="intercomThread" class="rounded-xl p-3 mb-2 overflow-y-auto" style="background:var(--bg2);border:1px solid var(--line);max-height:280px;min-height:90px"></div>
      <div class="flex gap-2 mb-2">
        <input id="intercomInput" class="flex-1 rounded-xl p-2 text-sm" style="background:var(--bg2);border:1px solid var(--line);color:var(--txt)" placeholder="{{INTERCOM_PLACEHOLDER}}" />
        <button id="intercomSend" class="px-4 rounded-xl font-semibold" style="background:var(--acc);color:#fff">{{INTERCOM_SEND}}</button>
      </div>
      <button id="enableNotif" class="text-sm px-3 py-2 rounded-xl border w-full" style="display:none;border-color:var(--acc);color:var(--acc)">{{ENABLE_NOTIF}}</button>
    </div>

    <p class="text-xs mono" style="color:var(--mut)">
      <span id="notSupportedHint" style="display:none">{{NOT_SUPPORTED}}</span>
    </p>
  </main>

  <script src="{{BASE}}i18n.js"></script>
  <script src="{{BASE}}app.js"></script>
</body>
</html>
