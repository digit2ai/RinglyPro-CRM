<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="RinglyPro AI Lead Collector - Business Prospecting Tool">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AI Lead Collector">

    <title>RinglyPro AI Lead Collector</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://assets.cdn.filesafe.space/3lSeAHXNU9t09Hhp9oai/media/68ec2cfb385c9833a43e685f.png">
    <link rel="apple-touch-icon" href="https://assets.cdn.filesafe.space/3lSeAHXNU9t09Hhp9oai/media/68ec2cfb385c9833a43e685f.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="business-collector-form.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D1117;
            color: #E6EDF3;
            line-height: 1.5;
            overflow: hidden;
        }

        /* ─── Two-Pane Layout ─── */
        .app-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: 100vh;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            background: #161B22;
            border-right: 1px solid #21262D;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 50;
        }
        .sidebar-logo {
            padding: 20px;
            border-bottom: 1px solid #21262D;
            text-align: center;
        }
        .sidebar-logo img {
            width: 100%;
            max-width: 180px;
            height: auto;
        }
        .sidebar-logo .badge {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            background: rgba(139,92,246,.15);
            color: #8b5cf6;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
        }
        .nav-section {
            padding: 14px 20px 6px;
            font-size: 10px;
            color: #0EA5E9;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 20px;
            font-size: 14px;
            color: #8B949E;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            border-left: 3px solid transparent;
            border-top: none; border-right: none; border-bottom: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            text-decoration: none;
        }
        .nav-item:hover { color: #E6EDF3; background: rgba(14,165,233,.08); }
        .nav-item.active { color: #fff; background: rgba(14,165,233,.13); border-left-color: #0EA5E9; }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .nav-badge {
            margin-left: auto;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid #21262D;
        }
        .sidebar-back {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 12px;
            background: none;
            border: 1px solid #30363D;
            color: #8B949E;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
            text-decoration: none;
        }
        .sidebar-back:hover { background: rgba(14,165,233,.1); border-color: #0EA5E9; color: #E6EDF3; }

        /* ─── Main Content ─── */
        .main-pane {
            height: 100vh;
            overflow: hidden;
            background: #f3f4f6;
        }
        .main-pane iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* For non-iframe content (chat, tools loaded inline) */
        .main-pane .inline-content {
            display: none;
            height: 100%;
            overflow-y: auto;
            background: #f3f4f6;
        }
        .main-pane .inline-content.active {
            display: block;
        }

        /* ─── Mobile ─── */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 60;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0EA5E9, #8b5cf6);
            color: #fff;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(14,165,233,.4);
            font-size: 22px;
            align-items: center;
            justify-content: center;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 49;
        }
        @media (max-width: 768px) {
            .app-grid { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed;
                top: 0; left: 0;
                width: 280px;
                height: 100vh;
                transform: translateX(-100%);
                z-index: 200;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .mobile-toggle { display: flex; }
        }

        /* ─── Mobile Popup Modal (for tools that open inline) ─── */
        .mobile-popup-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
        }
        .mobile-popup-modal.active { display: flex; }
        .mobile-popup-header {
            background: linear-gradient(135deg, #4F46E5, #3b82f6);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mobile-popup-header h3 { margin: 0; font-size: 1.125rem; font-weight: 600; }
        .mobile-popup-close {
            background: none; border: none; color: white;
            font-size: 2rem; cursor: pointer; padding: 0;
            width: 2.5rem; height: 2.5rem;
            display: flex; align-items: center; justify-content: center;
        }
        .mobile-popup-content { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>

<div class="app-grid">

    <button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->

            <div class="nav-section">AI TOOLS</div>

                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                AI Lead Collector
            </button>
            <button class="nav-item" onclick="openAdHocCall()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>

            <button class="nav-item" onclick="openProspectManager()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>

            </button>

            <!-- Press Release Manager - TunjoRacing only -->
            <button class="nav-item" id="pressReleaseBtn" onclick="openPressReleaseManager()" style="display:none;">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>

        <div class="sidebar-footer">

    <!-- MAIN CONTENT -->
    <div class="main-pane" id="mainPane">
        <iframe id="contentFrame" src="/webcallcenter/"></iframe>

</div>

<!-- Mobile Popup Modal -->
<div id="mobilePopupModal" class="mobile-popup-modal">
    <div class="mobile-popup-header">
        <h3 id="mobilePopupTitle">Tool</h3>
        <button class="mobile-popup-close" onclick="closeMobilePopup()">&times;</button>
    </div>
    <div id="mobilePopupContent" class="mobile-popup-content"></div>
</div>

<!-- Global Configuration -->
<script>
    const API_BASE = window.location.origin + '/api/mcp';

    // ─── Navigation ───────────────────────────
    const ROUTES = {
        'webcallcenter': '/webcallcenter/',
        'webcallcenter-calls': '/webcallcenter/calls',
        'webcallcenter-widget': '/webcallcenter/widget',
        'webcallcenter-kb': '/webcallcenter/knowledge-base',
        'webcallcenter-usage': '/webcallcenter/usage',
        'neural': '/cw_carriers/neural.html'
    };

    function navTo(view, el) {
        // Update active state
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');

        // Load in iframe
        const url = ROUTES[view];
        if (url) {
            document.getElementById('contentFrame').src = url;
        }

        closeSidebar();
    }

    // ─── Mobile Sidebar ───────────────────────
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
    }
</script>

<!-- PWA Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let r of registrations) { await r.unregister(); }
            const cacheNames = await caches.keys();
            for (let c of cacheNames) { await caches.delete(c); }
            navigator.serviceWorker.register('/mcp-copilot/sw.js?v=125')
                .then(r => { console.log('SW v125 registered:', r.scope); })
                .catch(e => { console.log('SW failed:', e); });
        });
    }
</script>

<!-- Press Release Manager & Client Manager visibility -->
<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = parseInt(urlParams.get('client_id'));
        if (clientId === 15 || clientId === 40) {
            const btn = document.getElementById('pressReleaseBtn');
            if (btn) btn.style.display = 'flex';
        }
        if (clientId === 15) {
            const btn = document.getElementById('clientManagerBtn');
            if (btn) btn.style.display = 'flex';
        }
    })();

    function openPressReleaseManager() {
        const clientId = new URLSearchParams(window.location.search).get('client_id');
        if (!clientId) { alert('Error: Missing client_id'); return; }
        window.open(`press-release-manager.html?client_id=${clientId}`, '_blank');
    }
</script>

<!-- GHL Upgrade Prompt -->
<script>
    fetch('ghl-upgrade-prompt.html')
        .then(r => r.text())
        .then(html => { const d = document.createElement('div'); d.innerHTML = html; document.body.appendChild(d); })
        .catch(e => console.error('GHL prompt error:', e));
</script>
