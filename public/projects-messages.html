<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --panel-2: #172033;
      --border: #2a3852; --text: #e2e8f0; --muted: #94a3b8;
      --accent: #2563eb; --accent-2: #7c5cff; --cyan: #22d3ee; --green: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
    }
    .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .head h1 { font-size: 18px; margin: 0; }
    .head-btns { display: flex; gap: 8px; }
    .refresh {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .refresh:hover { filter: brightness(1.08); }
    .mark-all {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .mark-all:hover { color: var(--text); border-color: var(--muted); }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .item {
      background: var(--panel); border: 1px solid var(--border);
      border-left: 4px solid var(--accent); border-radius: 10px; padding: 14px 16px;
      cursor: pointer; transition: opacity .15s, background .15s;
    }
    .item:hover { background: var(--panel-2); }
    .item.voicemail { border-left-color: var(--accent-2); }
    .item.sms       { border-left-color: var(--green); }
    .item.read { opacity: .5; }
    .item.read:hover { opacity: .72; }

    .row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .unread-dot { width: 9px; height: 9px; border-radius: 50%; background: #ef4444; display: inline-block; flex: 0 0 auto; box-shadow: 0 0 0 3px rgba(239,68,68,.18); }
    .item.read .unread-dot { display: none; }
    .kind {
      font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      background: rgba(37,99,235,.15); color: #93c5fd; padding: 2px 8px; border-radius: 6px;
    }
    .kind.voicemail { background: rgba(124,92,255,.15); color: #c4b5fd; }
    .kind.sms       { background: rgba(16,185,129,.15); color: #6ee7b7; }
    .phone { font-weight: 600; font-size: 14px; }
    .dur { font-size: 12px; color: var(--cyan); background: rgba(34,211,238,.1); padding: 2px 8px; border-radius: 10px; }
    .ts { font-size: 12px; color: var(--muted); margin-left: auto; }

    .status { flex: 0 0 auto; }
    .mark-btn {
      background: rgba(37,99,235,.14); color: #93c5fd; border: 1px solid rgba(37,99,235,.4);
      border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .mark-btn:hover { background: rgba(37,99,235,.28); color: #dbeafe; }
    .read-label { display: none; font-size: 12px; font-weight: 600; color: var(--green); }
    .item.read .mark-btn { display: none; }
    .item.read .read-label { display: inline; }

    .body { font-size: 13px; color: var(--muted); line-height: 1.5; margin-top: 4px; }
    audio { margin-top: 10px; width: 100%; height: 34px; }
    .empty, .err { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 14px; }
    .err { color: #f87171; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 48px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .item.fu { border-left-color: #f59e0b; }
    .fu-badge { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      background: rgba(245,158,11,.15); color: #fbbf24; padding: 2px 8px; border-radius: 6px; }
    .fu-btn { background: #f59e0b; color: #0f172a; border: none; border-radius: 8px; padding: 6px 14px;
      font-size: 12.5px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .fu-btn:hover { filter: brightness(1.08); }
    .fu-btn:disabled { background: rgba(16,185,129,.18); color: #10b981; cursor: default; }
    .fu-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .rm-btn { background: transparent; color: #94a3b8; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
    .rm-btn:hover { color: #e2e8f0; border-color: #475569; }
    .rm-btn.danger:hover { color: #f87171; border-color: #f87171; }
  </style>
</head>
<body>
  <div class="head">
    <h1>Calls &amp; Messages</h1>
    <div class="head-btns">
      <button class="mark-all" id="mark-all-btn">Mark all read</button>
      <button class="refresh" id="refresh-btn">&#8635; Refresh</button>
    </div>
  </div>
  <div id="list" class="list"><div class="spinner"></div></div>

  <script>
    const ORIGIN = location.origin;
    const FOLLOWUPS = new URLSearchParams(location.search).get('mode') === 'followups';
    if (FOLLOWUPS) {
      const h1 = document.querySelector('.head h1'); if (h1) h1.textContent = 'Calls To Follow Up';
      const ma = document.getElementById('mark-all-btn'); if (ma) ma.style.display = 'none';
    }

    function fmtDur(secs) {
      secs = parseInt(secs, 10) || 0;
      if (!secs) return '';
      const m = Math.floor(secs / 60), s = secs % 60;
      return `Duration: ${m}:${String(s).padStart(2, '0')}`;
    }

    function fmtTs(ts) {
      try {
        return new Date(ts).toLocaleString('en-US', {
          timeZone: 'America/New_York',
          weekday: 'short', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
      } catch { return ''; }
    }

    function normKind(k) {
      k = (k || '').toLowerCase();
      if (k === 'voicemail') return 'voicemail';
      if (k === 'sms' || k === 'whatsapp') return 'sms';
      return 'call';
    }

    function kindLabel(k, raw) {
      if (k === 'voicemail') return 'Voicemail';
      if (k === 'sms') return (raw || '').toLowerCase() === 'whatsapp' ? 'WhatsApp' : 'SMS';
      return 'AI Phone Call';
    }

    function audioHtml(it) {
      if (!it.recording_url) return '';
      let src = String(it.recording_url);
      if (src.startsWith('/')) {
        src = ORIGIN + src;                       // already a proxy path
      } else {
        const m = src.match(/(RE[a-zA-Z0-9]+)/);  // raw Twilio recording → proxy by SID
        if (m) src = `${ORIGIN}/api/messages/recording/${m[1]}`;
      }
      return `<audio controls preload="none" src="${src}"></audio>`;
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function notifyParent() {
      try { window.parent.postMessage({ type: 'crm-messages-read' }, ORIGIN); } catch (e) {}
    }

    async function markItemRead(item) {
      if (!item || item.classList.contains('read')) return;
      const id = item.getAttribute('data-id');
      if (!id) return;
      item.classList.add('read');                 // optimistic — CSS swaps button → "Read"
      try {
        await fetch(`${ORIGIN}/api/projects-bridge/messages/${encodeURIComponent(id)}/read`, { method: 'POST' });
      } catch (e) { /* keep optimistic state */ }
      notifyParent();
    }

    async function markAllRead() {
      document.querySelectorAll('.item:not(.read)').forEach(el => el.classList.add('read'));
      try {
        await fetch(`${ORIGIN}/api/projects-bridge/messages/read-all`, { method: 'POST' });
      } catch (e) {}
      notifyParent();
    }

    async function load() {
      const list = document.getElementById('list');
      list.innerHTML = '<div class="spinner"></div>';
      try {
        const res = await fetch(`${ORIGIN}/api/projects-bridge/messages?limit=60${FOLLOWUPS ? '&mode=followups' : ''}`);
        const data = await res.json();
        if (!data.success) {
          list.innerHTML = `<div class="err">Could not load messages: ${esc(data.error || 'unknown error')}</div>`;
          return;
        }
        const items = data.items || [];
        if (!items.length) {
          list.innerHTML = FOLLOWUPS
            ? `<div class="empty">Nothing flagged for follow-up. Open <strong>Calls &amp; Messages</strong> and tap &#9734; Flag for follow-up on any call.</div>`
            : `<div class="empty">No calls or messages yet. When someone calls your business number, Lina's calls and voicemails will appear here.</div>`;
          return;
        }
        list.innerHTML = items.map(it => {
          const k = normKind(it.kind);
          const dur = fmtDur(it.secs);
          const body = esc(it.body).trim();
          const readCls = it.read === true ? ' read' : '';
          const flagged = it.flagged === true;
          const phone = esc(it.phone || '');
          const statusHtml = FOLLOWUPS ? '' : `
                <span class="status">
                  <button class="mark-btn" type="button">Mark read</button>
                  <span class="read-label">&#10003; Read</span>
                </span>`;
          const flagBtn = flagged
            ? `<button class="fu-btn flagged" type="button" onclick="event.stopPropagation();toggleFollowup(${it.id}, true, this)">&#9733; Following up &mdash; remove</button>`
            : `<button class="rm-btn" type="button" onclick="event.stopPropagation();toggleFollowup(${it.id}, false, this)">&#9734; Flag for follow-up</button>`;
          const callText = (flagged && phone) ? `
                <a class="rm-btn" href="tel:${phone}" onclick="event.stopPropagation()">&#128222; Call</a>
                <a class="rm-btn" href="sms:${phone}" onclick="event.stopPropagation()">&#128172; Text</a>` : '';
          return `
            <div class="item ${k}${readCls}${flagged ? ' fu' : ''}" data-id="${it.id}">
              <div class="row1">
                <span class="unread-dot" title="Unread"></span>
                ${flagged ? '<span class="fu-badge">Follow up</span>' : ''}
                <span class="kind ${k}">${kindLabel(k, it.kind)}</span>
                <span class="phone">${esc(it.phone || 'Unknown')}</span>
                ${dur ? `<span class="dur">${dur}</span>` : ''}
                <span class="ts">${fmtTs(it.ts)}</span>
                ${statusHtml}
              </div>
              ${body ? `<div class="body">${body}</div>` : ''}
              ${audioHtml(it)}
              <div class="fu-actions">${callText}${flagBtn}</div>
            </div>`;
        }).join('');
      } catch (err) {
        list.innerHTML = `<div class="err">Failed to load: ${esc(err.message)}</div>`;
      }
    }

    // Flag / unflag a call or message for follow-up (drives the Home KPI).
    async function toggleFollowup(id, isFlagged, btn) {
      if (!id) return;
      if (btn) btn.disabled = true;
      try {
        await fetch(`${ORIGIN}/api/projects-bridge/messages/${id}/flag`, { method: isFlagged ? 'DELETE' : 'POST' });
      } catch (e) { /* optimistic */ }
      notifyParent();   // refresh the "Calls To Follow Up" KPI on Home
      load();           // re-render with fresh flag state
    }
    window.toggleFollowup = toggleFollowup;

    // Event delegation — survives re-renders, and lets the audio controls work.
    document.getElementById('list').addEventListener('click', (e) => {
      if (e.target.closest('audio')) return;       // don't hijack the player
      if (e.target.closest('.fu-btn')) return;     // follow-up button handles itself
      if (e.target.closest('.rm-btn')) return;     // call/text/remove handle themselves
      if (FOLLOWUPS) return;                        // no read-toggling in follow-up mode
      const item = e.target.closest('.item');
      if (item) markItemRead(item);
    });
    document.getElementById('mark-all-btn').addEventListener('click', markAllRead);
    document.getElementById('refresh-btn').addEventListener('click', load);

    load();
  </script>
</body>
</html>
