<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Agent — RinglyPro</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#07090f;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.header{background:rgba(7,9,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(139,92,246,.15);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:16px;font-weight:700}
.header h1 span{background:linear-gradient(90deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.crm-pills{display:flex;gap:6px}
.crm-pill{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid rgba(139,92,246,.2);color:#94a3b8;cursor:pointer;background:none;font-family:inherit;transition:all .2s}
.crm-pill:hover{border-color:rgba(139,92,246,.4);color:#c4b5fd}
.crm-pill.active{background:rgba(139,92,246,.2);color:#c4b5fd;border-color:#8b5cf6}
.crm-pill.ghl{border-color:rgba(234,88,12,.3)}.crm-pill.ghl.active{background:rgba(234,88,12,.15);color:#fb923c;border-color:#ea580c}
.crm-pill.hubspot{border-color:rgba(255,122,89,.3)}.crm-pill.hubspot.active{background:rgba(255,122,89,.15);color:#ff7a59;border-color:#ff7a59}
.crm-pill.zoho{border-color:rgba(220,38,38,.3)}.crm-pill.zoho.active{background:rgba(220,38,38,.15);color:#f87171;border-color:#dc2626}

/* Finding context banner */
.finding-banner{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.15);border-radius:10px;padding:12px 16px;margin:12px 20px 0;font-size:13px;color:#cbd5e1;flex-shrink:0}
.finding-banner strong{color:#c4b5fd}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;border-bottom-right-radius:4px}
.msg.agent{align-self:flex-start;background:rgba(15,23,42,.8);border:1px solid rgba(139,92,246,.12);color:#e2e8f0;border-bottom-left-radius:4px}
.msg.agent strong{color:#c4b5fd}
.msg.agent a{color:#67e8f9;text-decoration:underline}
.msg.system{align-self:center;background:rgba(139,92,246,.08);color:#94a3b8;font-size:12px;padding:6px 14px;border-radius:20px}

/* Action cards */
.action-card{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.15);border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12px;color:#4ade80}
.action-card.error{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.15);color:#f87171}

/* Suggestions */
.suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.suggestion-chip{padding:5px 12px;border-radius:16px;font-size:11px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);color:#c4b5fd;cursor:pointer;font-family:inherit;transition:all .2s}
.suggestion-chip:hover{background:rgba(139,92,246,.2);border-color:#8b5cf6}

/* Input area */
.input-area{flex-shrink:0;padding:12px 20px;border-top:1px solid rgba(139,92,246,.15);display:flex;gap:8px;background:rgba(7,9,15,.9)}
.input-area input{flex:1;padding:12px 16px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:10px;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none}
.input-area input:focus{border-color:#8b5cf6}
.input-area input::placeholder{color:#64748b}
.send-btn{padding:12px 20px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:opacity .2s;font-family:inherit}
.send-btn:hover{opacity:.9}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* Typing indicator */
.typing{display:none;align-self:flex-start;padding:8px 16px;color:#64748b;font-size:12px;font-style:italic}
.typing.visible{display:block}
</style>
</head>
<body>

<div class="header">
  <h1><span>CRM Agent</span></h1>
  <div class="crm-pills" id="crmPills"></div>
</div>

<div class="finding-banner" id="findingBanner" style="display:none"></div>

<div class="chat-area" id="chatArea">
  <div class="msg system">Type a command or ask me anything about your CRM data.</div>
</div>

<div class="typing" id="typingIndicator">Agent is working...</div>

<div class="input-area">
  <input type="text" id="chatInput" placeholder="e.g. Show my pipeline, Create contact for John..." autocomplete="off">
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
let selectedCrm = null;
const params = new URLSearchParams(window.location.search);

function getClientId() {
  if (params.get('client_id')) return params.get('client_id');
  try { const t=localStorage.getItem('token'); if(t){const p=JSON.parse(atob(t.split('.')[1]));return p.clientId||p.client_id;} } catch(e){}
  return null;
}
function getAuth() {
  const t=localStorage.getItem('token');
  return t?{'Authorization':'Bearer '+t}:{'x-api-key':'ringlypro-quick-admin-2024'};
}

// Init
document.addEventListener('DOMContentLoaded', async () => {
  const cid = getClientId();
  if (!cid) { addMsg('system', 'No client ID found. Please log in.'); return; }

  // Load capabilities
  try {
    const res = await fetch(`/api/crm-agent/capabilities?client_id=${cid}`, {headers:getAuth()});
    const data = await res.json();
    if (data.success) {
      renderCrmPills(data.connected_crms);
      addMsg('system', `Connected to: ${data.connected_crms.map(c=>c.toUpperCase()).join(', ')} | Business: ${data.business_name}`);
    }
  } catch(e) { console.error(e); }

  // Pre-select CRM from URL
  if (params.get('crm')) {
    selectedCrm = params.get('crm');
    document.querySelectorAll('.crm-pill').forEach(p => p.classList.toggle('active', p.dataset.crm === selectedCrm));
    addMsg('system', `CRM context: ${selectedCrm.toUpperCase()}. Commands will target this CRM.`);
  }

  // Neural finding context
  const findingTitle = params.get('finding_title');
  if (findingTitle) {
    const banner = document.getElementById('findingBanner');
    banner.innerHTML = `<strong>Neural Finding:</strong> ${decodeURIComponent(findingTitle)}`;
    banner.style.display = 'block';
    addMsg('agent', `I see the finding: **${decodeURIComponent(findingTitle)}**\n\nI can help fix this. Say "fix this" or tell me what action you'd like to take.`);
  } else {
    addMsg('agent', `Hi! I'm your CRM Agent. I can create contacts, manage deals, track tasks, and act on Neural findings.\n\nTry: "show pipeline", "create contact for John Smith", or "help" for all commands.`);
  }

  // Enter key
  document.getElementById('chatInput').addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey) sendMessage(); });
});

function renderCrmPills(crms) {
  const container = document.getElementById('crmPills');
  container.innerHTML = crms.map(c => {
    const label = {local:'Local',ghl:'GHL',hubspot:'HubSpot',zoho:'Zoho'}[c]||c;
    return `<button class="crm-pill ${c}" data-crm="${c}" onclick="selectCrm('${c}',this)">${label}</button>`;
  }).join('');
}

function selectCrm(crm, el) {
  if (selectedCrm === crm) { selectedCrm = null; el.classList.remove('active'); }
  else { selectedCrm = crm; document.querySelectorAll('.crm-pill').forEach(p=>p.classList.remove('active')); el.classList.add('active'); }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  let message = input.value.trim();
  if (!message) return;

  // Append CRM context if selected
  if (selectedCrm && !/\b(ghl|hubspot|zoho|local)\b/i.test(message)) {
    message += ` in ${selectedCrm}`;
  }

  addMsg('user', input.value.trim());
  input.value = '';
  input.focus();

  const typing = document.getElementById('typingIndicator');
  typing.classList.add('visible');
  document.getElementById('sendBtn').disabled = true;

  try {
    const cid = getClientId();
    const context = {};
    if (params.get('finding_id')) context.finding_id = params.get('finding_id');
    if (params.get('finding_title')) context.finding_title = decodeURIComponent(params.get('finding_title'));

    const res = await fetch('/api/crm-agent/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json', ...getAuth()},
      body: JSON.stringify({ client_id: cid, message, context })
    });
    const data = await res.json();

    // Agent reply
    addMsg('agent', data.reply || 'No response.');

    // Action cards
    if (data.actions_taken?.length > 0) {
      const actionsHtml = data.actions_taken.map(a => {
        if (a.type === 'error') return `<div class="action-card error">❌ ${a.crm}: ${a.details}</div>`;
        return `<div class="action-card">✓ ${a.type.replace(/_/g,' ')} in ${a.crm.toUpperCase()}</div>`;
      }).join('');
      addHtml(actionsHtml);
    }

    // Suggestions
    if (data.suggestions?.length > 0) {
      const sugHtml = `<div class="suggestions">${data.suggestions.map(s => `<button class="suggestion-chip" onclick="useSuggestion('${esc(s)}')">${esc(s)}</button>`).join('')}</div>`;
      addHtml(sugHtml);
    }
  } catch(e) {
    addMsg('agent', 'Error connecting to CRM Agent: ' + e.message);
  }

  typing.classList.remove('visible');
  document.getElementById('sendBtn').disabled = false;
}

function useSuggestion(text) {
  document.getElementById('chatInput').value = text;
  sendMessage();
}

function addMsg(type, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  // Simple markdown: **bold**
  div.innerHTML = (text||'').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addHtml(html) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.style.alignSelf = 'flex-start';
  div.style.maxWidth = '85%';
  div.innerHTML = html;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
