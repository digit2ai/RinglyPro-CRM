<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — RinglyPro CRM</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#07090f;color:#e2e8f0;line-height:1.6;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(139,92,246,.15);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.header h1 span{background:linear-gradient(90deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.summary-bar{display:flex;gap:24px;flex-wrap:wrap}
.summary-item{text-align:center}
.summary-value{font-size:20px;font-weight:700;color:#c4b5fd}
.summary-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.pipeline{display:flex;gap:12px;padding:16px 24px;overflow-x:auto;min-height:calc(100vh - 140px);align-items:flex-start}
.stage-col{min-width:220px;max-width:260px;flex:1;background:rgba(15,23,42,.6);border:1px solid rgba(139,92,246,.12);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.stage-header{padding:12px 16px;border-bottom:1px solid rgba(139,92,246,.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.stage-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8}
.stage-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:rgba(139,92,246,.15);color:#c4b5fd}
.stage-amount{font-size:11px;color:#64748b;margin-top:2px}
.stage-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.deal-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.12);border-radius:10px;padding:12px;cursor:grab;transition:all .2s}
.deal-card:hover{border-color:rgba(139,92,246,.3);transform:translateY(-1px)}
.deal-card.dragging{opacity:.5}
.deal-card.stale{border-color:rgba(239,68,68,.3)}
.deal-title{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:4px}
.deal-contact{font-size:11px;color:#94a3b8;margin-bottom:6px}
.deal-meta{display:flex;justify-content:space-between;align-items:center}
.deal-amount{font-size:14px;font-weight:700;color:#4ade80}
.deal-days{font-size:10px;color:#64748b}
.deal-days.stale{color:#f87171}
.deal-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.deal-tag{font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(6,182,212,.15);color:#67e8f9}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(7,9,15,.85);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.visible{display:flex}
.modal{background:#0f1729;border:1px solid rgba(139,92,246,.2);border-radius:16px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;color:#c4b5fd}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#8b5cf6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty-stage{padding:24px;text-align:center;color:#64748b;font-size:12px}
@media(max-width:768px){.pipeline{flex-direction:column}.stage-col{min-width:100%;max-width:100%;max-height:none}}
</style>
</head>
<body>
<div class="header">
  <h1><span>Sales Pipeline</span></h1>
  <div class="summary-bar" id="summaryBar"></div>
  <button class="btn btn-primary" onclick="openAddDeal()">+ New Deal</button>
</div>
<div class="pipeline" id="pipeline"></div>

<!-- Add/Edit Deal Modal -->
<div class="modal-overlay" id="dealModal">
  <div class="modal">
    <h2 id="dealModalTitle">New Deal</h2>
    <form id="dealForm" onsubmit="saveDeal(event)">
      <input type="hidden" id="dealId">
      <div class="form-group">
        <label>Deal Title</label>
        <input type="text" id="dealTitle" required placeholder="e.g., John Smith - AI Receptionist Setup">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="dealAmount" step="0.01" value="0" min="0">
        </div>
        <div class="form-group">
          <label>Stage</label>
          <select id="dealStage">
            <option value="new_lead">New Lead</option>
            <option value="contacted">Contacted</option>
            <option value="qualified">Qualified</option>
            <option value="proposal_sent">Proposal Sent</option>
            <option value="negotiation">Negotiation</option>
            <option value="closed_won">Closed Won</option>
            <option value="closed_lost">Closed Lost</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Source</label>
          <select id="dealSource">
            <option value="manual">Manual</option>
            <option value="voice_call">Voice Call</option>
            <option value="referral">Referral</option>
            <option value="website">Website</option>
          </select>
        </div>
        <div class="form-group">
          <label>Expected Close</label>
          <input type="date" id="dealCloseDate">
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="dealNotes" rows="2" placeholder="Optional notes..."></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button type="submit" class="btn btn-primary" style="flex:1">Save Deal</button>
        <button type="button" class="btn" style="flex:1;background:rgba(139,92,246,.15);color:#c4b5fd" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
const STAGES = [
  { key: 'new_lead', label: 'New Lead', color: '#94a3b8' },
  { key: 'contacted', label: 'Contacted', color: '#60a5fa' },
  { key: 'qualified', label: 'Qualified', color: '#a78bfa' },
  { key: 'proposal_sent', label: 'Proposal Sent', color: '#fbbf24' },
  { key: 'negotiation', label: 'Negotiation', color: '#fb923c' },
  { key: 'closed_won', label: 'Closed Won', color: '#4ade80' },
  { key: 'closed_lost', label: 'Closed Lost', color: '#f87171' }
];

let allDeals = [];
let draggedDeal = null;

function getClientId() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('client_id')) return params.get('client_id');
  try {
    const token = localStorage.getItem('token');
    if (token) { const p = JSON.parse(atob(token.split('.')[1])); return p.clientId || p.client_id; }
  } catch(e) {}
  return null;
}
function getAuth() {
  const token = localStorage.getItem('token');
  if (token) return { 'Authorization': 'Bearer ' + token };
  return { 'x-api-key': 'ringlypro-quick-admin-2024' };
}

async function loadPipeline() {
  const clientId = getClientId();
  if (!clientId) return;
  try {
    // Sync deals from connected CRMs (GHL, HubSpot, Zoho) + load local
    const syncRes = await fetch(`/api/deals/sync?client_id=${clientId}`, { headers: getAuth() });
    const syncData = await syncRes.json();
    if (syncData.success) {
      allDeals = syncData.deals || [];
      renderSummary(syncData.forecast || {});
      renderPipeline();
      // Show sync badge if new deals imported
      const total = (syncData.synced?.ghl||0) + (syncData.synced?.hubspot||0) + (syncData.synced?.zoho||0);
      if (total > 0) {
        const badge = document.createElement('div');
        badge.style.cssText = 'position:fixed;top:60px;right:24px;background:rgba(74,222,128,.15);color:#4ade80;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:100;';
        badge.textContent = `Synced ${total} new deals from CRMs`;
        document.body.appendChild(badge);
        setTimeout(() => badge.remove(), 4000);
      }
    } else {
      // Fallback to local only
      const dealsRes = await fetch(`/api/deals?client_id=${clientId}&limit=200`, { headers: getAuth() });
      const dealsData = await dealsRes.json();
      allDeals = dealsData.deals || [];
      const forecastRes = await fetch(`/api/deals/forecast?client_id=${clientId}`, { headers: getAuth() });
      const forecastData = await forecastRes.json();
      renderSummary(forecastData);
      renderPipeline();
    }
  } catch(e) { console.error('Load error:', e); }
}

function renderSummary(f) {
  const open = allDeals.filter(d => !['closed_won','closed_lost'].includes(d.stage));
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item"><div class="summary-value">${allDeals.length}</div><div class="summary-label">Total Deals</div></div>
    <div class="summary-item"><div class="summary-value">$${Number(f.total_pipeline||0).toLocaleString()}</div><div class="summary-label">Pipeline</div></div>
    <div class="summary-item"><div class="summary-value">$${Number(f.weighted_forecast||0).toLocaleString()}</div><div class="summary-label">Forecast</div></div>
    <div class="summary-item"><div class="summary-value">${open.length}</div><div class="summary-label">Open</div></div>
  `;
}

function renderPipeline() {
  const container = document.getElementById('pipeline');
  container.innerHTML = STAGES.map(s => {
    const stageDeals = allDeals.filter(d => d.stage === s.key);
    const total = stageDeals.reduce((sum, d) => sum + parseFloat(d.amount || 0), 0);
    return `
      <div class="stage-col" data-stage="${s.key}"
        ondragover="event.preventDefault();this.style.background='rgba(139,92,246,.12)'"
        ondragleave="this.style.background=''"
        ondrop="handleDrop(event,'${s.key}');this.style.background=''">
        <div class="stage-header">
          <div>
            <div class="stage-name" style="color:${s.color}">${s.label}</div>
            <div class="stage-amount">$${total.toLocaleString()}</div>
          </div>
          <span class="stage-badge">${stageDeals.length}</span>
        </div>
        <div class="stage-body">
          ${stageDeals.length === 0 ? '<div class="empty-stage">No deals</div>' :
            stageDeals.map(d => renderDealCard(d)).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderDealCard(d) {
  const days = Math.floor(parseFloat(d.days_in_stage) || 0);
  const isStale = days > 7 && !['closed_won','closed_lost'].includes(d.stage);
  const contact = d.first_name ? `${d.first_name} ${d.last_name || ''}` : '';
  const srcBadge = d.source === 'ghl_sync' ? '<span class="deal-tag" style="background:rgba(234,88,12,.15);color:#fb923c;">GHL</span>'
    : d.source === 'hubspot_sync' ? '<span class="deal-tag" style="background:rgba(255,122,89,.15);color:#ff7a59;">HubSpot</span>'
    : d.source === 'zoho_sync' ? '<span class="deal-tag" style="background:rgba(220,38,38,.15);color:#f87171;">Zoho</span>'
    : '';
  return `
    <div class="deal-card ${isStale ? 'stale' : ''}" draggable="true"
      ondragstart="dragStart(event,${d.id})" ondragend="dragEnd(event)"
      onclick="editDeal(${d.id})">
      <div class="deal-title">${esc(d.title)}</div>
      ${contact ? `<div class="deal-contact">${esc(contact)}</div>` : ''}
      <div class="deal-meta">
        <span class="deal-amount">$${Number(d.amount||0).toLocaleString()}</span>
        <span class="deal-days ${isStale?'stale':''}">${days}d</span>
      </div>
      ${srcBadge ? `<div class="deal-tags">${srcBadge}</div>` : ''}
    </div>`;
}

// Drag & drop
function dragStart(e, id) { draggedDeal = id; e.target.classList.add('dragging'); }
function dragEnd(e) { e.target.classList.remove('dragging'); draggedDeal = null; }
async function handleDrop(e, newStage) {
  e.preventDefault();
  if (!draggedDeal) return;
  try {
    await fetch(`/api/deals/${draggedDeal}/stage`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', ...getAuth() },
      body: JSON.stringify({ stage: newStage })
    });
    loadPipeline();
  } catch(err) { console.error('Stage update error:', err); }
}

// Modal
function openAddDeal() {
  document.getElementById('dealModalTitle').textContent = 'New Deal';
  document.getElementById('dealForm').reset();
  document.getElementById('dealId').value = '';
  document.getElementById('dealModal').classList.add('visible');
}
function editDeal(id) {
  const d = allDeals.find(x => x.id === id);
  if (!d) return;
  document.getElementById('dealModalTitle').textContent = 'Edit Deal';
  document.getElementById('dealId').value = d.id;
  document.getElementById('dealTitle').value = d.title;
  document.getElementById('dealAmount').value = d.amount || 0;
  document.getElementById('dealStage').value = d.stage;
  document.getElementById('dealSource').value = d.source || 'manual';
  document.getElementById('dealCloseDate').value = d.expected_close_date || '';
  document.getElementById('dealNotes').value = d.notes || '';
  document.getElementById('dealModal').classList.add('visible');
}
function closeModal() { document.getElementById('dealModal').classList.remove('visible'); }

async function saveDeal(e) {
  e.preventDefault();
  const id = document.getElementById('dealId').value;
  const body = {
    client_id: getClientId(),
    title: document.getElementById('dealTitle').value,
    amount: parseFloat(document.getElementById('dealAmount').value) || 0,
    stage: document.getElementById('dealStage').value,
    source: document.getElementById('dealSource').value,
    expected_close_date: document.getElementById('dealCloseDate').value || null,
    notes: document.getElementById('dealNotes').value || null
  };
  try {
    await fetch(id ? `/api/deals/${id}` : '/api/deals', {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json', ...getAuth() },
      body: JSON.stringify(body)
    });
    closeModal();
    loadPipeline();
  } catch(err) { alert('Error saving deal'); }
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

document.getElementById('dealModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
loadPipeline();
</script>
</body>
</html>
