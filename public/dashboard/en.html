<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CamaraVirtual.app -- Panel de Miembros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #003DA5;
  --primary-dark: #002D7A;
  --primary-light: #E6EEF8;
  --secondary: #CE1126;
  --accent: #FCD116;
  --accent-light: #FFF4CC;
  --accent-dark: #C9A500;
  --navy: #1A2332;
  --navy-light: #2d3a4d;
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #6c757d;
  --gray-700: #495057;
  --gray-900: #212529;
  --red: #dc3545;
  --green: #28a745;
  --blue: #007bff;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family:'Inter',sans-serif;
  color:var(--gray-900);
  background:var(--gray-50);
  font-size:14px;
  line-height:1.5;
}
a { text-decoration:none; color:inherit; }
button { cursor:pointer; font-family:inherit; }
input, select, textarea { font-family:inherit; font-size:14px; }

/* Layout */
.app { display:flex; min-height:100vh; }

/* Sidebar */
.sidebar {
  width:var(--sidebar-w);
  background:var(--navy);
  color:var(--white);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:100;
  transition:transform 0.3s;
}
.sidebar-logo {
  padding:24px 20px 20px;
  font-weight:800;
  font-size:20px;
  letter-spacing:3px;
  border-bottom:1px solid var(--navy-light);
}
.sidebar-logo span { color:var(--accent); }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.sidebar-nav-item {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  color:rgba(255,255,255,0.7);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  border-left:3px solid transparent;
}
.sidebar-nav-item:hover {
  background:rgba(255,255,255,0.06);
  color:var(--white);
}
.sidebar-nav-item.active {
  background:rgba(0,61,165,0.25);
  color:var(--accent);
  border-left-color:var(--accent);
}
.sidebar-nav-item svg { width:18px; height:18px; flex-shrink:0; }
.sidebar-footer {
  padding:16px 20px;
  border-top:1px solid var(--navy-light);
  font-size:13px;
}
.sidebar-footer .member-name {
  font-weight:600;
  color:var(--white);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.sidebar-footer .member-type {
  color:var(--accent);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:10px;
}
.btn-logout {
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);
  padding:6px 14px;
  border-radius:4px;
  font-size:12px;
  transition:all 0.2s;
  width:100%;
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }

/* Main */
.main {
  flex:1;
  margin-left:var(--sidebar-w);
  padding:28px 32px;
  min-height:100vh;
}
.main-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
.main-header h1 {
  font-size:22px;
  font-weight:700;
  color:var(--navy);
}
.hamburger {
  display:none;
  background:none;
  border:none;
  padding:8px;
  cursor:pointer;
}
.hamburger svg { width:24px; height:24px; }

/* Overlay */
.sidebar-overlay {
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);
  z-index:99;
}

/* Cards */
.stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card {
  background:var(--white);
  border-radius:10px;
  padding:20px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.stat-card .label { font-size:12px; color:var(--gray-500); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.stat-card .value { font-size:28px; font-weight:700; color:var(--navy); }
.stat-card .value.primary { color:var(--primary); }
.stat-card .value.accent { color:var(--accent-dark); }

/* Panel */
.panel {
  background:var(--white);
  border-radius:10px;
  padding:24px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  margin-bottom:20px;
}
.panel h2 { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--navy); }
.panel h3 { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--gray-700); }

/* Forms */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:12px; font-weight:600; color:var(--gray-700); text-transform:uppercase; letter-spacing:0.3px; }
.form-group input, .form-group select, .form-group textarea {
  padding:9px 12px;
  border:1px solid var(--gray-300);
  border-radius:6px;
  outline:none;
  transition:border 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-group textarea { resize:vertical; min-height:80px; }

/* Buttons */
.btn {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:9px 18px;
  border-radius:6px;
  font-size:13px;
  font-weight:600;
  border:none;
  transition:all 0.2s;
}
.btn-primary { background:var(--primary); color:var(--white); }
.btn-primary:hover { background:var(--primary-dark); }
.btn-accent { background:var(--accent); color:var(--navy); }
.btn-accent:hover { background:var(--accent-dark); }
.btn-outline { background:none; border:1px solid var(--gray-300); color:var(--gray-700); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-danger { background:var(--red); color:var(--white); }

/* Table */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; background:var(--gray-100); color:var(--gray-700); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
td { padding:10px 12px; border-bottom:1px solid var(--gray-200); }

/* Badge */
.badge {
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.badge-gray { background:var(--gray-200); color:var(--gray-700); }
.badge-blue { background:var(--primary-light); color:var(--primary-dark); }
.badge-gold { background:var(--accent-light); color:var(--accent-dark); }
.badge-teal { background:#e0f2f1; color:#00695c; }
.badge-green { background:#d4edda; color:#155724; }
.badge-red { background:#f8d7da; color:#721c24; }

/* Search bar */
.search-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.search-bar input, .search-bar select {
  padding:9px 12px;
  border:1px solid var(--gray-300);
  border-radius:6px;
  outline:none;
  font-size:13px;
}
.search-bar input { flex:1; min-width:200px; }
.search-bar select { min-width:140px; }

/* Result cards */
.result-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.result-card {
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:8px;
  padding:16px;
  cursor:pointer;
  transition:all 0.2s;
}
.result-card:hover { border-color:var(--primary); box-shadow:0 2px 8px rgba(0,61,165,0.1); }
.result-card .rc-name { font-weight:700; font-size:15px; color:var(--navy); margin-bottom:2px; }
.result-card .rc-company { font-size:13px; color:var(--gray-500); margin-bottom:6px; }
.result-card .rc-meta { display:flex; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--gray-700); }
.result-card .rc-score { display:flex; gap:12px; margin-top:8px; font-size:12px; }
.result-card .rc-score span { color:var(--primary); font-weight:600; }

/* Modal */
.modal-overlay {
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);
  z-index:200;
  align-items:center;
  justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--white);
  border-radius:12px;
  width:90%;
  max-width:600px;
  max-height:85vh;
  overflow-y:auto;
  padding:28px;
  position:relative;
}
.modal-close {
  position:absolute;
  top:12px;right:16px;
  background:none;
  border:none;
  font-size:22px;
  color:var(--gray-500);
  cursor:pointer;
}

/* Tabs */
.tabs { display:flex; gap:0; margin-bottom:18px; border-bottom:2px solid var(--gray-200); }
.tab-btn {
  padding:10px 20px;
  font-size:13px;
  font-weight:600;
  color:var(--gray-500);
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  transition:all 0.2s;
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-btn:hover { color:var(--primary); }

/* Gauge */
.gauge-wrap { display:flex; align-items:center; justify-content:center; padding:20px; }
.gauge {
  width:180px; height:180px;
  border-radius:50%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.gauge-inner {
  width:130px; height:130px;
  border-radius:50%;
  background:var(--white);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1;
}
.gauge-value { font-size:32px; font-weight:800; color:var(--navy); }
.gauge-label { font-size:11px; color:var(--gray-500); text-transform:uppercase; }

/* Bar chart */
.bar-chart { padding:8px 0; }
.bar-row { display:flex; align-items:center; margin-bottom:10px; gap:10px; }
.bar-label { width:140px; font-size:12px; color:var(--gray-700); text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:22px; background:var(--gray-100); border-radius:4px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.6s; display:flex; align-items:center; padding-left:8px; }
.bar-fill span { font-size:11px; font-weight:600; color:var(--white); }

/* Lifecycle dots */
.lifecycle-dots { display:flex; align-items:center; gap:4px; margin:12px 0; }
.lifecycle-dot {
  width:28px; height:28px;
  border-radius:50%;
  border:2px solid var(--gray-300);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:700;
  color:var(--gray-400);
}
.lifecycle-dot.active { border-color:var(--primary); background:var(--primary); color:var(--white); }
.lifecycle-dot.done { border-color:var(--green); background:var(--green); color:var(--white); }
.lifecycle-line { width:20px; height:2px; background:var(--gray-300); }
.lifecycle-line.done { background:var(--green); }

/* Pricing table */
.pricing-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
.pricing-card {
  border:2px solid var(--gray-200);
  border-radius:10px;
  padding:20px;
  text-align:center;
  transition:all 0.2s;
}
.pricing-card.current { border-color:var(--accent); }
.pricing-card .tier-name { font-size:16px; font-weight:700; color:var(--navy); margin-bottom:4px; }
.pricing-card .tier-desc { font-size:12px; color:var(--gray-500); margin-bottom:12px; }
.pricing-card .tier-price { font-size:28px; font-weight:800; color:var(--primary); }
.pricing-card .tier-period { font-size:12px; color:var(--gray-500); margin-bottom:14px; }

/* Trust component list */
.trust-components { display:flex; flex-direction:column; gap:10px; }
.trust-row { display:flex; align-items:center; gap:10px; }
.trust-row .tr-label { width:100px; font-size:12px; font-weight:600; color:var(--gray-700); }
.trust-row .tr-bar { flex:1; height:16px; background:var(--gray-100); border-radius:4px; overflow:hidden; }
.trust-row .tr-fill { height:100%; border-radius:4px; background:var(--primary); }
.trust-row .tr-val { width:50px; text-align:right; font-size:12px; font-weight:600; color:var(--gray-700); }

/* Loading / Error */
.loading { text-align:center; padding:40px; color:var(--gray-500); font-size:14px; }
.error-msg { color:var(--red); font-size:13px; padding:10px 0; }
.success-msg { color:var(--green); font-size:13px; padding:10px 0; }

/* Utilities */
.mt-12 { margin-top:12px; }
.mt-16 { margin-top:16px; }
.mt-20 { margin-top:20px; }
.mb-12 { margin-bottom:12px; }
.mb-16 { margin-bottom:16px; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.text-muted { color:var(--gray-500); }
.text-sm { font-size:12px; }

/* Responsive */
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .sidebar-overlay.show { display:block; }
  .main { margin-left:0; padding:16px; }
  .hamburger { display:block; }
  .form-grid { grid-template-columns:1fr; }
  .stat-cards { grid-template-columns:1fr 1fr; }
  .result-cards { grid-template-columns:1fr; }
  .pricing-grid { grid-template-columns:1fr; }
}
</style>
</head>

<script>
(function() {
  'use strict';

  // -- Dynamic base path for custom domain support --
  var isCustomDomain = location.hostname === 'camaravirtual.app' || location.hostname === 'www.camaravirtual.app';
  var BASE = isCustomDomain ? '' : '/chamber/hispamind';

  // -- State --
  const API = BASE + '/api';
  let currentMember = null;
  let currentPage = 'dashboard';

  // -- Auth --
  function getToken() { return localStorage.getItem('hispamind_token'); }

  function decodeJWT(token) {
    try {
      const payload = token.split('.')[1];
      return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
    } catch(e) { return null; }
  }

  function logout() {
    localStorage.removeItem('hispamind_token');
    showLoginScreen();
  }

  function showLoginScreen(errorMsg) {
    document.body.innerHTML = `
      <style>
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#0a1628 0%,#002670 55%,#003DA5 100%); font-family:'Inter',sans-serif; padding:20px; }
        .login-card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:36px 32px; max-width:420px; width:100%; backdrop-filter:blur(12px); }
        .login-card h2 { color:#fff; font-size:24px; font-weight:800; margin-bottom:8px; text-align:center; }
        .login-card p { color:rgba(255,255,255,0.7); font-size:14px; text-align:center; margin-bottom:24px; }
        .login-card label { display:block; font-size:11px; font-weight:600; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
        .login-card input { width:100%; padding:12px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.06); color:#fff; font-size:15px; outline:none; margin-bottom:16px; box-sizing:border-box; }

  async function apiFetch(path, methodOrOpts, body) {
    var opts = {};
    if (typeof methodOrOpts === 'string') {
      opts = { method: methodOrOpts };
      if (body) opts.body = JSON.stringify(body);
    } else if (methodOrOpts) {
      opts = methodOrOpts;
    }
    var token = getToken();
    var headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    var res = await fetch(API + path, { ...opts, headers });
    var data = await res.json();
    if (res.status === 401) { logout(); throw new Error('Session expired'); }
    return data;
  }

  // -- Init --
  async function init() {
    var token = getToken();
    if (!token) { showLoginScreen(); return; }

    var decoded = decodeJWT(token);
    if (!decoded) { logout(); return; }

    try {
      var res = await apiFetch('/auth/me');
      if (!res.success) { logout(); return; }
      currentMember = res.data;
      currentMember.member_id = currentMember.id;
    } catch(e) {
      logout(); return;
    }

    document.getElementById('sidebarName').textContent = currentMember.first_name + ' ' + currentMember.last_name;
    var roleLabel = currentMember.governance_role && currentMember.governance_role !== 'member'
      ? currentMember.governance_role.replace(/_/g, ' ') : currentMember.membership_type || 'individual';
    document.getElementById('sidebarType').textContent = roleLabel;

    // Show admin nav if user has admin access
    if (['superadmin', 'admin_global', 'admin_regional'].includes(currentMember.access_level)) {
      document.getElementById('adminNavItem').style.display = 'flex';
    }

    setupNav();
    setupHamburger();
    setupModal();
    document.getElementById('btnLogout').addEventListener('click', logout);
    navigate('dashboard');
    loadInvBadge();
    setInterval(loadInvBadge, 60000); // refresh badge every minute
  }

  // -- Navigation --
  function setupNav() {
    document.querySelectorAll('.sidebar-nav-item').forEach(function(item) {
      item.addEventListener('click', function() {
        navigate(this.dataset.page);
        closeSidebar();
      });
    });
  }

  function navigate(page) {
    currentPage = page;
    document.querySelectorAll('.sidebar-nav-item').forEach(function(i) {
      i.classList.toggle('active', i.dataset.page === page);
    });
    var titles = {
      dashboard:'Dashboard', profile:'My Profile', directory:'Directory',
      matching:'AI Matching', projects:'Projects', invitations:'Invitations',
      exchange:'Exchange', metrics:'Metrics', payments:'Payments', admin:'Administration'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;
    document.getElementById('pageContent').innerHTML = '<div class="loading">Loading...</div>';
    var renderers = {
      dashboard:renderDashboard, profile:renderProfile, directory:renderDirectory,
      matching:renderMatching, projects:renderProjects, invitations:renderInvitations,
      exchange:renderExchange, metrics:renderMetrics, payments:renderPayments, admin:renderAdmin
    };
    if (renderers[page]) renderers[page]();

      html += '<div class="stat-card"><div class="label">Open RFQs</div><div class="value accent">'+(c.open_rfqs||0)+'</div></div>';

      // Members by region
      if (d.members_by_region && d.members_by_region.length) {
        html += '<div class="panel"><h2>Members by Region</h2><div class="bar-chart">';
        var maxR = Math.max.apply(null, d.members_by_region.map(function(r){return parseInt(r.count)||0;})) || 1;
        d.members_by_region.forEach(function(r) {
          var cnt = parseInt(r.count)||0;
          var w = Math.max((cnt/maxR)*100, 2);
          html += '<div class="bar-row"><div class="bar-label">'+esc(r.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:var(--primary);"><span>'+cnt+'</span></div></div></div>';
        });
        html += '</div></div>';

      // Members by type
      if (d.members_by_type && d.members_by_type.length) {
        html += '<div class="panel"><h2>Membership Distribution</h2><div class="bar-chart">';
        var maxT = Math.max.apply(null, d.members_by_type.map(function(t){return parseInt(t.count)||0;})) || 1;
        d.members_by_type.forEach(function(t) {
          var cnt = parseInt(t.count)||0;
          var w = Math.max((cnt/maxT)*100, 2);
          html += '<div class="bar-row"><div class="bar-label">'+esc(t.membership_type)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:var(--accent);"><span>'+cnt+'</span></div></div></div>';
        });

      if (d.history && d.history.length > 0) {
        html += '<div class="panel"><h2>Recent Network Activity</h2><div class="table-wrap"><table><thead><tr><th>Date</th><th>Members</th><th>Active</th><th>Gini</th><th>Trust</th><th>HCI</th></tr></thead><tbody>';
        d.history.slice(-10).reverse().forEach(function(h2) {

        });
        html += '</tbody></table></div></div>';
      }

      el.innerHTML = html;
    } catch(e) {

  async function loadTrustScore(memberId, containerId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    try {
      var res = await apiFetch('/metrics/trust/'+memberId);
      if (!res.success) {
        // Fallback: show the stored value from currentMember if endpoint failed
        var stored = currentMember && currentMember.trust_score;
        if (stored != null) {
          container.innerHTML = '<h2>Trust Score: <span style="color:var(--primary)">'+parseFloat(stored).toFixed(3)+'</span></h2><div class="text-sm text-muted">Stored value (component breakdown unavailable)</div>';
        } else {
          container.innerHTML = '<h2>Trust Score</h2><div class="error-msg">Not available</div>';
        }
        return;
      }
      var d = res.data;
      var html = '<h2>Trust Score: <span style="color:var(--primary)">'+((d.trust_score != null ? d.trust_score : d.trust_base_calculated) || 0).toFixed(3)+'</span></h2>';
      html += '<div class="trust-components mt-12">';
      if (d.components) {
        var comps = d.components;
        var items = [
          {label:'Verification', val:comps.verification?comps.verification.value:0, w:comps.verification?comps.verification.weight:0},
          {label:'References', val:comps.references?comps.references.value:0, w:comps.references?comps.references.weight:0},
          {label:'Projects', val:comps.projects?comps.projects.value:0, w:comps.projects?comps.projects.weight:0},
          {label:'Tenure', val:comps.tenure?comps.tenure.value:0, w:comps.tenure?comps.tenure.weight:0},
          {label:'Membership', val:comps.membership?comps.membership.value:0, w:comps.membership?comps.membership.weight:0}
        ];
        items.forEach(function(it) {
          var pctV = Math.round(it.val * 100);
          html += '<div class="trust-row"><div class="tr-label">'+it.label+' ('+Math.round(it.w*100)+'%)</div><div class="tr-bar"><div class="tr-fill" style="width:'+pctV+'%"></div></div><div class="tr-val">'+pctV+'%</div></div>';
        });
      }
      html += '</div>';
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<h2>Trust Score</h2><div class="error-msg">Error loading data</div>';
    }
  }

        var members = res.data.members || [];
        if (members.length === 0) { out.innerHTML = '<p class="text-muted">No members found.</p>'; return; }

          if (m.years_experience) h += '<span>'+m.years_experience+' yrs exp.</span>';
          h += '</div></div>';
        });
        h += '</div>';
        if (res.data.pagination) h += '<p class="text-muted text-sm mt-12">'+res.data.pagination.total+' members found (page '+res.data.pagination.page+' of '+res.data.pagination.total_pages+')</p>';

      }
    }

    document.getElementById('dirBtn').addEventListener('click', searchDir);
    document.getElementById('dirSearch').addEventListener('keypress', function(e){ if(e.key==='Enter') searchDir(); });
    searchDir();
  }

      html += '<tr><td style="font-weight:600;padding:6px 12px 6px 0;color:var(--gray-500)">Experience</td><td>'+(m.years_experience ? m.years_experience+' years' : '--')+'</td></tr>';
      html += '<tr><td style="font-weight:600;padding:6px 12px 6px 0;color:var(--gray-500)">Languages</td><td>'+esc(langs.join(', ')||'--')+'</td></tr>';
      html += '<tr><td style="font-weight:600;padding:6px 12px 6px 0;color:var(--gray-500)">Email</td><td>'+esc(m.email)+'</td></tr>';

      if (m.website_url) html += '<tr><td style="font-weight:600;padding:6px 12px 6px 0;color:var(--gray-500)">Website</td><td><a href="'+esc(m.website_url)+'" target="_blank" style="color:var(--primary)">Visit</a></td></tr>';

      html += '</table>';
      if (m.bio) html += '<div style="margin-top:14px;padding:12px;background:var(--gray-50);border-radius:6px;font-size:13px;color:var(--gray-700)">'+esc(m.bio)+'</div>';
      // Admin/superadmin: edit any member; self: edit your own
      var isAdmin = currentMember && ['superadmin','admin_global','admin_regional','admin'].includes(currentMember.access_level);
      var isSelf = currentMember && currentMember.id === m.id;
      if (isAdmin || isSelf) {
        html += '<div style="margin-top:16px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" id="dirEditBtn" data-mid="'+m.id+'">'+(isSelf?'Edit My Profile':'Edit (Admin)')+'</button></div>';
      }
      openModal(html);
      var ebtn = document.getElementById('dirEditBtn');
      if (ebtn) ebtn.addEventListener('click', function() { showMemberEditor(m); });

      openModal('<div class="error-msg">Error: '+esc(e.message)+'</div>');

  async function showMemberEditor(m) {
    var langs = m.languages || [];
    if (typeof langs === 'string') { try { langs = JSON.parse(langs); } catch(e) { langs = langs.replace(/[{}]/g,'').split(',').filter(Boolean); } }
    var isAdmin = currentMember && ['superadmin','admin_global','admin_regional','admin'].includes(currentMember.access_level);
    var canGlobal = currentMember && ['superadmin','admin_global'].includes(currentMember.access_level);
    var isSelf = currentMember && currentMember.id === m.id;

    // Pull governance role list + region list for the dropdowns when admin
    var availableRoles = [];
    var availableRegions = [];
    if (canGlobal) {
      try {
        var rRes = await apiFetch('/admin/roles');
        if (rRes && rRes.success) availableRoles = rRes.data.available_roles || [];
        var regRes = await apiFetch('/admin/regions');
        if (regRes && regRes.success) availableRegions = regRes.data || [];
      } catch (e) { /* fall back to no dropdown */ }
    }

    var html = '<h2>Edit '+esc(m.first_name)+' '+esc(m.last_name)+'</h2>';
    if (isAdmin && !isSelf) html += '<div class="text-sm text-muted" style="margin-bottom:8px">Admin edit - changes apply to '+esc(m.email)+'</div>';
    html += '<div id="memEditMsg"></div>';
    html += '<form id="memEditForm" class="form-grid">';
    html += '<div class="form-group"><label>First Name</label><input name="first_name" value="'+esc(m.first_name||'')+'"></div>';
    html += '<div class="form-group"><label>Last Name</label><input name="last_name" value="'+esc(m.last_name||'')+'"></div>';
    html += '<div class="form-group"><label>Country</label><input name="country" value="'+esc(m.country||'')+'"></div>';
    html += '<div class="form-group"><label>Sector</label><select name="sector">'+sectorOptions(m.sector,'-- Select sector --')+'</select></div>';
    html += '<div class="form-group"><label>Sub-specialty</label><input name="sub_specialty" value="'+esc(m.sub_specialty||'')+'"></div>';
    html += '<div class="form-group"><label>Years of Experience</label><input name="years_experience" type="number" value="'+(m.years_experience||'')+'"></div>';
    html += '<div class="form-group"><label>Languages (comma-separated)</label><input name="languages" value="'+esc(langs.join(', '))+'"></div>';
    html += '<div class="form-group"><label>Company</label><input name="company_name" value="'+esc(m.company_name||'')+'"></div>';
    html += '<div class="form-group full"><label>Bio</label><textarea name="bio" rows="3">'+esc(m.bio||'')+'</textarea></div>';
    html += '<div class="form-group"><label>Phone</label><input name="phone" value="'+esc(m.phone||'')+'"></div>';
    html += '<div class="form-group"><label>LinkedIn URL</label><input name="linkedin_url" value="'+esc(m.linkedin_url||'')+'"></div>';
    html += '<div class="form-group full"><label>Website URL</label><input name="website_url" value="'+esc(m.website_url||'')+'"></div>';

    // Admin-only: governance role + access level + region
    if (canGlobal) {
      html += '<div class="form-group full" style="margin-top:18px;padding-top:14px;border-top:2px solid var(--gray-200)"><h3 style="margin:0 0 10px 0;font-size:14px;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px">Admin Settings</h3></div>';
      html += '<div class="form-group"><label>Governance Role</label><select name="governance_role">';
      var currentRole = m.governance_role || 'member';
      availableRoles.forEach(function(r) {
        html += '<option value="'+r+'"'+(r===currentRole?' selected':'')+'>'+r.replace(/_/g,' ')+'</option>';
      });
      html += '</select></div>';

      var currentAccess = m.access_level || 'member';
      var levels = ['member','admin_regional','admin_global'];
      if (currentMember.access_level === 'superadmin') levels.push('superadmin');
      html += '<div class="form-group"><label>Access Level</label><select name="access_level">';
      levels.forEach(function(l) {
        html += '<option value="'+l+'"'+(l===currentAccess?' selected':'')+'>'+l.replace(/_/g,' ')+'</option>';
      });
      html += '</select></div>';

      html += '<div class="form-group"><label>Region</label><select name="region_id"><option value="">-- Global / None --</option>';
      availableRegions.forEach(function(r) {
        html += '<option value="'+r.id+'"'+(r.id==m.region_id?' selected':'')+'>'+esc(r.name)+'</option>';
      });
      html += '</select></div>';

      html += '<div class="form-group"><label>Membership Type</label><select name="membership_type">';
      ['individual','empresarial','corporativo','fundador'].forEach(function(mt) {
        html += '<option value="'+mt+'"'+(mt===(m.membership_type||'individual')?' selected':'')+'>'+mt+'</option>';
      });
      html += '</select></div>';
    }

    html += '<div class="form-group full mt-12" style="display:flex;gap:8px"><button type="submit" class="btn btn-primary">Save</button><button type="button" class="btn btn-outline" id="memEditCancel">Cancel</button></div>';
    html += '</form>';
    openModal(html);
    document.getElementById('memEditCancel').addEventListener('click', function() { showMemberModal(m.id); });
    document.getElementById('memEditForm').addEventListener('submit', async function(ev) {
      ev.preventDefault();
      var fd = new FormData(this); var body = {};
      fd.forEach(function(v,k){ body[k] = v; });
      body.years_experience = body.years_experience ? parseInt(body.years_experience) : null;
      body.languages = body.languages ? body.languages.split(',').map(function(l){return l.trim();}).filter(Boolean) : [];

      // Pull admin-only fields out (sent to a different endpoint)
      var adminFields = null;
      if (canGlobal && (body.governance_role !== undefined || body.access_level !== undefined || body.region_id !== undefined || body.membership_type !== undefined)) {
        adminFields = {
          governance_role: body.governance_role,
          access_level: body.access_level,
          region_id: body.region_id ? parseInt(body.region_id) : null,
          membership_type: body.membership_type
        };
        delete body.governance_role; delete body.access_level; delete body.region_id; delete body.membership_type;
      }

      var msgEl = document.getElementById('memEditMsg');
      msgEl.innerHTML = '<div class="text-muted text-sm">Saving...</div>';
      try {
        var res = await apiFetch('/members/'+m.id, { method:'PUT', body:JSON.stringify(body) });
        if (!res.success) {
          msgEl.innerHTML = '<div class="error-msg">'+(res.error||'Error saving profile')+'</div>';
          return;
        }
        if (adminFields) {
          // governance_role + access_level + region_id all in one call
          var aRes = await apiFetch('/admin/members/'+m.id+'/access', 'PUT', {
            governance_role: adminFields.governance_role,
            access_level: adminFields.access_level,
            region_id: adminFields.region_id
          });
          if (!aRes.success) {
            msgEl.innerHTML = '<div class="error-msg">Profile saved, but admin settings failed: '+(aRes.error||'')+'</div>';
            return;
          }
          if (adminFields.membership_type) {
            await apiFetch('/admin/members/'+m.id+'/membership', 'PUT', { membership_type: adminFields.membership_type });
          }
        }
        msgEl.innerHTML = '<div class="success-msg">Saved.</div>';
        setTimeout(function() { showMemberModal(m.id); if (currentPage === 'admin') loadAdminTab('members'); }, 800);
      } catch(e) { msgEl.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });
  }

  async function renderMatching() {
    var el = document.getElementById('pageContent');
    var html = '<div class="panel"><h2>Intelligent Partner Search</h2>';
    html += '<p class="text-muted mb-16">Describe what you need and our AI engine will find the best candidates, corrected for Gini equity.</p>';
    html += '<div class="form-grid">';
    html += '<div class="form-group full"><label>Describe what you need</label><textarea id="matchQuery" rows="3" placeholder="E.g.: I need a healthcare partner in Orlando with insurance billing experience"></textarea></div>';
    html += '<div class="form-group"><label>Sector</label><select id="matchSector">'+sectorOptions()+'</select></div>';
    html += '<div class="form-group"><label>Region</label><select id="matchRegion">'+regionOptions()+'</select></div>';
    html += '<div class="form-group"><label>Country</label><input id="matchCountry" placeholder="e.g. United States"></div>';
    html += '<div class="form-group"><button class="btn btn-primary mt-16" id="matchBtn" style="margin-top:20px">Search</button></div>';
    html += '</div></div>';
    html += '<div id="matchResults"></div>';
    el.innerHTML = html;

    document.getElementById('matchBtn').addEventListener('click', async function() {
      var out = document.getElementById('matchResults');
      out.innerHTML = '<div class="loading">Searching for matches...</div>';
      var body = {
        query_text: document.getElementById('matchQuery').value.trim(),
        sector: document.getElementById('matchSector').value || undefined,
        region_id: document.getElementById('matchRegion').value || undefined,
        country: document.getElementById('matchCountry').value.trim() || undefined,
        limit: 10
      };
      try {
        var res = await apiFetch('/match', { method:'POST', body:JSON.stringify(body) });
        if (!res.success) { out.innerHTML = '<div class="error-msg">'+(res.error||'Search error')+'</div>'; return; }
        var results = res.data.results || [];
        if (results.length === 0) { out.innerHTML = '<div class="panel"><p class="text-muted">No matches found.</p></div>'; return; }
        var h = '<div class="panel"><h2>Results ('+results.length+' of '+res.data.total_candidates+' candidates)</h2>';
        h += '<p class="text-sm text-muted" style="margin:0 0 12px 0">Click any candidate card to see full profile details.</p>';
        h += '<div class="result-cards">';
        results.forEach(function(r, idx) {
          h += '<div class="result-card matchCard" data-mid="'+r.member_id+'" style="cursor:pointer;transition:transform 0.1s,box-shadow 0.1s" onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 4px 12px rgba(0,0,0,0.1)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">';
          h += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
          h += '<div><div class="rc-name">#'+(idx+1)+' '+esc(r.first_name)+' '+esc(r.last_name)+'</div>';
          h += '<div class="rc-company">'+esc(r.company_name||'--')+'</div></div>';
          h += '<div style="text-align:right;font-size:22px;font-weight:800;color:var(--primary)">'+((r.final_score||0)*100).toFixed(0)+'</div>';
          h += '</div>';
          h += '<div class="rc-meta mt-12"><span>'+esc(r.sector||'--')+'</span><span>'+esc(r.country||'--')+'</span><span>'+esc(r.region_name||'--')+'</span></div>';
          h += '<div class="rc-score"><span>Similarity: '+((r.similarity_score||0)*100).toFixed(0)+'%</span>';
          h += '<span>Trust: '+((r.trust_score||0)*100).toFixed(0)+'%</span>';
          h += '<span>Gini: '+(r.gini_correction||1).toFixed(3)+'</span></div>';
          h += '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">';
          h += '<button class="btn btn-primary btn-sm matchViewBtn" data-mid="'+r.member_id+'" style="padding:4px 10px;font-size:12px" onclick="event.stopPropagation()">View Profile</button>';
          if (r.email) h += '<a class="btn btn-outline btn-sm" href="mailto:'+esc(r.email)+'" onclick="event.stopPropagation()" style="padding:4px 10px;font-size:12px;text-decoration:none">Email</a>';
          h += '</div>';
          h += '</div>';
        });
        h += '</div></div>';
        out.innerHTML = h;
        // Wire card + view button to open the directory member modal (which has full details + admin Edit)
        out.querySelectorAll('.matchCard').forEach(function(card) {
          card.addEventListener('click', function() { showMemberModal(this.dataset.mid); });
        });
        out.querySelectorAll('.matchViewBtn').forEach(function(b) {
          b.addEventListener('click', function(ev) { ev.stopPropagation(); showMemberModal(this.dataset.mid); });
        });
      } catch(e) {
        out.innerHTML = '<div class="error-msg">Error: '+esc(e.message)+'</div>';
      }
    });
  }

  var LIFECYCLE = ['proposal','analysis','team','resources','execution','completed'];

  function lifecycleDots(status) {
    var idx = LIFECYCLE.indexOf(status);
    if (idx === -1) idx = 0;
    var h = '<div class="lifecycle-dots">';
    for (var i = 0; i < LIFECYCLE.length; i++) {
      if (i > 0) h += '<div class="lifecycle-line'+(i<=idx?' done':'')+'"></div>';
      var cls = i < idx ? 'done' : (i === idx ? 'active' : '');
      h += '<div class="lifecycle-dot '+cls+'" title="'+LIFECYCLE[i]+'">'+(i+1)+'</div>';
    }
    h += '</div>';
    return h;
  }

  async function renderProjects() {
    var el = document.getElementById('pageContent');
    var activeTab = window._projectsTab || 'all';
    var tabBtn = function(id, label) {
      var active = activeTab === id;
      return '<button class="btn '+(active?'btn-primary':'btn-outline')+' btn-sm" data-tab="'+id+'" style="margin-right:6px">'+label+'</button>';
    };
    el.innerHTML =
      '<div class="flex-between mb-16">' +
        '<div>' + tabBtn('all','All') + tabBtn('mine','My Projects') + tabBtn('invited','Invited / Joined') + tabBtn('open_rfq','Matching RFQs & Roles') + '</div>' +
        '<button class="btn btn-primary" id="newProjectBtn">+ New Project</button>' +
      '</div>' +
      '<div id="projectList"><div class="loading">Loading...</div></div>';

    document.getElementById('newProjectBtn').addEventListener('click', showNewProjectForm);
    el.querySelectorAll('button[data-tab]').forEach(function(b) {
      b.addEventListener('click', function() {
        window._projectsTab = this.dataset.tab;
        renderProjects();
      });
    });
    loadProjects();
  }

  async function loadProjects() {
    var out = document.getElementById('projectList');
    var tab = window._projectsTab || 'all';
    var qs = 'limit=50' + (tab === 'mine' ? '&scope=mine' : tab === 'invited' ? '&scope=invited' : tab === 'open_rfq' ? '&scope=open_rfq' : '');
    try {
      var res = await apiFetch('/projects?' + qs);
      if (!res.success) { out.innerHTML = '<div class="error-msg">Error loading projects</div>'; return; }
      var projects = res.data.projects || [];

      // For Matching tab, also pull Exchange RFQs matching the viewer's sector
      var matchingRFQs = [];
      if (tab === 'open_rfq' && currentMember && currentMember.sector) {
        try {
          var rfqRes = await apiFetch('/exchange/rfqs?limit=100');
          if (rfqRes && rfqRes.success && rfqRes.data && Array.isArray(rfqRes.data.rfqs)) {
            matchingRFQs = rfqRes.data.rfqs.filter(function(r) {
              return r.sector === currentMember.sector && r.requester_member_id !== currentMember.id;
            });
          }
        } catch (e) { /* exchange optional, ignore */ }
      }

      if (projects.length === 0 && matchingRFQs.length === 0) {
        var emptyMsg = tab === 'mine' ? 'You have not proposed any projects yet. Click + New Project to start one.' :
                       tab === 'invited' ? 'No invitations or memberships yet. When a proposer invites you, projects show up here.' :
                       tab === 'open_rfq' ? 'Nothing matches your profile right now. Update your sector in My Profile, or check back later. (This view shows project roles you can bid on + Exchange RFQs in your sector.)' :
                       'No projects yet. Create your first one.';
        out.innerHTML = '<div class="panel"><p class="text-muted">'+emptyMsg+'</p></div>';
        return;
      }
      var h = '';
      if (tab === 'open_rfq' && matchingRFQs.length > 0) {
        h += '<div style="margin-bottom:18px"><h3 style="margin:0 0 8px 0">Exchange RFQs matching your sector ('+matchingRFQs.length+')</h3>';
        h += '<div class="result-cards">';
        matchingRFQs.forEach(function(r) {
          h += '<div class="result-card" style="border-left:4px solid #28a745;cursor:default">';
          h += '<div class="rc-name">'+esc(r.title)+'</div>';
          h += '<div class="rc-company"><span style="background:#28a745;color:white;padding:2px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;font-weight:700;margin-right:6px">Exchange RFQ</span>'+esc(r.requester_name||'--')+(r.company_name?' &middot; '+esc(r.company_name):'')+'</div>';
          h += '<div class="rc-meta mt-12"><span>'+esc(r.sector||'--')+'</span>';
          if (r.budget_range) h += '<span>'+esc(r.budget_range)+'</span>';
          if (r.deadline) h += '<span>Deadline: '+formatDate(r.deadline)+'</span>';
          h += '</div>';
          h += '<div style="margin-top:8px"><button class="btn btn-primary btn-sm openRfqBtn" data-rid="'+r.id+'" style="background:#28a745">View / Respond</button></div>';
          h += '</div>';
        });
        h += '</div></div>';
      }
      if (projects.length > 0) {
        if (tab === 'open_rfq') h += '<h3 style="margin:0 0 8px 0">Project roles you can bid on ('+projects.length+')</h3>';
      }
      h += '<div class="result-cards">';
      projects.forEach(function(p) {
        h += '<div class="result-card" data-project-id="'+p.id+'" style="position:relative">';
        // Countdown badge top-right
        if (p.recruitment_deadline && p.plan_status === 'recruiting' && !p.recruitment_closed_at) {
          h += '<div class="countdown-badge" data-deadline="'+esc(p.recruitment_deadline)+'" style="position:absolute;top:8px;right:8px;background:#28a745;color:white;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;text-align:center;line-height:1.2"><div class="countdown-time">--</div><div style="opacity:0.85;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:0.5px">left in bidding</div></div>';
        } else if (p.recruitment_closed_at) {
          h += '<div style="position:absolute;top:8px;right:8px;background:#999;color:white;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700">CLOSED</div>';
        }
        h += '<div class="flex-between" style="padding-right:90px"><div class="rc-name">'+esc(p.title)+(p.is_stub?' &#128274;':'')+'</div></div>';
        var planStatus = p.plan_status ? '<span style="background:var(--accent-light);color:var(--accent-dark);padding:2px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;font-weight:700;margin-right:6px">'+esc(p.plan_status)+'</span>' : '';
        var roleBadge = '';
        if (p.is_mine) roleBadge = '<span style="background:#1a3d8f;color:white;padding:2px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;font-weight:700;margin-right:6px">Proposer</span>';
        else if (p.is_participant) roleBadge = '<span style="background:#28a745;color:white;padding:2px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;font-weight:700;margin-right:6px">Member</span>';
        else if (p.has_invite) roleBadge = '<span style="background:#e65100;color:white;padding:2px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;font-weight:700;margin-right:6px">Invited</span>';
        h += '<div class="rc-company">'+roleBadge+planStatus+esc(p.proposer_name||'--')+' | '+esc(p.sector||'--')+'</div>';

          h += '<div class="text-sm text-muted" style="font-style:italic">In private execution -- participants only</div>';
        } else {
          if (p.budget_est) h += '<div class="text-sm text-muted">Est. budget: $'+Number(p.budget_est).toLocaleString()+'</div>';
          if (p.monte_carlo_result && p.monte_carlo_result.success_probability) {

        }

        if (tab === 'open_rfq' && Array.isArray(p.matched_roles) && p.matched_roles.length > 0) {
          h += '<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--gray-300)">';
          h += '<div class="text-sm" style="font-weight:700;margin-bottom:6px">Roles matching your profile:</div>';
          p.matched_roles.forEach(function(r) {
            var pct = Math.round(r.score * 100);
            var pcol = pct >= 60 ? '#28a745' : pct >= 40 ? '#e65100' : 'var(--gray-700)';
            h += '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:4px 0">';
            h += '<div class="text-sm"><strong>'+esc(r.role_title)+'</strong>';
            if (r.commitment_pct) h += ' <span class="text-muted">('+r.commitment_pct+'%)</span>';
            h += ' <span style="color:'+pcol+';font-weight:700;margin-left:6px">'+pct+'% match</span></div>';
            h += '<button class="btn btn-primary btn-sm bidBtn" data-pid="'+p.id+'" data-ridx="'+r.role_index+'" data-rt="'+esc(r.role_title)+'" style="background:#28a745;padding:4px 12px;font-size:12px" onclick="event.stopPropagation()">Submit Bid</button>';
            h += '</div>';
          });
          h += '</div>';
        }
        h += '</div>';
      });

      out.querySelectorAll('.bidBtn').forEach(function(btn) {
        btn.addEventListener('click', async function(ev) {
          ev.stopPropagation();

          var ridx = parseInt(this.dataset.ridx);
          var rt = this.dataset.rt;
          var note = prompt('Submit bid for role: '+rt+'\n\nOptional message to the proposer (why you are a fit):', '');
          if (note === null) return;
          this.disabled = true;
          this.textContent = 'Submitting...';

              method: 'POST',
              body: JSON.stringify({ role_index: ridx, message: note || 'Self-nominated via Open RFQs' })
            });

            alert(e.message);
          }
        });
      });
      updateCountdowns();
      if (window._countdownInterval) clearInterval(window._countdownInterval);
      window._countdownInterval = setInterval(updateCountdowns, 60000);
    } catch(e) {
      out.innerHTML = '<div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

  function updateCountdowns() {
    var now = Date.now();
    document.querySelectorAll('.countdown-badge').forEach(function(badge) {
      var deadline = new Date(badge.dataset.deadline).getTime();
      var ms = deadline - now;
      var timeEl = badge.querySelector('.countdown-time');
      if (ms <= 0) {
        timeEl.textContent = 'EXPIRED';
        badge.style.background = '#999';
        return;
      }
      var d = Math.floor(ms / 86400000);
      var h = Math.floor((ms % 86400000) / 3600000);
      var m = Math.floor((ms % 3600000) / 60000);
      var label;
      if (d > 0) label = d + 'd ' + h + 'h ' + m + 'm';
      else if (h > 0) label = h + 'h ' + m + 'm';
      else label = m + 'm';
      timeEl.textContent = label;
      // Color band: green > 7d, yellow 1-7d, red < 1d
      if (d > 7) badge.style.background = '#28a745';
      else if (d >= 1) badge.style.background = '#e65100';
      else badge.style.background = 'var(--red)';
    });
  }

      bh += '<div style="margin-top:8px;font-weight:700;text-align:right">Current total: $'+Number(tot).toLocaleString()+'</div>';
      h += planSection('Budget Breakdown', bh);
    }

    // === Timeline Milestones ===
    if (Array.isArray(p.timeline_milestones)) {
      var mh = '<div data-pe-arr-list="timeline_milestones">';
      p.timeline_milestones.forEach(function(m, i) {
        mh += '<div data-pe-arr-row="timeline_milestones.'+i+'" style="border:1px solid var(--gray-200);border-radius:6px;padding:8px;margin-bottom:6px;display:grid;grid-template-columns:80px 1fr 32px;gap:6px">';
        mh += '<div><label class="text-sm">Month</label>'+peNumberInput('timeline_milestones.'+i+'.month', m.month)+'</div>';
        mh += '<div><label class="text-sm">Milestone</label>'+peTextInput('timeline_milestones.'+i+'.milestone', m.milestone)+
              '<label class="text-sm" style="margin-top:4px;display:block">Deliverable</label>'+peTextArea('timeline_milestones.'+i+'.deliverable', m.deliverable, 2)+'</div>';
        mh += '<button type="button" class="btn btn-outline btn-sm" data-pe-remove="timeline_milestones.'+i+'" style="align-self:start;height:32px">x</button>';
        mh += '</div>';
      });
      mh += '</div><button type="button" class="btn btn-outline btn-sm" data-pe-add="timeline_milestones" data-pe-add-type="milestone">+ Add milestone</button>';
      h += planSection('Timeline Milestones', mh);
    }

    // === Risks ===
    if (Array.isArray(p.risks)) {
      var rkh = '<div data-pe-arr-list="risks">';
      p.risks.forEach(function(r, i) {
        rkh += '<div data-pe-arr-row="risks.'+i+'" style="border:1px solid var(--gray-200);border-radius:6px;padding:8px;margin-bottom:6px">';
        rkh += '<div style="display:flex;gap:6px;align-items:start">';
        rkh += '<div style="flex:2"><label class="text-sm">Risk</label>'+peTextInput('risks.'+i+'.risk', r.risk)+'</div>';
        rkh += '<div style="flex:0 0 110px"><label class="text-sm">Likelihood</label>'+peSelect('risks.'+i+'.likelihood', r.likelihood||'medium', ['low','medium','high'])+'</div>';
        rkh += '<button type="button" class="btn btn-outline btn-sm" data-pe-remove="risks.'+i+'" style="align-self:end;height:32px">x</button>';
        rkh += '</div>';
        rkh += '<label class="text-sm" style="margin-top:4px;display:block">Mitigation</label>'+peTextArea('risks.'+i+'.mitigation', r.mitigation, 2);
        rkh += '</div>';
      });
      rkh += '</div><button type="button" class="btn btn-outline btn-sm" data-pe-add="risks" data-pe-add-type="risk">+ Add risk</button>';
      h += planSection('Risks', rkh);
    }

    // === Success KPIs ===
    if (Array.isArray(p.success_kpis)) {
      var kh = '<div data-pe-arr-list="success_kpis">';
      p.success_kpis.forEach(function(k, i) {
        kh += '<div data-pe-arr-row="success_kpis.'+i+'" style="display:grid;grid-template-columns:2fr 2fr 1fr 32px;gap:6px;margin-bottom:4px">';
        kh += '<div><label class="text-sm">KPI</label>'+peTextInput('success_kpis.'+i+'.kpi', k.kpi)+'</div>';
        kh += '<div><label class="text-sm">Target</label>'+peTextInput('success_kpis.'+i+'.target', k.target)+'</div>';
        kh += '<div><label class="text-sm">Period</label>'+peTextInput('success_kpis.'+i+'.measurement_period', k.measurement_period)+'</div>';
        kh += '<button type="button" class="btn btn-outline btn-sm" data-pe-remove="success_kpis.'+i+'" style="align-self:end;height:32px">x</button>';
        kh += '</div>';
      });
      kh += '</div><button type="button" class="btn btn-outline btn-sm" data-pe-add="success_kpis" data-pe-add-type="kpi">+ Add KPI</button>';
      h += planSection('Success KPIs', kh);
    }

    openModal(h);

    // === Wire all field changes ===
    function setByPath(obj, path, value) {
      var parts = path.split('.');
      var cur = obj;
      for (var i = 0; i < parts.length - 1; i++) {
        var key = parts[i];
        // numeric -> array index
        if (/^\d+$/.test(key)) key = parseInt(key);
        if (cur[key] === undefined || cur[key] === null) {
          cur[key] = /^\d+$/.test(parts[i+1]) ? [] : {};
        }
        cur = cur[key];
      }
      var lastKey = parts[parts.length - 1];
      if (/^\d+$/.test(lastKey)) lastKey = parseInt(lastKey);
      cur[lastKey] = value;
    }

    document.querySelectorAll('[data-pe-path]').forEach(function(el) {
      el.addEventListener('input', function() {
        var path = this.dataset.pePath;
        var t = this.dataset.peType;
        var v;
        if (t === 'number') v = parseFloat(this.value) || 0;
        else if (t === 'bool') v = this.checked;
        else v = this.value;
        setByPath(window._currentDraftPlan, path, v);
      });
      el.addEventListener('change', function() {
        var path = this.dataset.pePath;
        var t = this.dataset.peType;
        var v;
        if (t === 'number') v = parseFloat(this.value) || 0;
        else if (t === 'bool') v = this.checked;
        else v = this.value;
        setByPath(window._currentDraftPlan, path, v);
      });
    });

    // Add buttons
    document.querySelectorAll('[data-pe-add]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var path = this.dataset.peAdd;
        var type = this.dataset.peAddType;
        var newItem;
        switch (type) {
          case 'string': newItem = ''; break;
          case 'phase': newItem = { name: 'New phase', duration_months: 1, activities: [] }; break;
          case 'region': newItem = { region: '', rationale: '' }; break;
          case 'pricing_tier': newItem = { name: '', price_usd: 0, period: 'monthly' }; break;
          case 'role': newItem = { role_title: 'New Role', responsibilities: [], required_skills: [], preferred_sectors: [], preferred_regions: [], commitment_pct: 50, must_have: false }; break;
          case 'budget': newItem = { category: '', phase: '', amount_usd: 0 }; break;
          case 'milestone': newItem = { month: 1, milestone: '', deliverable: '' }; break;
          case 'risk': newItem = { risk: '', likelihood: 'medium', mitigation: '' }; break;
          case 'kpi': newItem = { kpi: '', target: '', measurement_period: 'monthly' }; break;
          default: newItem = '';
        }
        // Navigate to the array and push
        var parts = path.split('.');
        var cur = window._currentDraftPlan;
        for (var i = 0; i < parts.length; i++) {
          if (cur[parts[i]] === undefined) cur[parts[i]] = [];
          cur = cur[parts[i]];
        }
        if (!Array.isArray(cur)) {
          // Re-navigate
          cur = window._currentDraftPlan;
          for (var j = 0; j < parts.length - 1; j++) cur = cur[parts[j]];
          if (!Array.isArray(cur[parts[parts.length-1]])) cur[parts[parts.length-1]] = [];
          cur[parts[parts.length-1]].push(newItem);
        } else {
          cur.push(newItem);
        }
        renderPlanEditor();
      });
    });

    // Remove buttons
    document.querySelectorAll('[data-pe-remove]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var path = this.dataset.peRemove; // e.g. "team_roles_required.2"
        var parts = path.split('.');
        var idx = parseInt(parts.pop());
        var cur = window._currentDraftPlan;
        for (var i = 0; i < parts.length; i++) cur = cur[parts[i]];
        if (Array.isArray(cur)) cur.splice(idx, 1);
        renderPlanEditor();
      });
    });

    document.getElementById('savePlanBtn').addEventListener('click', async function() {
      var msg = document.getElementById('planMsg');
      msg.innerHTML = '<div class="text-muted text-sm">Saving draft...</div>';
      try {
        var r = await apiFetch('/projects/'+pid+'/plan', { method:'PUT', body:JSON.stringify({ plan_json: window._currentDraftPlan }) });
        if (r.success) msg.innerHTML = '<div class="success-msg">Draft saved. Stays private to you until you click Publish Plan.</div>';
        else msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>';
      } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });

    document.getElementById('publishPlanBtn').addEventListener('click', async function() {
      if (!confirm('Publish plan? It will become visible to all chamber members. You can no longer edit privately after this.')) return;
      var msg = document.getElementById('planMsg');
      msg.innerHTML = '<div class="text-muted text-sm">Saving + publishing...</div>';
      try {
        var save = await apiFetch('/projects/'+pid+'/plan', { method:'PUT', body:JSON.stringify({ plan_json: window._currentDraftPlan }) });
        if (!save.success) { msg.innerHTML = '<div class="error-msg">'+(save.error||'Save failed')+'</div>'; return; }
        var r = await apiFetch('/projects/'+pid+'/publish', { method:'POST' });
        if (r.success) {
          msg.innerHTML = '<div class="success-msg">Plan published. Project is now live in the feed.</div>';
          setTimeout(function() { closeModal(); loadProjects(); }, 1200);
        } else {
          msg.innerHTML = '<div class="error-msg">'+(r.error||'Publish failed')+'</div>';
        }
      } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });
  }

  function planSection(title, body) {
    return '<details open style="border:1px solid var(--gray-200);border-radius:8px;margin-bottom:10px"><summary style="padding:10px 14px;cursor:pointer;font-weight:700;background:var(--gray-50);border-radius:8px 8px 0 0">'+esc(title)+'</summary><div style="padding:14px">'+body+'</div></details>';
  }

  function renderGTM(gtm) {
    var phases = (gtm.phases||[]).map(function(ph){
      return '<div style="margin-bottom:8px;padding:8px;background:var(--gray-50);border-radius:6px"><strong>'+esc(ph.name||'')+'</strong> <span class="text-muted text-sm">('+(ph.duration_months||0)+' months)</span><ul style="margin:4px 0 0 20px">'+(ph.activities||[]).map(function(a){return '<li>'+esc(a)+'</li>';}).join('')+'</ul></div>';
    }).join('');
    var regions = (gtm.regional_priorities||[]).map(function(r){
      return '<li><strong>'+esc(r.region||'')+':</strong> '+esc(r.rationale||'')+'</li>';
    }).join('');
    return phases +
      '<div style="margin-top:8px"><strong>Channel Strategy:</strong> '+esc(gtm.channel_strategy||'')+'</div>'+
      '<div style="margin-top:8px"><strong>Regional Priorities:</strong><ul style="margin:4px 0 0 20px">'+regions+'</ul></div>';
  }

  function renderFullPlan(plan, fillStatus) {
    if (!plan) return '';
    var h = '<h3 style="margin:24px 0 12px;border-top:2px solid var(--gray-200);padding-top:18px">Business Plan</h3>';

    if (plan.executive_summary) {
      h += planSection('Executive Summary', '<p style="white-space:pre-wrap;font-size:14px">'+esc(plan.executive_summary)+'</p>');
    }
    if (plan.problem_market) {
      var pm = plan.problem_market;
      h += planSection('Problem & Market',
        '<p style="white-space:pre-wrap;margin-bottom:8px">'+esc(pm.problem_statement||'')+'</p>'+
        '<table style="width:100%;font-size:13px"><tr><td><strong>TAM:</strong></td><td>$'+Number(pm.tam_usd||0).toLocaleString()+'</td></tr>'+
        '<tr><td><strong>SAM:</strong></td><td>$'+Number(pm.sam_usd||0).toLocaleString()+'</td></tr>'+
        '<tr><td><strong>SOM:</strong></td><td>$'+Number(pm.som_usd||0).toLocaleString()+'</td></tr></table>'+
        (pm.target_segments ? '<div style="margin-top:8px"><strong>Target Segments:</strong> '+(pm.target_segments||[]).map(esc).join(', ')+'</div>' : '')
      );
    }
    if (plan.solution) {
      h += planSection('Solution',

        '<div style="margin-top:8px"><strong>Differentiators:</strong><ul style="margin:6px 0 0 20px">'+
          (plan.solution.key_differentiators||[]).map(function(d){return '<li>'+esc(d)+'</li>';}).join('')+'</ul></div>'+
        '<div style="margin-top:8px"><strong>Tech Stack:</strong> '+(plan.solution.tech_stack_or_methodology||[]).map(esc).join(', ')+'</div>'
      );
    }
    if (plan.go_to_market) h += planSection('Go-to-Market', renderGTM(plan.go_to_market));
    if (plan.revenue_model) {
      var rm = plan.revenue_model;
      var pricing = (rm.pricing_tiers||[]).map(function(t){
        return '<li><strong>'+esc(t.name)+':</strong> $'+Number(t.price_usd||0).toLocaleString()+' / '+esc(t.period||'')+'</li>';
      }).join('');
      h += planSection('Revenue Model',
        '<ul style="margin:0 0 8px 20px">'+pricing+'</ul>'+
        '<div><strong>Year 1 Revenue Estimate:</strong> $'+Number(rm.year1_revenue_estimate_usd||0).toLocaleString()+'</div>'+
        '<div><strong>Year 3 Revenue Estimate:</strong> $'+Number(rm.year3_revenue_estimate_usd||0).toLocaleString()+'</div>'
      );
    }
    if (Array.isArray(plan.team_roles_required)) {
      var roles = plan.team_roles_required.map(function(r,i){
        var fillInfo = '';
        if (fillStatus && fillStatus[i]) {
          var fs = fillStatus[i];
          if (fs.filled_count > 0) {
            fillInfo = '<div style="margin-top:6px;color:#28a745;font-size:11px;font-weight:700">FILLED by '+fs.filled_by.map(function(f){return esc(f.name);}).join(', ')+'</div>';
          } else {
            fillInfo = '<div style="margin-top:6px;color:var(--accent-dark);font-size:11px;font-weight:700">OPEN</div>';
          }
        }
        return '<div style="border:1px solid var(--gray-200);border-radius:6px;padding:10px;margin-bottom:8px">'+
          '<div style="font-weight:700">'+esc(r.role_title||'Role '+(i+1))+(r.must_have?' <span style="background:var(--red);color:white;padding:2px 6px;border-radius:3px;font-size:10px;margin-left:6px">MUST-HAVE</span>':'')+'</div>'+
          '<div class="text-sm text-muted" style="margin:4px 0">Skills: '+(r.required_skills||[]).map(esc).join(', ')+'</div>'+
          '<div class="text-sm text-muted">Sectors: '+(r.preferred_sectors||[]).map(esc).join(', ')+' | Regions: '+(r.preferred_regions||[]).map(esc).join(', ')+'</div>'+
          '<div class="text-sm" style="margin-top:4px">Commitment: '+(r.commitment_pct||0)+'%</div>'+
          fillInfo +
          '</div>';
      }).join('');
      h += planSection('Team Roles ('+plan.team_roles_required.length+')', roles);
    }
    if (Array.isArray(plan.budget_breakdown)) {
      var rows = plan.budget_breakdown.map(function(b){
        return '<tr><td>'+esc(b.category||'')+'</td><td>'+esc(b.phase||'')+'</td><td style="text-align:right">$'+Number(b.amount_usd||0).toLocaleString()+'</td></tr>';
      }).join('');
      var tot = plan.budget_breakdown.reduce(function(s,b){return s+(b.amount_usd||0);},0);
      h += planSection('Budget Breakdown',
        '<table style="width:100%;font-size:13px"><thead><tr><th style="text-align:left">Category</th><th style="text-align:left">Phase</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+
          rows+'<tr style="font-weight:700;border-top:2px solid var(--gray-300)"><td colspan="2">TOTAL</td><td style="text-align:right">$'+Number(tot).toLocaleString()+'</td></tr></tbody></table>'
      );
    }
    if (Array.isArray(plan.timeline_milestones)) {
      var ms = plan.timeline_milestones.map(function(m){
        return '<div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--gray-100)"><div style="font-weight:700;min-width:60px">M'+(m.month||0)+'</div><div><div style="font-weight:600">'+esc(m.milestone||'')+'</div><div class="text-sm text-muted">'+esc(m.deliverable||'')+'</div></div></div>';
      }).join('');
      h += planSection('Timeline Milestones', ms);
    }
    if (Array.isArray(plan.risks)) {
      var rk = plan.risks.map(function(r){
        var col = r.likelihood==='high'?'var(--red)':(r.likelihood==='medium'?'#e65100':'#28a745');
        return '<div style="padding:8px 0;border-bottom:1px solid var(--gray-100)"><div><strong>'+esc(r.risk||'')+'</strong> <span style="color:'+col+';font-size:11px;text-transform:uppercase;font-weight:700;margin-left:6px">'+esc(r.likelihood||'')+'</span></div><div class="text-sm text-muted">Mitigation: '+esc(r.mitigation||'')+'</div></div>';
      }).join('');
      h += planSection('Risks', rk);
    }
    if (Array.isArray(plan.success_kpis)) {
      var k = plan.success_kpis.map(function(x){
        return '<tr><td style="font-weight:600">'+esc(x.kpi||'')+'</td><td>'+esc(x.target||'')+'</td><td class="text-muted text-sm">'+esc(x.measurement_period||'')+'</td></tr>';
      }).join('');
      h += planSection('Success KPIs', '<table style="width:100%;font-size:13px"><thead><tr><th style="text-align:left">KPI</th><th style="text-align:left">Target</th><th style="text-align:left">Period</th></tr></thead><tbody>'+k+'</tbody></table>');
    }
    return h;
  }
