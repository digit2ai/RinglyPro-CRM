      el.addEventListener('input', function() {
        var t = this.dataset.peType;
        var v = t === 'number' ? parseFloat(this.value) || 0 : (t === 'bool' ? this.checked : this.value);
        setByPath(window._amendingPlan, this.dataset.pePath, v);
      });
      el.addEventListener('change', function() {
        var t = this.dataset.peType;
        var v = t === 'number' ? parseFloat(this.value) || 0 : (t === 'bool' ? this.checked : this.value);
        setByPath(window._amendingPlan, this.dataset.pePath, v);
      });
    });

    document.getElementById('amendCancelBtn').addEventListener('click', function() {
      showProjectDetail(projectId);
    });

    document.getElementById('amendSubmitBtn').addEventListener('click', async function() {
      var reason = document.getElementById('amendReason').value.trim();
      if (reason.length < 10) {
        document.getElementById('amendMsg').innerHTML = '<div class="error-msg">Please provide a reason (at least 10 characters)</div>';
        return;
      }
      var msg = document.getElementById('amendMsg');
      msg.innerHTML = '<div class="text-muted text-sm">Submitting amendment + invalidating signatures...</div>';
      try {
        var r = await apiFetch('/projects/'+projectId+'/amend-plan', {
          method: 'POST',
          body: JSON.stringify({ plan_json: window._amendingPlan, reason })
        });
        if (r.success) {
          msg.innerHTML = '<div class="success-msg">Amendment submitted. '+r.data.signatures_invalidated+' signatures invalidated. Re-sign required.</div>';
          setTimeout(function(){ closeModal(); showProjectDetail(projectId); }, 2000);
        } else {
          msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>';
        }
      } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });
  }

  // ============================================================
  // STAGE 3 -- Private PM Workspace UI
  // ============================================================

  async function openWorkspaceModal(projectId) {
    // Close the project detail modal if open, then render workspace as a full page
    closeModal();
    window._wsProjectId = projectId;
    window._wsActiveTab = 'overview';
    currentPage = 'workspace';
    document.querySelectorAll('.sidebar-nav-item').forEach(function(i) { i.classList.remove('active'); });
    document.getElementById('pageTitle').textContent = 'Project Workspace #' + projectId;
    document.getElementById('pageContent').innerHTML = renderWorkspaceShell(projectId);
    wireWorkspaceTabs();
    loadWorkspaceTab('overview');
  }

  function renderWorkspaceShell(projectId) {
    var h = '<div style="background:var(--white);padding:14px 18px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:14px">';
    h += '<div class="flex-between" style="margin-bottom:10px">';
    h += '<button class="btn btn-outline btn-sm" id="wsBackBtn">&larr; Back to Projects</button>';
    h += '<span class="text-sm text-muted">Project #'+projectId+' &middot; Private &middot; participants only</span>';
    h += '</div>';
    h += '<div class="tabs" style="border-bottom:none;flex-wrap:wrap">';
    var tabs = ['overview','tasks','milestones','discussion','documents','team','plan'];
    tabs.forEach(function(t, i) {
      h += '<button class="tab-btn'+(i===0?' active':'')+'" data-ws-tab="'+t+'">'+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';
    });
    h += '</div></div>';
    h += '<div id="wsContent"><div class="loading">Loading...</div></div>';
    setTimeout(function() {
      var b = document.getElementById('wsBackBtn');
      if (b) b.addEventListener('click', function() { navigate('projects'); });
    }, 0);
    return h;
  }

  function wireWorkspaceTabs() {
    document.querySelectorAll('button[data-ws-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.remove('active');});
        this.classList.add('active');
        loadWorkspaceTab(this.dataset.wsTab);
      });
    });
  }

  async function loadWorkspaceTab(tab) {
    window._wsActiveTab = tab;
    var pid = window._wsProjectId;
    var el = document.getElementById('wsContent');
    el.innerHTML = '<div class="loading">Loading '+esc(tab)+'...</div>';
    try {
      if (tab === 'overview') return wsRenderOverview(pid, el);
      if (tab === 'tasks') return wsRenderTasks(pid, el);
      if (tab === 'milestones') return wsRenderMilestones(pid, el);
      if (tab === 'discussion') return wsRenderDiscussion(pid, el);
      if (tab === 'documents') return wsRenderDocuments(pid, el);
      if (tab === 'team') return wsRenderTeam(pid, el);
      if (tab === 'plan') return wsRenderPlan(pid, el);
    } catch(e) {
      el.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>';
    }
  }

  async function wsRenderOverview(pid, el) {
    var r = await apiFetch('/projects/'+pid+'/workspace/overview');
    if (!r.success) { el.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; return; }
    var d = r.data;
    window._wsIsOwner = d.viewer && d.viewer.is_owner;

    var h = '';
    if (d.viewer && d.viewer.is_owner) {
      h += '<div style="background:linear-gradient(135deg,#1565c0,#1976d2);color:white;border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px"><span style="font-size:20px">&#128081;</span><div><div style="font-weight:700">You are the Project Owner</div><div style="font-size:12px;opacity:0.85">You can assign leads, manage milestones, edit/delete anything in this workspace</div></div></div>';
    }

    h += '<div class="stat-cards">';
    h += '<div class="stat-card"><div class="label">Total Tasks</div><div class="value">'+d.tasks.total+'</div></div>';
    h += '<div class="stat-card"><div class="label">In Progress</div><div class="value primary">'+d.tasks.doing+'</div></div>';
    h += '<div class="stat-card"><div class="label">Done</div><div class="value" style="color:#28a745">'+d.tasks.done+'</div></div>';
    h += '<div class="stat-card"><div class="label">Milestones</div><div class="value">'+d.milestones.completed+' / '+d.milestones.total+'</div></div>';
    h += '</div>';

    // My Tasks widget (every participant)
    if (d.my_tasks) {
      h += '<div class="stat-cards" style="margin-top:8px">';
      h += '<div class="stat-card" style="border-left:3px solid var(--primary)"><div class="label">My Open Tasks</div><div class="value primary">'+(d.my_tasks.open||0)+'</div></div>';
      h += '<div class="stat-card" style="border-left:3px solid #28a745"><div class="label">My Completed</div><div class="value" style="color:#28a745">'+(d.my_tasks.done||0)+'</div></div>';
      h += '</div>';
    }

    // My Assigned Milestones widget
    if (Array.isArray(d.my_milestones) && d.my_milestones.length > 0) {
      h += '<div class="panel"><h2>My Assigned Milestones</h2>';
      d.my_milestones.forEach(function(m) {
        var col = m.status === 'completed' ? '#28a745' : (m.status === 'in_progress' ? 'var(--primary)' : '#999');
        h += '<div style="padding:8px 0;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between"><span><strong>M'+(m.target_month||'?')+': '+esc(m.title)+'</strong></span>';
        h += '<span style="background:'+col+';color:white;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">'+esc(m.status)+'</span></div>';
      });
      h += '</div>';
    }

    h += '<div class="panel"><h2>Recent Activity</h2>';
    if (d.recent_activity.length === 0) {
      h += '<p class="text-muted text-sm">No activity yet.</p>';
    } else {
      h += '<div>';
      d.recent_activity.forEach(function(a) {
        var icon = a.kind === 'message' ? '&#128172;' : '&#128203;';
        h += '<div style="padding:8px 0;border-bottom:1px solid var(--gray-200);font-size:13px"><strong>'+icon+' '+esc(a.member_name)+'</strong> &middot; <span class="text-muted text-sm">'+new Date(a.created_at).toLocaleString()+'</span><div style="margin-top:2px">'+esc((a.text||'').substring(0,200))+'</div></div>';
      });
      h += '</div>';
    }
    h += '</div>';
    el.innerHTML = h;
  }

  async function wsRenderTasks(pid, el) {
    var r = await apiFetch('/projects/'+pid+'/workspace/tasks');
    if (!r.success) { el.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; return; }
    var tasks = r.data || [];
    var cols = { todo:[], doing:[], review:[], done:[], blocked:[] };
    tasks.forEach(function(t){ if (cols[t.status]) cols[t.status].push(t); });

    var h = '<div class="flex-between mb-12"><div></div><button class="btn btn-primary btn-sm" id="newTaskBtn">+ New Task</button></div>';
    h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">';
    Object.keys(cols).forEach(function(key) {
      var bg = { todo:'#e3f2fd', doing:'#fff3e0', review:'#f3e5f5', done:'#e8f5e9', blocked:'#fce4ec' }[key];
      h += '<div style="background:'+bg+';border-radius:8px;padding:10px;min-height:200px">';
      h += '<div style="font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:1px;margin-bottom:8px">'+key+' ('+cols[key].length+')</div>';
      cols[key].forEach(function(t) {
        var pri = { critical:'#d32f2f', high:'#f57c00', medium:'#1976d2', low:'#388e3c' }[t.priority] || '#1976d2';
        h += '<div class="task-card" data-tid="'+t.id+'" style="background:white;padding:8px;border-radius:6px;margin-bottom:6px;font-size:12px;cursor:pointer;border-left:3px solid '+pri+'">';
        h += '<div style="font-weight:600;margin-bottom:4px">'+esc(t.title)+'</div>';
        if (t.assignee_name) h += '<div class="text-sm text-muted" style="font-size:11px">&#128100; '+esc(t.assignee_name)+'</div>';
        if (t.due_date) h += '<div class="text-sm text-muted" style="font-size:11px">&#128197; '+esc(t.due_date)+'</div>';
        h += '</div>';
      });
      h += '</div>';
    });
    h += '</div>';
    el.innerHTML = h;

    document.getElementById('newTaskBtn').addEventListener('click', function() { showNewTaskForm(pid); });
    document.querySelectorAll('.task-card').forEach(function(c) {
      c.addEventListener('click', function() { showTaskDetail(pid, this.dataset.tid); });
    });
  }

  function showNewTaskForm(pid) {
    var h = '<h2>New Task</h2><form id="newTaskForm" class="form-grid">';
    h += '<div class="form-group full"><label>Title</label><input name="title" required></div>';
    h += '<div class="form-group full"><label>Description</label><textarea name="description" rows="3"></textarea></div>';
    h += '<div class="form-group"><label>Status</label><select name="status"><option value="todo">To Do</option><option value="doing">Doing</option><option value="review">Review</option><option value="done">Done</option><option value="blocked">Blocked</option></select></div>';
    h += '<div class="form-group"><label>Priority</label><select name="priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select></div>';
    h += '<div class="form-group"><label>Due Date</label><input name="due_date" type="date"></div>';
    h += '<div class="form-group full mt-12"><button type="submit" class="btn btn-primary">Create Task</button> <button type="button" class="btn btn-outline" id="cancelTaskBtn">Cancel</button></div>';
    h += '<div id="newTaskMsg"></div></form>';
    openModal(h);
    document.getElementById('cancelTaskBtn').addEventListener('click', function(){ openWorkspaceModal(pid); });
    document.getElementById('newTaskForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var fd = new FormData(this);
      var body = {};
      fd.forEach(function(v,k){ if(v) body[k] = v; });
      var msg = document.getElementById('newTaskMsg');
      msg.innerHTML = '<div class="text-muted text-sm">Creating...</div>';
      try {
        var r = await apiFetch('/projects/'+pid+'/workspace/tasks', { method:'POST', body:JSON.stringify(body) });
        if (r.success) {
          openWorkspaceModal(pid);
          window._wsActiveTab = 'tasks';
          setTimeout(function() {
            document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.toggle('active', b.dataset.wsTab==='tasks');});
            loadWorkspaceTab('tasks');
          }, 100);
        } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
      } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });
  }

  async function showTaskDetail(pid, tid) {
    var r = await apiFetch('/projects/'+pid+'/workspace/tasks');
    if (!r.success) return;
    var t = (r.data || []).find(function(x){return x.id == tid;});
    if (!t) return;
    var h = '<h2 style="margin-bottom:8px">'+esc(t.title)+'</h2>';
    h += '<div class="text-muted text-sm">Status: '+esc(t.status)+' | Priority: '+esc(t.priority)+'</div>';
    h += '<p style="margin:12px 0;font-size:14px;white-space:pre-wrap">'+esc(t.description||'(no description)')+'</p>';
    if (t.assignee_name) h += '<div class="text-sm">Assignee: '+esc(t.assignee_name)+'</div>';
    if (t.due_date) h += '<div class="text-sm">Due: '+esc(t.due_date)+'</div>';
    h += '<div style="margin-top:14px"><label class="text-sm">Move to status:</label><br>';
    ['todo','doing','review','done','blocked'].forEach(function(s) {
      h += '<button class="btn btn-outline btn-sm" data-mvstatus="'+s+'" style="margin:4px 4px 0 0">'+s+'</button>';
    });
    h += '</div>';
    h += '<div id="taskMsg" style="margin-top:10px"></div>';
    h += '<div style="margin-top:12px"><button class="btn btn-outline btn-sm" id="taskCloseBtn">Close</button> <button class="btn btn-danger btn-sm" id="taskDeleteBtn" style="background:var(--red);color:white">Delete</button></div>';
    openModal(h);
    document.getElementById('taskCloseBtn').addEventListener('click', function() { openWorkspaceModal(pid); window._wsActiveTab='tasks'; setTimeout(function(){document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.toggle('active', b.dataset.wsTab==='tasks');}); loadWorkspaceTab('tasks');},100); });
    document.querySelectorAll('button[data-mvstatus]').forEach(function(b) {
      b.addEventListener('click', async function() {
        var msg = document.getElementById('taskMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Moving to '+this.dataset.mvstatus+'...</div>';
        try {
          var r = await apiFetch('/projects/'+pid+'/workspace/tasks/'+tid, { method:'PUT', body:JSON.stringify({ status: this.dataset.mvstatus }) });
          if (r.success) {
            msg.innerHTML = '<div class="success-msg">Moved.</div>';
            setTimeout(function() { openWorkspaceModal(pid); window._wsActiveTab='tasks'; setTimeout(function(){document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.toggle('active', b.dataset.wsTab==='tasks');}); loadWorkspaceTab('tasks');},100); }, 600);
          } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });
    });
    document.getElementById('taskDeleteBtn').addEventListener('click', async function() {
      if (!confirm('Delete task?')) return;
      try {
        var r = await apiFetch('/projects/'+pid+'/workspace/tasks/'+tid, { method:'DELETE' });
        if (r.success) { openWorkspaceModal(pid); window._wsActiveTab='tasks'; setTimeout(function(){document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.toggle('active', b.dataset.wsTab==='tasks');}); loadWorkspaceTab('tasks');},100); }
      } catch(e) { /* ignore */ }
    });
  }

  async function wsRenderMilestones(pid, el) {
    var r = await apiFetch('/projects/'+pid+'/workspace/milestones');
    if (!r.success) { el.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; return; }
    var ms = r.data || [];
    var isOwner = window._wsIsOwner === true;

    var h = '';
    if (ms.length === 0) {
      h = '<div class="panel"><p class="text-muted">No milestones yet. Initialize the workspace from the plan to auto-generate.</p></div>';
    } else {
      h = '<div class="panel"><h2>Milestones</h2>';
      ms.forEach(function(m) {
        var col = m.status === 'completed' ? '#28a745' : (m.status === 'in_progress' ? 'var(--primary)' : '#999');
        h += '<div style="border:1px solid var(--gray-200);border-left:4px solid '+col+';border-radius:6px;padding:12px;margin-bottom:10px">';
        h += '<div class="flex-between"><div><strong>M'+(m.target_month||'?')+': '+esc(m.title)+'</strong></div>';
        h += '<span style="background:'+col+';color:white;padding:3px 10px;border-radius:12px;font-size:11px;text-transform:uppercase;font-weight:700">'+esc(m.status)+'</span></div>';
        if (m.description) h += '<div class="text-sm text-muted" style="margin-top:6px">'+esc(m.description)+'</div>';

        // Leads
        var leadsHtml = '<div class="text-sm" style="margin-top:6px"><strong>Leads:</strong> ';
        if (Array.isArray(m.leads) && m.leads.length > 0) {
          leadsHtml += m.leads.map(function(l){ return '<span style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:10px;font-size:11px;margin-right:4px">'+esc(l.name)+'</span>'; }).join('');
        } else {
          leadsHtml += '<span class="text-muted">No leads assigned</span>';
        }
        if (isOwner) {
          leadsHtml += ' <button class="btn btn-outline btn-sm" data-assign-mid="'+m.id+'" style="padding:2px 8px;font-size:10px">Assign Leads</button>';
        }
        leadsHtml += '</div>';
        h += leadsHtml;

        if (m.budget_allocation_usd) h += '<div class="text-sm" style="margin-top:6px"><strong>Budget:</strong> $'+Number(m.budget_allocation_usd).toLocaleString()+'</div>';
        if (m.escrow_status) h += '<div class="text-sm" style="margin-top:4px"><strong>Escrow:</strong> '+esc(m.escrow_status)+(m.stripe_escrow_id?' ('+esc(m.stripe_escrow_id)+')':'')+'</div>';
        h += '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">';
        if (isOwner && m.escrow_status !== 'funded' && m.escrow_status !== 'released' && m.budget_allocation_usd) {
          h += '<button class="btn btn-outline btn-sm" data-fund="'+m.id+'">Fund Escrow</button>';
        }
        if (isOwner && m.escrow_status === 'funded') {
          h += '<button class="btn btn-primary btn-sm" data-release="'+m.id+'">Release Escrow + Mark Complete</button>';
        }
        if (m.status !== 'completed') {
          h += '<button class="btn btn-outline btn-sm" data-status="in_progress" data-mid="'+m.id+'">Start</button>';
          h += '<button class="btn btn-accent btn-sm" data-status="completed" data-mid="'+m.id+'">Complete</button>';
        }
        h += '</div></div>';
      });
      h += '</div>';
    }
    el.innerHTML = h;

    document.querySelectorAll('button[data-fund]').forEach(function(b) {
      b.addEventListener('click', async function() {
        await apiFetch('/projects/'+pid+'/workspace/milestones/'+this.dataset.fund+'/fund-escrow', { method:'POST' });
        loadWorkspaceTab('milestones');
      });
    });
    document.querySelectorAll('button[data-release]').forEach(function(b) {
      b.addEventListener('click', async function() {
        await apiFetch('/projects/'+pid+'/workspace/milestones/'+this.dataset.release+'/release-escrow', { method:'POST' });
        loadWorkspaceTab('milestones');
      });
    });
    document.querySelectorAll('button[data-status]').forEach(function(b) {
      b.addEventListener('click', async function() {
        await apiFetch('/projects/'+pid+'/workspace/milestones/'+this.dataset.mid, { method:'PUT', body:JSON.stringify({ status: this.dataset.status }) });
        loadWorkspaceTab('milestones');
      });
    });
    document.querySelectorAll('button[data-assign-mid]').forEach(function(b) {
      b.addEventListener('click', function() { showAssignLeadsModal(pid, this.dataset.assignMid); });
    });
  }

  async function showAssignLeadsModal(pid, mid) {
    // Fetch project team
    var r = await apiFetch('/projects/'+pid);
    if (!r.success) return;
    var team = r.data.team || [];

    // Fetch current milestone
    var ms = await apiFetch('/projects/'+pid+'/workspace/milestones');
    var m = (ms.data || []).find(function(x){ return x.id == mid; });
    if (!m) return;
    var currentLeads = m.lead_member_ids || [];

    var h = '<h2>Assign Milestone Leads</h2>';
    h += '<p class="text-muted text-sm mb-12">Select one or more participants to lead "<strong>'+esc(m.title)+'</strong>"</p>';
    h += '<div id="assignChecklist" style="max-height:300px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:6px;padding:10px;margin-bottom:12px">';
    team.forEach(function(p) {
      var checked = currentLeads.indexOf(p.member_id) >= 0 ? ' checked' : '';
      h += '<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-100);cursor:pointer">';
      h += '<input type="checkbox" data-pmid="'+p.member_id+'"'+checked+' style="width:auto"> ';
      h += '<div><strong>'+esc(p.first_name)+' '+esc(p.last_name)+'</strong>'+(p.role_title?' &middot; <em>'+esc(p.role_title)+'</em>':'')+'<br><span class="text-muted text-sm">'+esc(p.sector||'--')+' / '+esc(p.country||'--')+'</span></div>';
      h += '</label>';
    });
    h += '</div>';
    h += '<div id="assignMsg"></div>';
    h += '<div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" id="assignSaveBtn">Save Assignment</button> <button class="btn btn-outline btn-sm" id="assignCancelBtn">Cancel</button></div>';
    openModal(h);

    document.getElementById('assignCancelBtn').addEventListener('click', function() { openWorkspaceModal(pid); window._wsActiveTab='milestones'; setTimeout(function(){document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.toggle('active', b.dataset.wsTab==='milestones');}); loadWorkspaceTab('milestones');},100); });

    document.getElementById('assignSaveBtn').addEventListener('click', async function() {
      var ids = [];
      document.querySelectorAll('#assignChecklist input[data-pmid]:checked').forEach(function(cb) {
        ids.push(parseInt(cb.dataset.pmid));
      });
      var msg = document.getElementById('assignMsg');
      msg.innerHTML = '<div class="text-muted text-sm">Saving...</div>';
      try {
        var r = await apiFetch('/projects/'+pid+'/workspace/milestones/'+mid+'/assign', { method:'PUT', body:JSON.stringify({ lead_member_ids: ids }) });
        if (r.success) {
          msg.innerHTML = '<div class="success-msg">Saved.</div>';
          setTimeout(function() { openWorkspaceModal(pid); window._wsActiveTab='milestones'; setTimeout(function(){document.querySelectorAll('button[data-ws-tab]').forEach(function(b){b.classList.toggle('active', b.dataset.wsTab==='milestones');}); loadWorkspaceTab('milestones');},100); }, 800);
        } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
      } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });
  }

  async function wsRenderDiscussion(pid, el) {
    var r = await apiFetch('/projects/'+pid+'/workspace/messages');
    var msgs = (r.success && r.data) || [];
    var h = '<div class="panel" style="max-height:400px;overflow-y:auto">';
    if (msgs.length === 0) {
      h += '<p class="text-muted text-sm">No messages yet. Start the conversation.</p>';
    } else {
      msgs.forEach(function(m) {
        h += '<div style="padding:8px 0;border-bottom:1px solid var(--gray-200);font-size:13px">';
        h += '<div class="flex-between"><strong>'+esc(m.member_name)+'</strong><span class="text-muted text-sm">'+new Date(m.created_at).toLocaleString()+'</span></div>';
        h += '<div style="margin-top:4px;white-space:pre-wrap">'+esc(m.body)+'</div>';
        h += '</div>';
      });
    }
    h += '</div>';

  function showSignoffModal(projectId, planJson, projectMeta) {
    var planTitle = (planJson && planJson.title) || (projectMeta && projectMeta.title) || 'Business Plan';
    var h = '<h2 style="margin-bottom:12px">Sign Off on Business Plan</h2>';
    h += '<div class="text-sm text-muted mb-12">By signing, you agree to the business plan as written. Your signature is hashed (SHA-256) against the plan version and stored permanently.</div>';
    h += '<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:14px;max-height:300px;overflow-y:auto;margin-bottom:14px">';
    h += '<div style="font-weight:700;margin-bottom:8px">'+esc(planTitle)+'</div>';
    if (planJson && planJson.executive_summary) {
      h += '<div class="text-sm" style="white-space:pre-wrap">'+esc(planJson.executive_summary)+'</div>';
    }
    if (planJson && Array.isArray(planJson.team_roles_required)) {
      h += '<div style="margin-top:8px"><strong>Team Roles:</strong> '+planJson.team_roles_required.map(function(r){return esc(r.role_title);}).join(', ')+'</div>';
    }
    h += '</div>';
    h += '<form id="signoffForm">';
    h += '<div class="form-group full" style="margin-bottom:12px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer">';
    h += '<input type="checkbox" name="agreed" id="signAgreed" required style="width:auto"> ';
    h += 'I agree to the business plan as written and commit to the role I have accepted.';
    h += '</label></div>';
    h += '<div class="form-group full"><label>Type your full name to sign</label>';
    h += '<input type="text" name="typed_name" id="signTypedName" required minlength="3" placeholder="Your full legal name"></div>';
    h += '<div id="signMsg" style="margin-top:10px"></div>';
    h += '<div style="margin-top:14px;display:flex;gap:8px"><button type="submit" class="btn btn-primary">Sign Off</button>';
    h += '<button type="button" class="btn btn-outline" id="signCancel">Cancel</button></div>';
    h += '</form>';
    openModal(h);

    document.getElementById('signCancel').addEventListener('click', function() { showProjectDetail(projectId); });
    document.getElementById('signoffForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var msg = document.getElementById('signMsg');
      var agreed = document.getElementById('signAgreed').checked;
      var name = document.getElementById('signTypedName').value.trim();
      if (!agreed || name.length < 3) { msg.innerHTML = '<div class="error-msg">Check the box and type your full name</div>'; return; }
      msg.innerHTML = '<div class="text-muted text-sm">Recording signature...</div>';
      try {
        var r = await apiFetch('/projects/'+projectId+'/signoff', { method:'POST', body:JSON.stringify({ typed_name: name, agreed: true }) });
        if (r.success) {
          var d = r.data;
          var ok = '<div class="success-msg">Sign-off recorded. '+d.signed_count+' of '+d.total_participants+' signed.</div>';
          if (d.all_signed) {
            ok += '<div style="background:#e8f5e9;color:#2e7d32;padding:12px;border-radius:6px;margin-top:8px;font-weight:700">'+
              '&#10003; All participants have signed. Project moved to private workspace (signed_off).</div>';
          }
          msg.innerHTML = ok;
          setTimeout(function() { showProjectDetail(projectId); }, 2500);
        } else {
          msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>';
        }
      } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
    });
  }

  async function showProjectDetail(id) {
    openModal('<div class="loading">Loading project...</div>');
    try {
      var res = await apiFetch('/projects/'+id);
      if (!res.success) { openModal('<div class="error-msg">'+(res.error||'Error loading project')+'</div>'); return; }
      var p = res.data;

      // STUB view (private project, viewer is not a participant)
      if (p.is_stub) {
        var stubHtml = '<h2 style="margin-bottom:8px">'+esc(p.title)+'</h2>';
        stubHtml += '<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:24px;text-align:center;margin-top:16px">';
        stubHtml += '<div style="font-size:42px;margin-bottom:12px">&#128274;</div>';
        stubHtml += '<div style="font-weight:700;margin-bottom:6px">Private Project</div>';
        stubHtml += '<div class="text-muted text-sm">Status: '+statusBadge(p.status||'executing')+'</div>';
        stubHtml += '<p class="text-muted text-sm" style="margin-top:12px">This project has been signed off and is now in private execution. Only participants can see the full plan and workspace.</p>';
        stubHtml += '</div>';
        openModal(stubHtml);
        return;
      }

      var html = '<h2 style="margin-bottom:8px">'+esc(p.title)+'</h2>';
      var planStatusLabel = p.plan_status ? '<span style="background:var(--accent-light);color:var(--accent-dark);padding:3px 8px;border-radius:4px;font-size:11px;text-transform:uppercase;font-weight:700;margin-left:6px">'+esc(p.plan_status)+'</span>' : '';
      html += '<div style="margin-bottom:12px">'+statusBadge(p.status)+planStatusLabel+' <span class="text-muted text-sm"> | Proposed by '+esc(p.proposer_name||'--')+'</span></div>';
      html += lifecycleDots(p.status);
      html += '<p style="margin:12px 0;font-size:13px;color:var(--gray-700)">'+esc(p.description||'')+'</p>';
      html += '<table style="width:100%;margin-bottom:16px">';
      html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Sector</td><td style="font-size:13px">'+esc(p.sector||'--')+'</td></tr>';
      if (p.countries) html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Countries</td><td style="font-size:13px">'+esc((p.countries||[]).join(', '))+'</td></tr>';
      if (p.budget_est) html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Budget</td><td style="font-size:13px">$'+Number(p.budget_min||0).toLocaleString()+' - $'+Number(p.budget_est||0).toLocaleString()+' - $'+Number(p.budget_max||0).toLocaleString()+'</td></tr>';
      if (p.timeline_est_months) html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Timeline</td><td style="font-size:13px">'+p.timeline_min_months+' - '+p.timeline_est_months+' - '+p.timeline_max_months+' months</td></tr>';
      html += '</table>';

      // === Render full business plan if present ===
      if (p.plan_json) {
        html += renderFullPlan(p.plan_json, p.fill_status);
      }

      // === Final Meeting card (Stage 2) ===
      if (['pending_signoff','fully_staffed','signed_off','executing','completed'].includes(p.plan_status)) {
        try {
          var mtgRes = await apiFetch('/projects/'+id+'/meetings');
          if (mtgRes.success && mtgRes.data && mtgRes.data.length > 0) {
            var m = mtgRes.data[0];
            var when = new Date(m.scheduled_at).toLocaleString();
            html += '<div style="border:2px solid #7b1fa2;border-radius:8px;padding:14px;margin:18px 0;background:#f3e5f5">';
            html += '<div style="font-weight:700;color:#4a148c;margin-bottom:6px">&#128197; Final Meeting Scheduled</div>';
            html += '<div class="text-sm"><strong>When:</strong> '+esc(when)+' ('+m.duration_minutes+' min)</div>';
            html += '<div class="text-sm" style="margin-top:4px"><strong>Status:</strong> '+esc(m.status)+'</div>';
            html += '<div class="text-sm" style="margin-top:4px"><strong>Video:</strong> <a href="'+esc(m.video_link)+'" target="_blank" style="color:#4a148c;text-decoration:underline">'+esc(m.video_link)+'</a></div>';
            html += '<div style="margin-top:8px"><a href="'+API+'/projects/'+id+'/meetings/'+m.id+'/ics" target="_blank" class="btn btn-outline btn-sm">Download .ics</a></div>';
            html += '</div>';
          }
        } catch(e) { /* ignore */ }
      }

      // Team
      html += '<h3>Team ('+(p.team?p.team.length:0)+' members)</h3>';
      if (p.team && p.team.length > 0) {
        html += '<div style="margin-bottom:12px">';
        p.team.forEach(function(t) {
          html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-200);font-size:13px"><strong>'+esc(t.first_name)+' '+esc(t.last_name)+'</strong><span class="text-muted">'+esc(t.role||'collaborator')+'</span><span class="text-muted">'+esc(t.sector||'')+'</span></div>';
        });
        html += '</div>';
      } else {
        html += '<p class="text-muted text-sm mb-12">No team members yet.</p>';
      }

      var vr = p.viewer_role || {};

      // === Auction-style countdown clock ===
      if (p.recruitment_deadline && p.plan_status === 'recruiting' && !p.recruitment_closed_at) {
        var ms = new Date(p.recruitment_deadline).getTime() - Date.now();
        var dd = Math.max(0, Math.floor(ms / 86400000));
        var hh = Math.max(0, Math.floor((ms % 86400000) / 3600000));
        var mm = Math.max(0, Math.floor((ms % 3600000) / 60000));
        var ccol = dd > 7 ? '#28a745' : (dd >= 1 ? '#e65100' : 'var(--red)');
        html += '<div style="background:'+ccol+';color:white;border-radius:8px;padding:14px;text-align:center;margin:14px 0">';
        html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:0.85">Recruitment Window Open</div>';
        html += '<div style="font-size:28px;font-weight:800;margin:6px 0">'+dd+'d '+hh+'h '+mm+'m left</div>';
        html += '<div style="font-size:11px;opacity:0.85">Auto-closes when timer expires; proposer can close manually anytime</div>';
        html += '</div>';
      } else if (p.recruitment_closed_at) {
        html += '<div style="background:var(--gray-100);color:var(--gray-700);border-radius:8px;padding:10px;text-align:center;margin:14px 0;font-size:13px">';
        html += 'Recruitment closed '+(p.recruitment_closed_by==='auto_expired'?'automatically when timer expired':'manually by proposer')+' at '+new Date(p.recruitment_closed_at).toLocaleString();
        html += '</div>';
      }

      // === Monte Carlo card (auto-computed at team-lock) ===
      if (p.monte_carlo_result) {
        var mc = p.monte_carlo_result;
        var prob = Math.round((mc.success_probability||mc.viabilityScore||0) * 100);
        var probColor = prob >= 70 ? '#28a745' : prob >= 45 ? '#e65100' : 'var(--red)';
        html += '<div style="border:2px solid '+probColor+';border-radius:8px;padding:12px;margin-bottom:14px;background:#f8f9fa">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:700;color:'+probColor+'">Monte Carlo Risk Assessment <span class="text-muted text-sm">(auto-computed at team-lock)</span></div>';
        html += '<div style="font-size:24px;font-weight:900;color:'+probColor+'">'+prob+'%</div></div>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px">';
        if (mc.budget) html += '<div><strong>Budget:</strong> $'+Number(mc.budget.p10||0).toLocaleString()+' / $'+Number(mc.budget.p50||0).toLocaleString()+' / $'+Number(mc.budget.p90||0).toLocaleString()+'<br><span class="text-muted">P10/P50/P90</span></div>';
        if (mc.timeline_months) html += '<div><strong>Timeline:</strong> '+(mc.timeline_months.p10||0)+'/'+(mc.timeline_months.p50||0)+'/'+(mc.timeline_months.p90||0)+' months<br><span class="text-muted">P10/P50/P90</span></div>';
        if (mc.team_size) html += '<div><strong>Team:</strong> '+mc.team_size+' members<br><span class="text-muted">avg trust '+(mc.avg_trust||0).toFixed(2)+'</span></div>';
        html += '</div></div>';
      }

      // === Action buttons ===
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">';

      // Stage 0 -- Edit/Publish draft (proposer-only)
      if ((vr.is_proposer || vr.is_superadmin) && p.plan_status === 'draft' && p.plan_json) {
        html += '<button class="btn btn-primary btn-sm" id="editPlanBtn" style="background:var(--accent);color:var(--navy)">Edit Plan</button>';
        html += '<button class="btn btn-primary btn-sm" id="publishDraftBtn" style="background:#28a745">Publish Plan (starts 30-day countdown)</button>';
      }

      // Stage 1 -- recruiting
      if (p.plan_status === 'recruiting' && !p.recruitment_closed_at && !vr.is_proposer && !vr.is_participant) {
        html += '<button class="btn btn-outline btn-sm" id="joinBtn">Join Team</button>';
      }
      if ((vr.is_proposer || vr.is_superadmin) && p.plan_status === 'recruiting' && !p.recruitment_closed_at) {
        html += '<button class="btn btn-primary btn-sm" id="inviteMatchesBtn" style="background:var(--accent);color:var(--navy)">Re-run AI Matches</button>';
        html += '<button class="btn btn-outline btn-sm" id="viewInvitationsBtn">View Invitations</button>';
        html += '<button class="btn btn-danger btn-sm" id="closeRecruitmentBtn" style="background:var(--red);color:white">Close Bidding Now</button>';
      }

      // Reopen for recruitment_failed projects (proposer only)
      if ((vr.is_proposer || vr.is_superadmin) && p.plan_status === 'recruitment_failed') {
        html += '<button class="btn btn-primary btn-sm" id="reopenBtn" style="background:#28a745;color:white">Re-Open Bidding (+14 days)</button>';
      }

      // Stage 2 -- sign-off (Final Meeting auto-booked, no manual button needed)
      if (['pending_signoff','fully_staffed'].includes(p.plan_status) && (vr.is_proposer || vr.is_participant)) {
        html += '<button class="btn btn-primary btn-sm" id="signoffBtn" style="background:#28a745">Sign Off Plan</button>';
        html += '<button class="btn btn-outline btn-sm" id="signoffStatusBtn">Sign-off Status</button>';
      }
      // Amend plan (PR-B) -- proposer/superadmin only, between team-lock and full sign-off
      if ((vr.is_proposer || vr.is_superadmin) && ['fully_staffed','pending_signoff'].includes(p.plan_status)) {
        html += '<button class="btn btn-outline btn-sm" id="amendPlanBtn" style="border-color:#7b1fa2;color:#7b1fa2">Amend Plan (re-sign)</button>';
        html += '<button class="btn btn-outline btn-sm" id="planVersionsBtn">Plan Versions</button>';
      }

      // Stage 3 -- workspace (auto-init on signoff, button is just shortcut)
      if (['executing','signed_off','completed'].includes(p.plan_status) && (vr.is_proposer || vr.is_participant || vr.is_superadmin)) {
        html += '<button class="btn btn-primary btn-sm" id="openWorkspaceBtn" style="background:#1565c0">Open Workspace</button>';
      }
      html += '</div>';
      html += '<div id="projActionMsg" style="margin-top:10px"></div>';

      openModal(html);

      var advBtn = document.getElementById('advanceBtn');
      if (advBtn) advBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Advancing phase...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/advance', { method:'POST' });
          if (r.success) { msg.innerHTML = '<div class="success-msg">Advanced to: '+esc(r.data.status)+'</div>'; loadProjects(); } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      var joinBtn = document.getElementById('joinBtn');
      if (joinBtn) joinBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Joining...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/join', { method:'POST', body:JSON.stringify({role:'collaborator'}) });
          if (r.success) { msg.innerHTML = '<div class="success-msg">You have joined the project.</div>'; } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      var evalBtn = document.getElementById('evaluateBtn');
      if (evalBtn) evalBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Evaluating risk (Monte Carlo)...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/evaluate', { method:'POST' });
          if (r.success) {
            var ev = r.data;
            var h = '<div class="success-msg">Evaluation complete</div>';
            h += '<div style="background:var(--gray-50);padding:12px;border-radius:6px;font-size:12px;margin-top:8px">';
            h += '<strong>Success probability:</strong> '+(ev.success_probability*100)+'% | <strong>Risk:</strong> '+esc(ev.risk_score)+'<br>';
            h += '<strong>Budget P50:</strong> $'+Number(ev.budget.p50).toLocaleString()+' | <strong>P90:</strong> $'+Number(ev.budget.p90).toLocaleString()+'<br>';
            h += '<strong>Timeline P50:</strong> '+ev.timeline_months.p50+' months | <strong>P90:</strong> '+ev.timeline_months.p90+' months';
            h += '</div>';
            msg.innerHTML = h;
          } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      // P2B Stage 0 -- Edit/Publish draft
      var editPlanBtn = document.getElementById('editPlanBtn');
      if (editPlanBtn) editPlanBtn.addEventListener('click', function() {
        showPlanEditor(id, p.plan_json);
      });

      var publishDraftBtn = document.getElementById('publishDraftBtn');
      if (publishDraftBtn) publishDraftBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Publishing plan...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/publish', { method:'POST' });
          if (r.success) {
            msg.innerHTML = '<div class="success-msg">Plan published. Project is now visible to all chamber members.</div>';
            setTimeout(function(){ showProjectDetail(id); }, 1200);
          } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      // Re-open bidding (recovers a recruitment_failed project)
      var reopenBtn = document.getElementById('reopenBtn');
      if (reopenBtn) reopenBtn.addEventListener('click', async function() {
        if (!confirm('Re-open bidding for 14 more days? Anyone still in pending invitations can accept; cascade will fire when window closes.')) return;
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Re-opening bidding window...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/reopen-recruitment', { method:'POST', body:JSON.stringify({ days_extension: 14 }) });
          if (r.success) {
            msg.innerHTML = '<div class="success-msg">Bidding re-opened. New deadline: '+new Date(r.data.recruitment_deadline).toLocaleString()+'</div>';
            setTimeout(function(){ showProjectDetail(id); loadProjects(); }, 1500);
          } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      // P2B Stage 1 -- Invite AI Matches

  async function renderExchange() {
    var el = document.getElementById('pageContent');
    var html = '<div class="tabs"><button class="tab-btn active" data-tab="companies">Companies</button><button class="tab-btn" data-tab="rfqs">RFQs</button><button class="tab-btn" data-tab="opportunities">Opportunities</button></div>';
    html += '<div id="exchangeContent"><div class="loading">Loading...</div></div>';
    el.innerHTML = html;

    el.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        el.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
        this.classList.add('active');
        if (this.dataset.tab === 'companies') loadCompanies();
        else if (this.dataset.tab === 'rfqs') loadRFQs();
        else loadOpportunities();
      });
    });

    loadCompanies();
  }

  async function loadCompanies() {
    var out = document.getElementById('exchangeContent');
    out.innerHTML = '<div class="flex-between mb-16"><div></div><button class="btn btn-primary btn-sm" id="newCompanyBtn">+ Register Company</button></div><div id="companyList"><div class="loading">Loading...</div></div>';

    document.getElementById('newCompanyBtn').addEventListener('click', showNewCompanyForm);

    try {
      var res = await apiFetch('/exchange/companies?limit=50');
      if (!res.success) { document.getElementById('companyList').innerHTML = '<div class="error-msg">Error</div>'; return; }
      var companies = res.data.companies || [];
      var list = document.getElementById('companyList');
      if (companies.length === 0) { list.innerHTML = '<p class="text-muted">No companies registered yet.</p>'; return; }
      var isAdmin = currentMember && ['superadmin','admin_global','admin_regional','admin'].includes(currentMember.access_level);
      var h = '<div class="table-wrap"><table><thead><tr><th>Company</th><th>Sector</th><th>Employees</th><th>Countries</th><th>Verified</th><th>Created</th><th></th></tr></thead><tbody>';
      companies.forEach(function(c) {
        var canEdit = isAdmin || (currentMember && c.owner_member_id === currentMember.id);
        var actions = canEdit ? '<button class="btn btn-outline btn-sm compEditBtn" data-cid="'+c.id+'" style="padding:2px 8px;font-size:11px">Edit</button>' : '';
        if (isAdmin) {
          var vlabel = c.verified ? 'Unverify' : 'Verify';
          actions += ' <button class="btn btn-primary btn-sm compVerifyBtn" data-cid="'+c.id+'" data-curr="'+(c.verified?'1':'0')+'" style="padding:2px 8px;font-size:11px;background:'+(c.verified?'#999':'#28a745')+'">'+vlabel+'</button>';
        }
        h += '<tr><td><strong>'+esc(c.name)+'</strong></td><td>'+esc(c.sector||'--')+'</td><td>'+(c.employee_count||'--')+'</td><td>'+esc((c.countries_served||[]).join(', ')||'--')+'</td><td>'+(c.verified?'<span class="badge badge-green">Yes</span>':'<span class="badge badge-gray">No</span>')+'</td><td>'+formatDate(c.created_at)+'</td><td>'+actions+'</td></tr>';
      });
      h += '</tbody></table></div>';
      list.innerHTML = h;

      list.querySelectorAll('.compEditBtn').forEach(function(b) {
        b.addEventListener('click', function() { showCompanyEditor(parseInt(this.dataset.cid)); });
      });
      list.querySelectorAll('.compVerifyBtn').forEach(function(b) {
        b.addEventListener('click', async function() {
          var cid = parseInt(this.dataset.cid);
          var current = this.dataset.curr === '1';
          var origText = this.textContent;
          this.disabled = true;
          this.textContent = 'Saving...';
          this.style.opacity = '0.6';
          try {
            var r = await apiFetch('/exchange/companies/'+cid, { method:'PUT', body:JSON.stringify({ verified: !current }) });
            if (r.success && r.data && r.data.verified === !current) {
              // Optimistic UI flip -- update the badge cell + button without full reload
              var row = this.closest('tr');
              if (row) {
                var verifiedCell = row.children[4];
                verifiedCell.innerHTML = (!current) ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-gray">No</span>';
              }
              this.textContent = (!current) ? 'Unverify' : 'Verify';
              this.dataset.curr = (!current) ? '1' : '0';
              this.style.background = (!current) ? '#999' : '#28a745';
              this.style.opacity = '1';
              this.disabled = false;
            } else {
              this.disabled = false;
              this.textContent = origText;
              this.style.opacity = '1';
              alert((r && r.error) ? r.error : 'Save failed -- backend did not confirm new value');
            }
          } catch(e) {
            this.disabled = false;
            this.textContent = origText;
            this.style.opacity = '1';
            alert('Network error: ' + e.message);
          }
        });
      });
    } catch(e) {
      document.getElementById('companyList').innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>';
    }
  }

  async function showRFQDetail(id) {
    openModal('<div class="loading">Loading RFQ...</div>');

      var res = await apiFetch('/exchange/rfqs/'+id);
      if (!res.success) { openModal('<div class="error-msg">Error loading RFQ</div>'); return; }
      var r = res.data;
      var html = '<h2 style="margin-bottom:8px">'+esc(r.title)+'</h2>';

      html += '<div class="rc-meta mb-16"><span>Sector: '+esc(r.sector||'--')+'</span>';
      if (r.budget_range) html += '<span>Budget: '+esc(r.budget_range)+'</span>';
      if (r.deadline) html += '<span>Deadline: '+formatDate(r.deadline)+'</span>';
      html += '</div>';

      // Responses
      var responses = r.responses || [];
      html += '<h3>Responses ('+responses.length+')</h3>';
      if (responses.length > 0) {
        responses.forEach(function(rr) {
          html += '<div style="border:1px solid var(--gray-200);border-radius:6px;padding:12px;margin-bottom:8px">';
          html += '<div class="flex-between"><strong style="font-size:13px">'+esc(rr.responder_name||'--')+'</strong>'+statusBadge(rr.status)+'</div>';

          html += '<p style="font-size:12px;margin-top:6px">'+esc(rr.proposal_text||'')+'</p>';
          if (rr.price_quote) html += '<div class="text-sm" style="margin-top:4px"><strong>Quote:</strong> $'+Number(rr.price_quote).toLocaleString()+' '+esc(rr.currency||'USD')+'</div>';
          html += '</div>';
        });
      } else {
        html += '<p class="text-muted text-sm mb-12">No responses yet.</p>';
      }

      // Respond form
      if (r.status === 'open') {
        html += '<h3 style="margin-top:16px">Submit Proposal</h3><div id="rfqResMsg"></div>';
        html += '<form id="rfqResForm" class="form-grid">';
        html += '<div class="form-group full"><label>Proposal</label><textarea name="proposal_text" rows="3" required></textarea></div>';
        html += '<div class="form-group"><label>Quote (USD)</label><input name="price_quote" type="number" step="0.01"></div>';

        html += '<div class="form-group full mt-12"><button type="submit" class="btn btn-primary btn-sm">Submit Proposal</button></div>';
        html += '</form>';
      }

      openModal(html);

      var resForm = document.getElementById('rfqResForm');
      if (resForm) {
        resForm.addEventListener('submit', async function(ev) {
          ev.preventDefault();
          var fd = new FormData(this);
          var body = {};
          fd.forEach(function(v,k){ body[k] = v; });
          body.price_quote = body.price_quote ? parseFloat(body.price_quote) : null;
          var msg = document.getElementById('rfqResMsg');
          msg.innerHTML = '<div class="text-muted text-sm">Submitting...</div>';
          try {
            var rr = await apiFetch('/exchange/rfqs/'+id+'/respond', { method:'POST', body:JSON.stringify(body) });
            if (rr.success) { msg.innerHTML = '<div class="success-msg">Proposal submitted successfully.</div>'; } else { msg.innerHTML = '<div class="error-msg">'+(rr.error||'Error')+'</div>'; }

        });

      openModal('<div class="error-msg">Error: '+esc(e.message)+'</div>');
    }
  }

  async function loadHCI() {
    var container = document.getElementById('metricsHCI');
    try {
      var res = await apiFetch('/metrics/hci');
      if (!res.success) { container.innerHTML = '<h2>HCI Score</h2><div class="error-msg">Error loading</div>'; return; }
      var d = res.data;
      var hciPct = Math.round(d.hci * 100);
      var targetPct = Math.round(d.target * 100);
      var angle = hciPct * 3.6;
      var bgGrad = 'conic-gradient(var(--primary) 0deg, var(--primary) '+angle+'deg, var(--gray-200) '+angle+'deg)';

      var html = '<h2>CamaraVirtual.app -- Indice Compuesto (HCI)</h2>';
      html += '<div class="gauge-wrap"><div class="gauge" style="background:'+bgGrad+'"><div class="gauge-inner"><div class="gauge-value">'+hciPct+'%</div><div class="gauge-label">HCI Score</div></div></div></div>';
      html += '<p class="text-muted text-sm" style="text-align:center">Target: '+targetPct+'%</p>';

      // Components
      html += '<div style="margin-top:16px"><h3>Components</h3><div class="trust-components">';
      var comps = d.components;
      var items = [
        {label:'Equity (1-Gini)', val:comps.equity.value, w:comps.equity.weight},
        {label:'Trust', val:comps.trust.value, w:comps.trust.weight},
        {label:'Network Value', val:comps.network.value, w:comps.network.weight},
        {label:'Projects', val:comps.projects.value, w:comps.projects.weight},
        {label:'Activation', val:comps.activation.value, w:comps.activation.weight}
      ];
      items.forEach(function(it) {
        var p = Math.round(it.val * 100);
        html += '<div class="trust-row"><div class="tr-label">'+it.label+' ('+Math.round(it.w*100)+'%)</div><div class="tr-bar"><div class="tr-fill" style="width:'+p+'%"></div></div><div class="tr-val">'+p+'%</div></div>';
      });
      html += '</div></div>';
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<h2>HCI Score</h2><div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

  async function loadGini() {
    var container = document.getElementById('metricsGini');
    try {
      var res = await apiFetch('/metrics/gini?dimension=regional&metric=opportunities');
      if (!res.success) { container.innerHTML = '<h2>Gini</h2><div class="error-msg">Error</div>'; return; }
      var d = res.data;
      var html = '<h2>Gini Coefficient by Region</h2>';
      html += '<div style="display:flex;gap:20px;align-items:center;margin-bottom:16px">';
      html += '<div><span style="font-size:28px;font-weight:800;color:'+(d.gini>d.threshold?'var(--red)':'var(--primary)')+'">'+d.gini+'</span><div class="text-sm text-muted">Gini (threshold: '+d.threshold+')</div></div>';
      html += '<div class="badge '+(d.correction_active?'badge-red':'badge-green')+'">'+(d.correction_active?'Correction active':'Balanced')+'</div>';
      html += '</div>';

      if (d.details && d.details.length) {
        var maxVal = Math.max.apply(null, d.details.map(function(r){return r.value||0;})) || 1;
        html += '<div class="bar-chart">';
        d.details.forEach(function(r) {
          var w = Math.max((r.value/maxVal)*100, 2);
          var color = r.correction_factor > 1.05 ? 'var(--accent)' : 'var(--primary)';
          html += '<div class="bar-row"><div class="bar-label">'+esc(r.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+color+'"><span>'+r.value+'</span></div></div><div style="width:60px;text-align:right;font-size:11px;color:var(--gray-500)">x'+r.correction_factor+'</div></div>';
        });
        html += '</div>';
      }
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<h2>Gini</h2><div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

          var accessBadge = m.access_level === 'superadmin' ? '<span class="badge badge-red">superadmin</span>' : m.access_level === 'admin_global' ? '<span class="badge badge-gold">global</span>' : m.access_level === 'admin_regional' ? '<span class="badge badge-green">regional</span>' : '<span class="badge badge-gray">member</span>';
          var sBadge = m.status === 'active' ? '<span class="badge badge-green">active</span>' : '<span class="badge badge-red">' + esc(m.status) + '</span>';
          h += '<tr data-name="' + esc(m.first_name + ' ' + m.last_name + ' ' + m.email).toLowerCase() + '">';
          h += '<td>' + m.id + '</td><td><strong>' + esc(m.first_name) + ' ' + esc(m.last_name) + '</strong></td><td>' + esc(m.email) + '</td>';
          h += '<td>' + esc(m.country||'--') + '</td><td>' + esc(m.region_name||'--') + '</td><td>' + esc(m.sector||'--') + '</td>';
          h += '<td>' + esc(m.membership_type) + '</td><td>' + roleBadge + '</td><td>' + accessBadge + '</td>';
          h += '<td>' + Number(m.trust_score||0).toFixed(2) + '</td><td>' + sBadge + '</td>';
          h += '<td style="white-space:nowrap;">';
          h += '<button class="btn-sm" onclick="adminEditProfile(' + m.id + ')" title="Edit profile (incl. role + access)" style="padding:4px 8px;font-size:11px;background:var(--accent);color:var(--navy);border:none;border-radius:4px;cursor:pointer;margin:2px;">Edit</button>';
          h += '<button class="btn-sm" onclick="adminVerify(' + m.id + ')" title="Verify" style="padding:4px 8px;font-size:11px;background:var(--primary);color:white;border:none;border-radius:4px;cursor:pointer;margin:2px;">Verify</button>';
          h += '<button class="btn-sm" onclick="adminToggleStatus(' + m.id + ',\'' + m.status + '\')" title="Toggle status" style="padding:4px 8px;font-size:11px;background:' + (m.status==='active'?'#e65100':'var(--green)') + ';color:white;border:none;border-radius:4px;cursor:pointer;margin:2px;">' + (m.status==='active'?'Suspend':'Activate') + '</button>';
          if (canGlobal && m.id !== currentMember.id) {
            h += '<button class="btn-sm" onclick="adminDeleteMember(' + m.id + ',\'' + esc(m.email) + '\')" title="Delete" style="padding:4px 8px;font-size:11px;background:var(--red);color:white;border:none;border-radius:4px;cursor:pointer;margin:2px;">Delete</button>';
          }
          h += '</td></tr>';
        });
        h += '</tbody></table></div>';
        h += '<p style="margin-top:12px;color:var(--gray-500);font-size:13px;">Total: ' + members.length + ' members</p>';
        ac.innerHTML = h;
        document.getElementById('adminSearch').addEventListener('input', function() {
          var q = this.value.toLowerCase();
          ac.querySelectorAll('tbody tr').forEach(function(row) {
            row.style.display = (row.dataset.name || '').includes(q) ? '' : 'none';
          });
        });
      } catch(e) { ac.innerHTML = '<div class="error-msg">Error: ' + esc(e.message) + '</div>'; }

    } else if (tab === 'governance') {
      try {
        var res = await apiFetch('/admin/roles');
        if (!res.success) { ac.innerHTML = '<div class="error-msg">' + esc(res.error) + '</div>'; return; }
        var board = res.data.governance_board || [];
        var h = '<h3 style="margin-bottom:16px;font-size:18px;">Current Board of Directors</h3>';
        if (board.length === 0) {
          h += '<p class="text-muted">No governance roles assigned yet.</p>';
        } else {
          h += '<div class="table-wrap"><table><thead><tr><th>Member</th><th>Role</th><th>Access</th><th>Region</th><th>Membership</th><th>Action</th></tr></thead><tbody>';
          board.forEach(function(m) {
            h += '<tr><td><strong>' + esc(m.first_name) + ' ' + esc(m.last_name) + '</strong><br><span style="font-size:12px;color:var(--gray-500);">' + esc(m.email) + '</span></td>';
            h += '<td><span class="badge badge-gold">' + esc(m.governance_role.replace(/_/g,' ')) + '</span></td>';
            h += '<td>' + esc(m.access_level) + '</td><td>' + esc(m.region_name||'Global') + '</td><td>' + esc(m.membership_type) + '</td>';
            h += '<td><button onclick="adminRemoveRole(' + m.id + ')" style="padding:4px 10px;font-size:12px;background:var(--red);color:white;border:none;border-radius:4px;cursor:pointer;">Remove</button></td></tr>';
          });
          h += '</tbody></table></div>';
        }
        h += '<div style="margin-top:24px;padding:20px;background:var(--gray-50);border-radius:8px;">';
        h += '<h4 style="margin-bottom:12px;">Available roles:</h4>';
        h += '<p style="font-size:13px;color:var(--gray-700);line-height:1.8;">';
        (res.data.available_roles || []).forEach(function(r) {
          h += '<span class="badge badge-gray" style="margin:2px;">' + r.replace(/_/g,' ') + '</span> ';
        });
        h += '</p></div>';
        ac.innerHTML = h;
      } catch(e) { ac.innerHTML = '<div class="error-msg">Error: ' + esc(e.message) + '</div>'; }

    } else if (tab === 'regions') {
      try {
        var res = await apiFetch('/admin/regions');
        if (!res.success) { ac.innerHTML = '<div class="error-msg">' + esc(res.error) + '</div>'; return; }
        var regions = res.data || [];
        var canGlobal = currentMember.access_level === 'superadmin' || currentMember.access_level === 'admin_global';
        var h = '<div class="flex-between mb-16"><h3 style="margin:0">Regional Delegations</h3>';
        if (canGlobal) h += '<button class="btn btn-primary" onclick="adminAddRegion()">+ Add Region</button>';
        h += '</div>';
        h += '<div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">';
        regions.forEach(function(r) {
          h += '<div class="stat-card" style="text-align:left;position:relative">';
          if (canGlobal) {
            h += '<div style="position:absolute;top:8px;right:8px;display:flex;gap:4px">';
            h += '<button class="btn-sm" onclick="adminEditRegion('+r.id+',\''+esc(r.name).replace(/\x27/g,"&#39;")+'\',\''+esc(r.description||'').replace(/\x27/g,"&#39;").replace(/\n/g,' ')+'\')" style="padding:2px 8px;font-size:11px;background:var(--accent);color:var(--navy);border:none;border-radius:4px;cursor:pointer">Edit</button>';
            h += '<button class="btn-sm" onclick="adminDeleteRegion('+r.id+',\''+esc(r.name).replace(/\x27/g,"&#39;")+'\')" style="padding:2px 8px;font-size:11px;background:var(--red);color:white;border:none;border-radius:4px;cursor:pointer">X</button>';
            h += '</div>';
          }
          h += '<h4 style="color:var(--primary);margin-bottom:12px;padding-right:80px">' + esc(r.name) + '</h4>';
          h += '<p style="font-size:13px;color:var(--gray-500);margin-bottom:8px;">' + esc(r.description||'') + '</p>';
          h += '<div style="font-size:14px;line-height:2;">';
          h += '<strong>Members:</strong> ' + (r.member_count||0) + '<br>';
          if (r.president_name !== undefined) {
            h += '<strong>President:</strong> ' + esc(r.president_name||'-- Vacant --') + '<br>';
            h += '<strong>Secretary:</strong> ' + esc(r.secretary_name||'-- Vacant --') + '<br>';
            h += '<strong>Treasurer:</strong> ' + esc(r.treasurer_name||'-- Vacant --') + '<br>';
          }
          if (r.gini_score !== undefined) h += '<strong>Gini:</strong> ' + Number(r.gini_score||0).toFixed(4) + '<br>';
          if (r.opportunity_count !== undefined) h += '<strong>Opportunities:</strong> ' + (r.opportunity_count||0);
          h += '</div></div>';
        });
        h += '</div>';
        ac.innerHTML = h;
      } catch(e) { ac.innerHTML = '<div class="error-msg">Error: ' + esc(e.message) + '</div>'; }

    } else if (tab === 'system') {
      try {
        var res = await apiFetch('/admin/system/stats');
        if (!res.success) { ac.innerHTML = '<div class="error-msg">' + esc(res.error) + '</div>'; return; }
        var d = res.data.overview;
        var h = '<h3 style="margin-bottom:16px;">System Statistics</h3>';
        h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;">';
        var items = [
          ['Total Members', d.total_members], ['Active Members', d.active_members],
          ['Governance Roles', d.governance_roles_assigned], ['Projects', d.total_projects],
          ['Companies', d.total_companies], ['Open RFQs', d.open_rfqs],
          ['Transactions', d.total_transactions], ['Total Revenue', '$'+Number(d.total_revenue||0).toLocaleString()],
          ['Matchings', d.total_matches], ['Trust References', d.total_references],
          ['Opportunities', d.active_opportunities], ['Events', d.total_events]
        ];
        items.forEach(function(i) {
          h += '<div class="stat-card"><div class="value" style="font-size:20px;">' + i[1] + '</div><div class="label">' + i[0] + '</div></div>';
        });
        h += '</div>';
        h += '<h4 style="margin-top:24px;margin-bottom:12px;">Members by Access Level</h4>';
        h += '<div class="table-wrap"><table><thead><tr><th>Level</th><th>Count</th></tr></thead><tbody>';
        (res.data.members_by_access||[]).forEach(function(r) {
          h += '<tr><td>' + esc(r.access_level) + '</td><td>' + r.count + '</td></tr>';
        });
        h += '</tbody></table></div>';
        h += '<h4 style="margin-top:24px;margin-bottom:12px;">Database Tables</h4>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
        (res.data.database_tables||[]).forEach(function(t) {
          h += '<span class="badge badge-gray" style="font-family:monospace;font-size:12px;">' + t + '</span>';
        });
        h += '</div>';
        ac.innerHTML = h;
      } catch(e) { ac.innerHTML = '<div class="error-msg">Error: ' + esc(e.message) + '</div>'; }
    }
  }

  // Admin action functions (global scope)
  window.adminVerify = async function(id) {
    if (!confirm('Verify member #' + id + ' with full verification level?')) return;
    var res = await apiFetch('/admin/members/' + id + '/verify', 'PUT', { verification_level: 'id_complete' });
    alert(res.success ? 'Member verified' : 'Error: ' + (res.error||''));
    if (res.success) loadAdminTab('members');
  };
  window.adminToggleStatus = async function(id, current) {
    var newStatus = current === 'active' ? 'suspended' : 'active';
    if (!confirm('Change status to ' + newStatus + '?')) return;
    var res = await apiFetch('/admin/members/' + id + '/status', 'PUT', { status: newStatus });
    alert(res.success ? 'Status updated' : 'Error: ' + (res.error||''));
    if (res.success) loadAdminTab('members');
  };
  window.adminRole = async function(id, name) {
    var role = prompt('Assign governance role to ' + name + ':\n\nOptions: president_general, vp_founding, secretary_general, treasurer_general, board_member, president_regional, secretary_regional, treasurer_regional, regional_director, member');
    if (!role) return;
    var res = await apiFetch('/admin/roles/' + id, 'PUT', { governance_role: role });
    alert(res.success ? 'Role assigned: ' + role : 'Error: ' + (res.error||''));
    if (res.success) loadAdminTab('members');
  };
  window.adminRemoveRole = async function(id) {
    if (!confirm('Remove governance role?')) return;
    var res = await apiFetch('/admin/roles/' + id, 'DELETE');
    alert(res.success ? 'Role removed' : 'Error: ' + (res.error||''));
    if (res.success) loadAdminTab('governance');
  };

  window.adminEditProfile = async function(id) {
    var res = await apiFetch('/members/'+id);
    if (!res.success) { alert('Error: '+(res.error||'')); return; }
    showMemberEditor(res.data);
  };

  window.adminAccess = async function(id, current, currentRegion) {
    var levels = ['member','admin_regional','admin_global','superadmin'];
    var prompt1 = 'Set access level for member #' + id + '\n\nOptions:\n' + levels.map(function(l,i){return (i+1)+'. '+l + (l===current?' (current)':'');}).join('\n') + '\n\nEnter 1-4:';
    var ans = prompt(prompt1);
    if (!ans) return;
    var level = levels[parseInt(ans)-1];
    if (!level) { alert('Invalid choice'); return; }
    var body = { access_level: level };
    if (level === 'admin_regional') {
      var regRes = await apiFetch('/admin/regions');
      if (regRes.success) {
        var rid = prompt('Region for this regional admin:\n\n' + regRes.data.map(function(r){return r.id+'. '+r.name;}).join('\n') + '\n\nEnter region id:', currentRegion||'');
        if (rid) body.region_id = parseInt(rid);
      }
    }
    var r = await apiFetch('/admin/members/'+id+'/access', 'PUT', body);
    alert(r.success ? 'Access level updated to ' + level : 'Error: '+(r.error||''));
    if (r.success) loadAdminTab('members');
  };

  window.adminAddMember = function() {
    var html = '<h2>Add New Member</h2><div id="newMemMsg"></div>';
    html += '<form id="newMemForm" class="form-grid">';
    html += '<div class="form-group"><label>Email *</label><input name="email" type="email" required></div>';
    html += '<div class="form-group"><label>Temporary Password (leave blank to auto-generate)</label><input name="password"></div>';
    html += '<div class="form-group"><label>First Name *</label><input name="first_name" required></div>';
    html += '<div class="form-group"><label>Last Name *</label><input name="last_name" required></div>';
    html += '<div class="form-group"><label>Country</label><input name="country"></div>';
    html += '<div class="form-group"><label>Sector</label><select name="sector">'+sectorOptions(null,'-- Select sector --')+'</select></div>';
    html += '<div class="form-group"><label>Region</label><select name="region_id" id="newMemRegion"><option value="">-- Global --</option></select></div>';
    html += '<div class="form-group"><label>Membership Type</label><select name="membership_type"><option value="individual">Individual</option><option value="empresarial">Companyrial</option><option value="corporativo">Corporativo</option><option value="fundador">Fundador</option></select></div>';
    var canGlobal = currentMember.access_level === 'superadmin' || currentMember.access_level === 'admin_global';
    if (canGlobal) {
      html += '<div class="form-group"><label>Access Level</label><select name="access_level"><option value="member">Member</option><option value="admin_regional">Regional Admin</option><option value="admin_global">Global Admin</option>'+(currentMember.access_level==='superadmin'?'<option value="superadmin">Superadmin</option>':'')+'</select></div>';
      html += '<div class="form-group"><label>Governance Role</label><input name="governance_role" placeholder="member"></div>';
    }
    html += '<div class="form-group full mt-12" style="display:flex;gap:8px"><button type="submit" class="btn btn-primary">Create Member</button><button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button></div>';
    html += '</form>';
    openModal(html);
    apiFetch('/admin/regions').then(function(r) {
      if (r.success) {
        var sel = document.getElementById('newMemRegion');
        r.data.forEach(function(reg) { sel.innerHTML += '<option value="'+reg.id+'">'+esc(reg.name)+'</option>'; });
      }
    });
    document.getElementById('newMemForm').addEventListener('submit', async function(ev) {
      ev.preventDefault();
      var fd = new FormData(this); var body = {};
      fd.forEach(function(v,k){ if (v) body[k] = v; });
      if (body.region_id) body.region_id = parseInt(body.region_id);
      var msg = document.getElementById('newMemMsg');
      msg.innerHTML = '<div class="text-muted text-sm">Creating...</div>';
      var r = await apiFetch('/admin/members', 'POST', body);
      if (r.success) {
        var info = 'Member created: ' + r.data.email;
        if (r.data.temporary_password) info += '\n\nTemporary password: ' + r.data.temporary_password + '\n\n(Save this -- shown only once)';
        alert(info);
        closeModal(); loadAdminTab('members');
      } else {
        msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>';
      }
    });
  };

  window.adminDeleteMember = async function(id, email) {
    if (!confirm('Delete member ' + email + '?\n\nThis sets status to "deleted" (soft delete). The row stays for audit purposes.')) return;
    var r = await apiFetch('/admin/members/'+id, 'DELETE');
    alert(r.success ? 'Member deleted' : 'Error: '+(r.error||''));
    if (r.success) loadAdminTab('members');
  };

  window.adminAddRegion = async function() {
    var name = prompt('Region name (e.g. "Madrid Metro"):');
    if (!name) return;
    var description = prompt('Description (optional):', '') || '';
    var country_code = prompt('Country code (e.g. ES, MX, US, optional):', '') || '';
    var r = await apiFetch('/admin/regions', 'POST', { name: name, description: description, country_code: country_code });
    alert(r.success ? 'Region created' : 'Error: '+(r.error||''));
    if (r.success) loadAdminTab('regions');
  };

  window.adminEditRegion = async function(id, currentName, currentDesc) {
    var name = prompt('Region name:', currentName);
    if (!name) return;
    var description = prompt('Description:', currentDesc || '');
    var r = await apiFetch('/admin/regions/'+id, 'PUT', { name: name, description: description });
    alert(r.success ? 'Region updated' : 'Error: '+(r.error||''));
    if (r.success) loadAdminTab('regions');
  };

  window.adminDeleteRegion = async function(id, name) {
    if (!confirm('Delete region "' + name + '"?\n\nFails if any active members are assigned to it.')) return;
    var r = await apiFetch('/admin/regions/'+id, 'DELETE');
    alert(r.success ? 'Region deleted' : 'Error: '+(r.error||''));
    if (r.success) loadAdminTab('regions');
  };

  // -- Boot --
  init();

})();
</script>
</body>
</html>
