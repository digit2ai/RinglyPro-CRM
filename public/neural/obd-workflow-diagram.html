<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Intelligence OBD — System Architecture Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #07090f; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
h1,h2,h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
.page { max-width: 1600px; margin: 0 auto; padding: 40px 32px; }
.title-row { text-align: center; margin-bottom: 48px; }
.title-row h1 { font-size: 48px; color: #fff; margin-bottom: 8px; }
.title-row h1 em { font-style: normal; color: #8b5cf6; }
.title-row p { font-size: 15px; color: #64748b; }
.diagram { position: relative; }

/* ── Shared node styles ── */
.node { position: absolute; border-radius: 14px; padding: 16px 18px; text-align: center; z-index: 2; }
.node .icon { font-size: 28px; margin-bottom: 6px; }
.node .label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
.node .desc { font-size: 10px; color: #94a3b8; line-height: 1.4; }
.node-sm { position: absolute; border-radius: 10px; padding: 10px 14px; text-align: center; z-index: 2; }
.node-sm .icon { font-size: 20px; margin-bottom: 4px; }
.node-sm .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.node-sm .desc { font-size: 9px; color: #94a3b8; }

/* SVG layer for arrows */
.arrows { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

/* Legend */
.legend { display: flex; gap: 24px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }

/* Print friendly */
@media print { body { background: #fff; color: #000; } }
</style>
</head>
