<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VirtualChamber.app -- Member Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #003DA5;
  --primary-dark: #002D7A;
  --primary-light: #E6EEF8;
  --secondary: #CE1126;
  --accent: #FCD116;
  --accent-light: #FFF4CC;
  --accent-dark: #C9A500;
  --navy: #1A2332;
  --navy-light: #2d3a4d;
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #6c757d;
  --gray-700: #495057;
  --gray-900: #212529;
  --red: #dc3545;
  --green: #28a745;
  --blue: #007bff;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family:'Inter',sans-serif;
  color:var(--gray-900);
  background:var(--gray-50);
  font-size:14px;
  line-height:1.5;
}
a { text-decoration:none; color:inherit; }
button { cursor:pointer; font-family:inherit; }
input, select, textarea { font-family:inherit; font-size:14px; }

/* Layout */
.app { display:flex; min-height:100vh; }

/* Sidebar */
.sidebar {
  width:var(--sidebar-w);
  background:var(--navy);
  color:var(--white);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:100;
  transition:transform 0.3s;
}
.sidebar-logo {
  padding:24px 20px 20px;
  font-weight:800;
  font-size:20px;
  letter-spacing:3px;
  border-bottom:1px solid var(--navy-light);
}
.sidebar-logo span { color:var(--accent); }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.sidebar-nav-item {
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  color:rgba(255,255,255,0.7);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
  border-left:3px solid transparent;
}
.sidebar-nav-item:hover {
  background:rgba(255,255,255,0.06);
  color:var(--white);
}
.sidebar-nav-item.active {
  background:rgba(0,61,165,0.25);
  color:var(--accent);
  border-left-color:var(--accent);
}
.sidebar-nav-item svg { width:18px; height:18px; flex-shrink:0; }
.sidebar-footer {
  padding:16px 20px;
  border-top:1px solid var(--navy-light);
  font-size:13px;
}
.sidebar-footer .member-name {
  font-weight:600;
  color:var(--white);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.sidebar-footer .member-type {
  color:var(--accent);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:10px;
}
.btn-logout {
  background:none;
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);
  padding:6px 14px;
  border-radius:4px;
  font-size:12px;
  transition:all 0.2s;
  width:100%;
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }

/* Main */
.main {
  flex:1;
  margin-left:var(--sidebar-w);
  padding:28px 32px;
  min-height:100vh;
}
.main-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
.main-header h1 {
  font-size:22px;
  font-weight:700;
  color:var(--navy);
}
.hamburger {
  display:none;
  background:none;
  border:none;
  padding:8px;
  cursor:pointer;
}
.hamburger svg { width:24px; height:24px; }

/* Overlay */
.sidebar-overlay {
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);
  z-index:99;
}

/* Cards */
.stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card {
  background:var(--white);
  border-radius:10px;
  padding:20px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.stat-card .label { font-size:12px; color:var(--gray-500); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.stat-card .value { font-size:28px; font-weight:700; color:var(--navy); }
.stat-card .value.primary { color:var(--primary); }
.stat-card .value.accent { color:var(--accent-dark); }

/* Panel */
.panel {
  background:var(--white);
  border-radius:10px;
  padding:24px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  margin-bottom:20px;
}
.panel h2 { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--navy); }
.panel h3 { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--gray-700); }

/* Forms */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:12px; font-weight:600; color:var(--gray-700); text-transform:uppercase; letter-spacing:0.3px; }
.form-group input, .form-group select, .form-group textarea {
  padding:9px 12px;
  border:1px solid var(--gray-300);
  border-radius:6px;
  outline:none;
  transition:border 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-group textarea { resize:vertical; min-height:80px; }

/* Buttons */
.btn {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:9px 18px;
  border-radius:6px;
  font-size:13px;
  font-weight:600;
  border:none;
  transition:all 0.2s;
}
.btn-primary { background:var(--primary); color:var(--white); }
.btn-primary:hover { background:var(--primary-dark); }
.btn-accent { background:var(--accent); color:var(--navy); }
.btn-accent:hover { background:var(--accent-dark); }
.btn-outline { background:none; border:1px solid var(--gray-300); color:var(--gray-700); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-danger { background:var(--red); color:var(--white); }

/* Table */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; background:var(--gray-100); color:var(--gray-700); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
td { padding:10px 12px; border-bottom:1px solid var(--gray-200); }

/* Badge */
.badge {
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.badge-gray { background:var(--gray-200); color:var(--gray-700); }
.badge-blue { background:var(--primary-light); color:var(--primary-dark); }
.badge-gold { background:var(--accent-light); color:var(--accent-dark); }
.badge-teal { background:#e0f2f1; color:#00695c; }
.badge-green { background:#d4edda; color:#155724; }
.badge-red { background:#f8d7da; color:#721c24; }

/* Search bar */
.search-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.search-bar input, .search-bar select {
  padding:9px 12px;
  border:1px solid var(--gray-300);
  border-radius:6px;
  outline:none;
  font-size:13px;
}
.search-bar input { flex:1; min-width:200px; }
.search-bar select { min-width:140px; }

/* Result cards */
.result-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.result-card {
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:8px;
  padding:16px;
  cursor:pointer;
  transition:all 0.2s;
}
.result-card:hover { border-color:var(--primary); box-shadow:0 2px 8px rgba(0,61,165,0.1); }
.result-card .rc-name { font-weight:700; font-size:15px; color:var(--navy); margin-bottom:2px; }
.result-card .rc-company { font-size:13px; color:var(--gray-500); margin-bottom:6px; }
.result-card .rc-meta { display:flex; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--gray-700); }
.result-card .rc-score { display:flex; gap:12px; margin-top:8px; font-size:12px; }
.result-card .rc-score span { color:var(--primary); font-weight:600; }

/* Modal */
.modal-overlay {
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);
  z-index:200;
  align-items:center;
  justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--white);
  border-radius:12px;
  width:90%;
  max-width:600px;
  max-height:85vh;
  overflow-y:auto;
  padding:28px;
  position:relative;
}
.modal-close {
  position:absolute;
  top:12px;right:16px;
  background:none;
  border:none;
  font-size:22px;
  color:var(--gray-500);
  cursor:pointer;
}

/* Tabs */
.tabs { display:flex; gap:0; margin-bottom:18px; border-bottom:2px solid var(--gray-200); }
.tab-btn {
  padding:10px 20px;
  font-size:13px;
  font-weight:600;
  color:var(--gray-500);
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  transition:all 0.2s;
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-btn:hover { color:var(--primary); }

/* Gauge */
.gauge-wrap { display:flex; align-items:center; justify-content:center; padding:20px; }
.gauge {
  width:180px; height:180px;
  border-radius:50%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.gauge-inner {
  width:130px; height:130px;
  border-radius:50%;
  background:var(--white);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1;
}
.gauge-value { font-size:32px; font-weight:800; color:var(--navy); }
.gauge-label { font-size:11px; color:var(--gray-500); text-transform:uppercase; }

/* Bar chart */
.bar-chart { padding:8px 0; }
.bar-row { display:flex; align-items:center; margin-bottom:10px; gap:10px; }
.bar-label { width:140px; font-size:12px; color:var(--gray-700); text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:22px; background:var(--gray-100); border-radius:4px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.6s; display:flex; align-items:center; padding-left:8px; }
.bar-fill span { font-size:11px; font-weight:600; color:var(--white); }

/* Lifecycle dots */
.lifecycle-dots { display:flex; align-items:center; gap:4px; margin:12px 0; }
.lifecycle-dot {
  width:28px; height:28px;
  border-radius:50%;
  border:2px solid var(--gray-300);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:700;
  color:var(--gray-400);
}
.lifecycle-dot.active { border-color:var(--primary); background:var(--primary); color:var(--white); }
.lifecycle-dot.done { border-color:var(--green); background:var(--green); color:var(--white); }
.lifecycle-line { width:20px; height:2px; background:var(--gray-300); }
.lifecycle-line.done { background:var(--green); }

/* Pricing table */
.pricing-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
.pricing-card {
  border:2px solid var(--gray-200);
  border-radius:10px;
  padding:20px;
  text-align:center;
  transition:all 0.2s;
}
.pricing-card.current { border-color:var(--accent); }
.pricing-card .tier-name { font-size:16px; font-weight:700; color:var(--navy); margin-bottom:4px; }
.pricing-card .tier-desc { font-size:12px; color:var(--gray-500); margin-bottom:12px; }
.pricing-card .tier-price { font-size:28px; font-weight:800; color:var(--primary); }
.pricing-card .tier-period { font-size:12px; color:var(--gray-500); margin-bottom:14px; }

/* Trust component list */
.trust-components { display:flex; flex-direction:column; gap:10px; }
.trust-row { display:flex; align-items:center; gap:10px; }
.trust-row .tr-label { width:100px; font-size:12px; font-weight:600; color:var(--gray-700); }
.trust-row .tr-bar { flex:1; height:16px; background:var(--gray-100); border-radius:4px; overflow:hidden; }
.trust-row .tr-fill { height:100%; border-radius:4px; background:var(--primary); }
.trust-row .tr-val { width:50px; text-align:right; font-size:12px; font-weight:600; color:var(--gray-700); }

/* Loading / Error */
.loading { text-align:center; padding:40px; color:var(--gray-500); font-size:14px; }
.error-msg { color:var(--red); font-size:13px; padding:10px 0; }
.success-msg { color:var(--green); font-size:13px; padding:10px 0; }

/* Utilities */
.mt-12 { margin-top:12px; }
.mt-16 { margin-top:16px; }
.mt-20 { margin-top:20px; }
.mb-12 { margin-bottom:12px; }
.mb-16 { margin-bottom:16px; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.text-muted { color:var(--gray-500); }
.text-sm { font-size:12px; }

/* Responsive */
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .sidebar-overlay.show { display:block; }
  .main { margin-left:0; padding:16px; }
  .hamburger { display:block; }
  .form-grid { grid-template-columns:1fr; }
  .stat-cards { grid-template-columns:1fr 1fr; }
  .result-cards { grid-template-columns:1fr; }
  .pricing-grid { grid-template-columns:1fr; }
}
</style>
</head>

  <aside class="sidebar" id="sidebar">

<script>
(function() {
  'use strict';

  // -- Dynamic base path for custom domain support --
  var isCustomDomain = location.hostname === 'virtualchamber.app' || location.hostname === 'www.virtualchamber.app';
  var BASE = isCustomDomain ? '' : '/chamber/virtualchamber';

  // -- State --
  const API = BASE + '/api';
  let currentMember = null;
  let currentPage = 'dashboard';

  // -- Auth --
  function getToken() { return localStorage.getItem('virtualchamber_token'); }

  function decodeJWT(token) {
    try {
      const payload = token.split('.')[1];
      return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
    } catch(e) { return null; }
  }

  function logout() {
    localStorage.removeItem('virtualchamber_token');
    window.location.href = BASE + '/#registro';
  }

  async function apiFetch(path, methodOrOpts, body) {
    var opts = {};
    if (typeof methodOrOpts === 'string') {
      opts = { method: methodOrOpts };
      if (body) opts.body = JSON.stringify(body);
    } else if (methodOrOpts) {
      opts = methodOrOpts;
    }
    var token = getToken();
    var headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    var res = await fetch(API + path, { ...opts, headers });
    var data = await res.json();
    if (res.status === 401) { logout(); throw new Error('Session expired'); }
    return data;
  }

  // -- Init --
  async function init() {
    var token = getToken();
    if (!token) { window.location.href = BASE + '/#registro'; return; }

    var decoded = decodeJWT(token);
    if (!decoded) { logout(); return; }

    try {
      var res = await apiFetch('/auth/me');
      if (!res.success) { logout(); return; }
      currentMember = res.data;
      currentMember.member_id = currentMember.id;
    } catch(e) {
      logout(); return;
    }

    document.getElementById('sidebarName').textContent = currentMember.first_name + ' ' + currentMember.last_name;
    var roleLabel = currentMember.governance_role && currentMember.governance_role !== 'member'
      ? currentMember.governance_role.replace(/_/g, ' ') : currentMember.membership_type || 'individual';
    document.getElementById('sidebarType').textContent = roleLabel;

    // Show admin nav if user has admin access
    if (['superadmin', 'admin_global', 'admin_regional'].includes(currentMember.access_level)) {
      document.getElementById('adminNavItem').style.display = 'flex';
    }

    setupNav();
    setupHamburger();
    setupModal();
    document.getElementById('btnLogout').addEventListener('click', logout);
    navigate('dashboard');
  }

  // -- Navigation --
  function setupNav() {
    document.querySelectorAll('.sidebar-nav-item').forEach(function(item) {
      item.addEventListener('click', function() {
        navigate(this.dataset.page);
        closeSidebar();
      });
    });
  }

  function navigate(page) {
    currentPage = page;
    document.querySelectorAll('.sidebar-nav-item').forEach(function(i) {
      i.classList.toggle('active', i.dataset.page === page);
    });
    var titles = {
      dashboard:'Dashboard', profile:'My Profile', directory:'Directory',
      matching:'AI Matching', projects:'Projects', exchange:'Exchange',
      metrics:'Metrics', payments:'Payments', admin:'Administration'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;
    document.getElementById('pageContent').innerHTML = '<div class="loading">Loading...</div>';
    var renderers = {
      dashboard:renderDashboard, profile:renderProfile, directory:renderDirectory,
      matching:renderMatching, projects:renderProjects, exchange:renderExchange,
      metrics:renderMetrics, payments:renderPayments, admin:renderAdmin
    };
    if (renderers[page]) renderers[page]();
  }

  // -- Helpers --
  function esc(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

  async function renderDashboard() {
    var el = document.getElementById('pageContent');
    try {
      var res = await apiFetch('/metrics/dashboard');
      if (!res.success) { el.innerHTML = '<div class="error-msg">Error loading dashboard</div>'; return; }
      var d = res.data;
      var c = d.current;
      var hciVal = '--';
      if (d.history && d.history.length > 0) {
        var last = d.history[d.history.length - 1];
        hciVal = (last.hci_score != null) ? (parseFloat(last.hci_score) * 100).toFixed(1) + '%' : '--';
      }

      var html = '';
      html += '<p style="font-size:16px;color:var(--gray-700);margin-bottom:20px;">Welcome, <strong>'+esc(currentMember.first_name)+'</strong>. Here is your network overview.</p>';
      html += '<div class="stat-cards">';
      html += '<div class="stat-card"><div class="label">Active Members</div><div class="value primary">'+(c.members||0)+'</div></div>';
      html += '<div class="stat-card"><div class="label">Active Projects</div><div class="value">'+(c.active_projects||0)+'</div></div>';
      html += '<div class="stat-card"><div class="label">Open RFQs</div><div class="value accent">'+(c.open_rfqs||0)+'</div></div>';
      html += '<div class="stat-card"><div class="label">HCI Score</div><div class="value primary">'+hciVal+'</div></div>';
      html += '</div>';

      // Members by region
      if (d.members_by_region && d.members_by_region.length) {
        html += '<div class="panel"><h2>Members by Region</h2><div class="bar-chart">';
        var maxR = Math.max.apply(null, d.members_by_region.map(function(r){return parseInt(r.count)||0;})) || 1;
        d.members_by_region.forEach(function(r) {
          var cnt = parseInt(r.count)||0;
          var w = Math.max((cnt/maxR)*100, 2);
          html += '<div class="bar-row"><div class="bar-label">'+esc(r.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:var(--primary);"><span>'+cnt+'</span></div></div></div>';
        });
        html += '</div></div>';
      }

      // Members by type
      if (d.members_by_type && d.members_by_type.length) {
        html += '<div class="panel"><h2>Membership Distribution</h2><div class="bar-chart">';
        var maxT = Math.max.apply(null, d.members_by_type.map(function(t){return parseInt(t.count)||0;})) || 1;
        d.members_by_type.forEach(function(t) {
          var cnt = parseInt(t.count)||0;
          var w = Math.max((cnt/maxT)*100, 2);
          html += '<div class="bar-row"><div class="bar-label">'+esc(t.membership_type)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:var(--accent);"><span>'+cnt+'</span></div></div></div>';
        });
        html += '</div></div>';
      }

      // Recent history
      if (d.history && d.history.length > 0) {
        html += '<div class="panel"><h2>Recent Network Activity</h2><div class="table-wrap"><table><thead><tr><th>Date</th><th>Members</th><th>Active</th><th>Gini</th><th>Trust</th><th>HCI</th></tr></thead><tbody>';
        d.history.slice(-10).reverse().forEach(function(h2) {
          html += '<tr><td>'+formatDate(h2.date)+'</td><td>'+h2.total_members+'</td><td>'+h2.active_members+'</td><td>'+h2.gini_regional+'</td><td>'+parseFloat(h2.avg_trust).toFixed(3)+'</td><td>'+(parseFloat(h2.hci_score)*100).toFixed(1)+'%</td></tr>';
        });
        html += '</tbody></table></div></div>';
      }

      el.innerHTML = html;
    } catch(e) {
      el.innerHTML = '<div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

  async function loadTrustScore(memberId, containerId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    try {
      var res = await apiFetch('/metrics/trust/'+memberId);
      if (!res.success) { container.innerHTML = '<h2>Trust Score</h2><div class="error-msg">Not available</div>'; return; }
      var d = res.data;
      var html = '<h2>Trust Score: <span style="color:var(--primary)">'+((d.trust_score != null ? d.trust_score : d.trust_base_calculated) || 0).toFixed(3)+'</span></h2>';
      html += '<div class="trust-components mt-12">';
      if (d.components) {
        var comps = d.components;
        var items = [
          {label:'Verification', val:comps.verification?comps.verification.value:0, w:comps.verification?comps.verification.weight:0},
          {label:'References', val:comps.references?comps.references.value:0, w:comps.references?comps.references.weight:0},
          {label:'Projects', val:comps.projects?comps.projects.value:0, w:comps.projects?comps.projects.weight:0},
          {label:'Tenure', val:comps.tenure?comps.tenure.value:0, w:comps.tenure?comps.tenure.weight:0},
          {label:'Membership', val:comps.membership?comps.membership.value:0, w:comps.membership?comps.membership.weight:0}
        ];
        items.forEach(function(it) {
          var pctV = Math.round(it.val * 100);
          html += '<div class="trust-row"><div class="tr-label">'+it.label+' ('+Math.round(it.w*100)+'%)</div><div class="tr-bar"><div class="tr-fill" style="width:'+pctV+'%"></div></div><div class="tr-val">'+pctV+'%</div></div>';
        });
      }
      html += '</div>';
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<h2>Trust Score</h2><div class="error-msg">Error loading data</div>';
    }
  }

  async function renderDirectory() {

    async function searchDir() {
      var params = new URLSearchParams();
      var s = document.getElementById('dirSearch').value.trim();
      var r = document.getElementById('dirRegion').value;
      var sec = document.getElementById('dirSector').value;
      if (s) params.set('search', s);
      if (r) params.set('region_id', r);
      if (sec) params.set('sector', sec);
      params.set('limit', '50');

      var out = document.getElementById('dirResults');
      out.innerHTML = '<div class="loading">Loading...</div>';
      try {
        var res = await apiFetch('/members?' + params.toString());
        if (!res.success) { out.innerHTML = '<div class="error-msg">Error searching</div>'; return; }
        var members = res.data.members || [];
        if (members.length === 0) { out.innerHTML = '<p class="text-muted">No members found.</p>'; return; }
        var h = '<div class="result-cards">';
        members.forEach(function(m) {
          h += '<div class="result-card" data-member-id="'+m.id+'">';
          h += '<div class="rc-name">'+esc(m.first_name)+' '+esc(m.last_name)+'</div>';
          h += '<div class="rc-company">'+esc(m.company_name||'--')+' <span class="badge '+badgeClass(m.membership_type)+'">'+esc(m.membership_type)+'</span></div>';
          h += '<div class="rc-meta"><span>'+esc(m.sector||'--')+'</span><span>'+esc(m.country||'--')+'</span>';
          if (m.years_experience) h += '<span>'+m.years_experience+' yrs exp.</span>';
          h += '</div></div>';
        });
        h += '</div>';
        if (res.data.pagination) h += '<p class="text-muted text-sm mt-12">'+res.data.pagination.total+' members found (page '+res.data.pagination.page+' of '+res.data.pagination.total_pages+')</p>';
        out.innerHTML = h;

        out.querySelectorAll('.result-card').forEach(function(card) {
          card.addEventListener('click', function() { showMemberModal(this.dataset.memberId); });
        });
      } catch(e) {
        out.innerHTML = '<div class="error-msg">Error: '+esc(e.message)+'</div>';
      }
    }

    document.getElementById('dirBtn').addEventListener('click', searchDir);
    document.getElementById('dirSearch').addEventListener('keypress', function(e){ if(e.key==='Enter') searchDir(); });
    searchDir();
  }

  // ================================================================
  var LIFECYCLE = ['proposal','analysis','team','resources','execution','completed'];

  function lifecycleDots(status) {
    var idx = LIFECYCLE.indexOf(status);
    if (idx === -1) idx = 0;
    var h = '<div class="lifecycle-dots">';
    for (var i = 0; i < LIFECYCLE.length; i++) {
      if (i > 0) h += '<div class="lifecycle-line'+(i<=idx?' done':'')+'"></div>';
      var cls = i < idx ? 'done' : (i === idx ? 'active' : '');
      h += '<div class="lifecycle-dot '+cls+'" title="'+LIFECYCLE[i]+'">'+(i+1)+'</div>';
    }
    h += '</div>';
    return h;
  }

  async function showProjectDetail(id) {
    openModal('<div class="loading">Loading project...</div>');

      var res = await apiFetch('/projects/'+id);

      var p = res.data;
      var html = '<h2 style="margin-bottom:8px">'+esc(p.title)+'</h2>';
      html += '<div style="margin-bottom:12px">'+statusBadge(p.status)+' <span class="text-muted text-sm"> | Proposed by '+esc(p.proposer_name||'--')+'</span></div>';
      html += lifecycleDots(p.status);
      html += '<p style="margin:12px 0;font-size:13px;color:var(--gray-700)">'+esc(p.description||'')+'</p>';
      html += '<table style="width:100%;margin-bottom:16px">';
      html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Sector</td><td style="font-size:13px">'+esc(p.sector||'--')+'</td></tr>';
      if (p.countries) html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Countries</td><td style="font-size:13px">'+esc((p.countries||[]).join(', '))+'</td></tr>';
      if (p.budget_est) html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Budget</td><td style="font-size:13px">$'+Number(p.budget_min||0).toLocaleString()+' - $'+Number(p.budget_est||0).toLocaleString()+' - $'+Number(p.budget_max||0).toLocaleString()+'</td></tr>';
      if (p.timeline_est_months) html += '<tr><td style="font-weight:600;padding:4px 12px 4px 0;color:var(--gray-500);font-size:13px">Timeline</td><td style="font-size:13px">'+p.timeline_min_months+' - '+p.timeline_est_months+' - '+p.timeline_max_months+' months</td></tr>';
      html += '</table>';

      // Team
      html += '<h3>Team ('+(p.team?p.team.length:0)+' members)</h3>';
      if (p.team && p.team.length > 0) {
        html += '<div style="margin-bottom:12px">';
        p.team.forEach(function(t) {
          html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-200);font-size:13px"><strong>'+esc(t.first_name)+' '+esc(t.last_name)+'</strong><span class="text-muted">'+esc(t.role||'collaborator')+'</span><span class="text-muted">'+esc(t.sector||'')+'</span></div>';
        });
        html += '</div>';
      } else {
        html += '<p class="text-muted text-sm mb-12">No team members yet.</p>';
      }

      // Action buttons
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">';
      if (p.status !== 'completed') {
        html += '<button class="btn btn-primary btn-sm" id="advanceBtn">Advance Phase</button>';
        html += '<button class="btn btn-outline btn-sm" id="joinBtn">Join Team</button>';
      }
      html += '<button class="btn btn-accent btn-sm" id="evaluateBtn">Evaluate Risk</button>';
      html += '</div>';
      html += '<div id="projActionMsg" style="margin-top:10px"></div>';

      openModal(html);

      var advBtn = document.getElementById('advanceBtn');
      if (advBtn) advBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Advancing phase...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/advance', { method:'POST' });
          if (r.success) { msg.innerHTML = '<div class="success-msg">Advanced to: '+esc(r.data.status)+'</div>'; loadProjects(); } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      var joinBtn = document.getElementById('joinBtn');
      if (joinBtn) joinBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Joining...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/join', { method:'POST', body:JSON.stringify({role:'collaborator'}) });
          if (r.success) { msg.innerHTML = '<div class="success-msg">You have joined the project.</div>'; } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

      var evalBtn = document.getElementById('evaluateBtn');
      if (evalBtn) evalBtn.addEventListener('click', async function() {
        var msg = document.getElementById('projActionMsg');
        msg.innerHTML = '<div class="text-muted text-sm">Evaluating risk (Monte Carlo)...</div>';
        try {
          var r = await apiFetch('/projects/'+id+'/evaluate', { method:'POST' });
          if (r.success) {
            var ev = r.data;
            var h = '<div class="success-msg">Evaluation complete</div>';
            h += '<div style="background:var(--gray-50);padding:12px;border-radius:6px;font-size:12px;margin-top:8px">';
            h += '<strong>Success probability:</strong> '+(ev.success_probability*100)+'% | <strong>Risk:</strong> '+esc(ev.risk_score)+'<br>';
            h += '<strong>Budget P50:</strong> $'+Number(ev.budget.p50).toLocaleString()+' | <strong>P90:</strong> $'+Number(ev.budget.p90).toLocaleString()+'<br>';
            h += '<strong>Timeline P50:</strong> '+ev.timeline_months.p50+' months | <strong>P90:</strong> '+ev.timeline_months.p90+' months';
            h += '</div>';
            msg.innerHTML = h;
          } else { msg.innerHTML = '<div class="error-msg">'+(r.error||'Error')+'</div>'; }
        } catch(e) { msg.innerHTML = '<div class="error-msg">'+esc(e.message)+'</div>'; }
      });

    } catch(e) {
      openModal('<div class="error-msg">Error: '+esc(e.message)+'</div>');
    }
  }

  async function loadHCI() {
    var container = document.getElementById('metricsHCI');
    try {
      var res = await apiFetch('/metrics/hci');
      if (!res.success) { container.innerHTML = '<h2>HCI Score</h2><div class="error-msg">Error loading</div>'; return; }
      var d = res.data;
      var hciPct = Math.round(d.hci * 100);
      var targetPct = Math.round(d.target * 100);
      var angle = hciPct * 3.6;
      var bgGrad = 'conic-gradient(var(--primary) 0deg, var(--primary) '+angle+'deg, var(--gray-200) '+angle+'deg)';

      var html = '<h2>VirtualChamber.app -- Composite Index (HCI)</h2>';
      html += '<div class="gauge-wrap"><div class="gauge" style="background:'+bgGrad+'"><div class="gauge-inner"><div class="gauge-value">'+hciPct+'%</div><div class="gauge-label">HCI Score</div></div></div></div>';
      html += '<p class="text-muted text-sm" style="text-align:center">Target: '+targetPct+'%</p>';

      // Components
      html += '<div style="margin-top:16px"><h3>Components</h3><div class="trust-components">';
      var comps = d.components;
      var items = [
        {label:'Equity (1-Gini)', val:comps.equity.value, w:comps.equity.weight},
        {label:'Trust', val:comps.trust.value, w:comps.trust.weight},
        {label:'Network Value', val:comps.network.value, w:comps.network.weight},
        {label:'Projects', val:comps.projects.value, w:comps.projects.weight},
        {label:'Activation', val:comps.activation.value, w:comps.activation.weight}
      ];
      items.forEach(function(it) {
        var p = Math.round(it.val * 100);
        html += '<div class="trust-row"><div class="tr-label">'+it.label+' ('+Math.round(it.w*100)+'%)</div><div class="tr-bar"><div class="tr-fill" style="width:'+p+'%"></div></div><div class="tr-val">'+p+'%</div></div>';
      });
      html += '</div></div>';
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<h2>HCI Score</h2><div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

  async function loadGini() {
    var container = document.getElementById('metricsGini');
    try {
      var res = await apiFetch('/metrics/gini?dimension=regional&metric=opportunities');
      if (!res.success) { container.innerHTML = '<h2>Gini</h2><div class="error-msg">Error</div>'; return; }
      var d = res.data;
      var html = '<h2>Gini Coefficient by Region</h2>';
      html += '<div style="display:flex;gap:20px;align-items:center;margin-bottom:16px">';
      html += '<div><span style="font-size:28px;font-weight:800;color:'+(d.gini>d.threshold?'var(--red)':'var(--primary)')+'">'+d.gini+'</span><div class="text-sm text-muted">Gini (threshold: '+d.threshold+')</div></div>';
      html += '<div class="badge '+(d.correction_active?'badge-red':'badge-green')+'">'+(d.correction_active?'Correction active':'Balanced')+'</div>';
      html += '</div>';

      if (d.details && d.details.length) {
        var maxVal = Math.max.apply(null, d.details.map(function(r){return r.value||0;})) || 1;
        html += '<div class="bar-chart">';
        d.details.forEach(function(r) {
          var w = Math.max((r.value/maxVal)*100, 2);
          var color = r.correction_factor > 1.05 ? 'var(--accent)' : 'var(--primary)';
          html += '<div class="bar-row"><div class="bar-label">'+esc(r.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+color+'"><span>'+r.value+'</span></div></div><div style="width:60px;text-align:right;font-size:11px;color:var(--gray-500)">x'+r.correction_factor+'</div></div>';
        });
        html += '</div>';
      }
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<h2>Gini</h2><div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

  async function loadPricing() {
    var container = document.getElementById('pricingGrid');
    try {
      var res = await apiFetch('/payments/pricing');
      if (!res.success) { container.innerHTML = '<div class="error-msg">Error</div>'; return; }
      var data = res.data;
      var tiers = ['individual','business','corporate','founding'];
      var descs = {
        individual:'Individual Membership -- Basic network access, directory, and matching.',
        business:'Business Membership -- Advanced features, RFQ priority, company profile.',
        corporate:'Corporate Membership -- Full access, escrow, Monte Carlo evaluation.',
        founding:'Founding Membership -- Founding member, governance voting, special rates.'
      };
      var h = '<div class="pricing-grid">';
      tiers.forEach(function(t) {
        var p = data[t];
        if (!p) return;
        var isCurrent = currentMember.membership_type === t;
        h += '<div class="pricing-card'+(isCurrent?' current':'')+'">';
        h += '<div class="tier-name">'+t.charAt(0).toUpperCase()+t.slice(1)+'</div>';
        h += '<div class="tier-desc">'+descs[t]+'</div>';
        h += '<div class="tier-price">$'+p.monthly+'</div>';
        h += '<div class="tier-period">USD / month (annual: $'+p.annual+')</div>';

          h += '<span class="badge badge-blue">Current Plan</span>';
        } else {
          h += '<button class="btn btn-outline btn-sm change-plan-btn" data-type="'+t+'">Switch to '+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';
        }
        h += '</div>';
      });
      h += '</div>';
      container.innerHTML = h;

      container.querySelectorAll('.change-plan-btn').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var type = this.dataset.type;
          if (!confirm('Switch your membership to '+type+'?')) return;
          try {
            var res = await apiFetch('/payments/membership', { method:'POST', body:JSON.stringify({ membership_type:type, billing_period:'monthly' }) });
            if (res.success) {
              currentMember.membership_type = type;
              document.getElementById('sidebarType').textContent = type;
              navigate('payments');
            } else {
              alert(res.error||'Error switching plan');
            }
          } catch(e) { alert('Error: '+e.message); }
        });
      });
    } catch(e) {
      container.innerHTML = '<div class="error-msg">Error: '+esc(e.message)+'</div>';
    }
  }

  };
  window.adminRole = async function(id, name) {
    var role = prompt('Assign governance role to ' + name + ':\n\nOptions: president_general, vp_founding, secretary_general, treasurer_general, board_member, president_regional, secretary_regional, treasurer_regional, regional_director, member');
    if (!role) return;
    var res = await apiFetch('/admin/roles/' + id, 'PUT', { governance_role: role });
    alert(res.success ? 'Role assigned: ' + role : 'Error: ' + (res.error||''));
    if (res.success) loadAdminTab('members');
  };
  window.adminRemoveRole = async function(id) {
    if (!confirm('Remove governance role?')) return;
    var res = await apiFetch('/admin/roles/' + id, 'DELETE');
    alert(res.success ? 'Role removed' : 'Error: ' + (res.error||''));
    if (res.success) loadAdminTab('governance');
  };

  // -- Boot --
  init();

})();
</script>
</body>
</html>
