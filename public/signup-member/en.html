<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Member Signup - VirtualChamber</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing:border-box; }
  body { margin:0; min-height:100vh; font-family:'Inter',sans-serif; background:linear-gradient(160deg,#0a1628 0%,#002670 55%,#003DA5 100%); display:flex; align-items:center; justify-content:center; padding:24px; color:#fff; }
  .card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:36px 32px; max-width:520px; width:100%; backdrop-filter:blur(12px); }
  .logo { display:block; margin:0 auto 14px; height:96px; width:96px; border-radius:16px; background:white; padding:6px; object-fit:cover; box-shadow:0 4px 14px rgba(0,0,0,0.35); }
  h1 { font-size:24px; font-weight:800; margin:0 0 6px; text-align:center; }
  p.tagline { color:rgba(255,255,255,0.7); font-size:14px; text-align:center; margin:0 0 22px; }
  label { display:block; font-size:11px; font-weight:600; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  input, select, textarea { width:100%; padding:11px 13px; border-radius:8px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.06); color:#fff; font-size:15px; outline:none; margin-bottom:14px; font-family:inherit; }
  input:focus { border-color:#FCD116; }
  .pw-wrap { position:relative; margin-bottom:14px; }
  .pw-wrap input { margin-bottom:0; padding-right:64px; }
  .pw-toggle { position:absolute; top:50%; right:10px; transform:translateY(-50%); background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); color:rgba(255,255,255,0.8); font-size:11px; font-weight:600; padding:5px 9px; border-radius:6px; cursor:pointer; letter-spacing:0.5px; text-transform:uppercase; }
  .pw-toggle:hover { background:rgba(255,255,255,0.16); color:#fff; }
  .pw-mismatch { color:#ff8b8b; font-size:12px; margin:-8px 0 12px; min-height:14px; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  button { width:100%; padding:14px; background:#CE1126; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; }
  button:hover { background:#a50d1e; }
  button:disabled { opacity:0.55; cursor:not-allowed; }
  .msg { margin-top:14px; padding:11px; border-radius:7px; font-size:13px; text-align:center; }
  .msg.error { background:rgba(192,57,43,0.18); color:#ff8b8b; border:1px solid rgba(192,57,43,0.4); }
  .msg.ok { background:rgba(39,174,96,0.18); color:#7ee2a0; border:1px solid rgba(39,174,96,0.4); }
  .links { margin-top:18px; text-align:center; font-size:13px; color:rgba(255,255,255,0.7); }
  .links a { color:#FCD116; text-decoration:none; margin:0 6px; }
  .links a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" id="brandLogo"
       src="https://assets.cdn.filesafe.space/3lSeAHXNU9t09Hhp9oai/media/69eacc56821e8babd85501cc.png"
       alt="VirtualChamber">
  <h1 id="chamberName">Member Signup</h1>
  <p class="tagline" id="chamberTagline">Create your account to access the directory and AI matching.</p>
  <div style="background:rgba(252,209,22,0.1); border:1px solid rgba(252,209,22,0.35); border-radius:10px; padding:12px 14px; margin-bottom:18px; text-align:center; font-size:13px; color:#FCD116;">
    <strong>$25 USD</strong> initial setup + <strong>$10 USD/month</strong> membership.<br>
    Secure checkout powered by Stripe.
  </div>

  <form id="signupForm">
    <div class="row">
      <div>
        <label for="first_name">First name</label>
        <input type="text" id="first_name" required autocomplete="given-name">
      </div>
      <div>
        <label for="last_name">Last name</label>
        <input type="text" id="last_name" required autocomplete="family-name">
      </div>
    </div>
    <label for="email">Email</label>
    <input type="email" id="email" required autocomplete="email">
    <label for="password">Password (min 8 chars)</label>
    <div class="pw-wrap">
      <input type="password" id="password" required minlength="8" autocomplete="new-password">
      <button type="button" class="pw-toggle" data-target="password" aria-label="Show password">Show</button>
    </div>
    <label for="password_confirm">Confirm password</label>
    <div class="pw-wrap">
      <input type="password" id="password_confirm" required minlength="8" autocomplete="new-password">
      <button type="button" class="pw-toggle" data-target="password_confirm" aria-label="Show password">Show</button>
    </div>
    <div class="pw-mismatch" id="pwMismatch"></div>
    <div class="row">
      <div>
        <label for="country">Country</label>
        <input type="text" id="country" placeholder="United States">
      </div>
      <div>
        <label for="sector">Sector</label>
        <input type="text" id="sector" placeholder="Technology">
      </div>
    </div>
    <label for="company_name">Company (optional)</label>
    <input type="text" id="company_name">
    <button type="submit" id="submitBtn">Continue to secure checkout</button>
    <div id="msgBox"></div>
  </form>

  <div class="links">
    <a id="loginLink" href="#">Sign in</a> |
    <a id="backLink" href="#">Back to chamber</a>
  </div>
</div>

<script>
(function() {
  var path = window.location.pathname.replace(/\/$/, '');
  var slug = path.split('/').filter(Boolean)[0];
  if (!slug) {
    document.getElementById('chamberName').textContent = 'Chamber not found';
    return;
  }
  var API = '/' + slug + '/api';
  document.getElementById('loginLink').href = '/' + slug + '/login';
  document.getElementById('backLink').href = '/' + slug;

  fetch(API + '/public/info')
    .then(r => r.json())
    .then(j => {
      if (!j.success || !j.data) return;
      document.title = 'Signup - ' + j.data.name;
      document.getElementById('chamberName').textContent = 'Join ' + j.data.name;
      if (j.data.logo_url) document.getElementById('brandLogo').src = j.data.logo_url;
    })
    .catch(() => {});

  function showMsg(text, kind) {
    var box = document.getElementById('msgBox');
    box.innerHTML = '<div class="msg ' + (kind || 'error') + '">' + text + '</div>';
  }

  if (new URLSearchParams(location.search).get('payment') === 'cancelled') {
    showMsg('Payment cancelled. Complete the form to retry.', 'error');
  }

  document.querySelectorAll('.pw-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var input = document.getElementById(this.dataset.target);
      if (!input) return;
      var showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      this.textContent = showing ? 'Show' : 'Hide';
    });
  });

  function checkMatch() {
    var p1 = document.getElementById('password').value;
    var p2 = document.getElementById('password_confirm').value;
    var box = document.getElementById('pwMismatch');
    if (p2.length === 0) { box.textContent = ''; return true; }
    if (p1 !== p2) { box.textContent = 'Passwords do not match'; return false; }
    box.textContent = '';
    return true;
  }
  document.getElementById('password').addEventListener('input', checkMatch);
  document.getElementById('password_confirm').addEventListener('input', checkMatch);

  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var pw = document.getElementById('password').value;
    var pw2 = document.getElementById('password_confirm').value;
    if (pw !== pw2) {
      document.getElementById('pwMismatch').textContent = 'Passwords do not match';
      return;
    }
    var btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Processing...';
    var body = {
      email: document.getElementById('email').value.trim().toLowerCase(),
      password: pw,
      first_name: document.getElementById('first_name').value.trim(),
      last_name: document.getElementById('last_name').value.trim(),
      country: document.getElementById('country').value.trim() || null,
      sector: document.getElementById('sector').value.trim() || null,
      company_name: document.getElementById('company_name').value.trim() || null
    };
    try {
      var res = await fetch(API + '/auth/signup-member', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      var data = await res.json();
      if (data.success && data.data && data.data.checkout_url) {
        showMsg('Redirecting to Stripe for secure payment...', 'ok');
        try { sessionStorage.setItem('pending_signup_slug', slug); } catch(_) {}
        window.location.href = data.data.checkout_url;
        return;
      }
      showMsg(data.error || 'Could not start checkout');
      btn.disabled = false; btn.textContent = 'Continue to secure checkout';
    } catch(err) {
      showMsg('Connection error. Please try again.');
      btn.disabled = false; btn.textContent = 'Continue to secure checkout';
    }
  });
})();
</script>
</body>
</html>
