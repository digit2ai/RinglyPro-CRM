function esc(s){ return s; }
function render(lang){
  const d = DATA[lang] || DATA.es;
  document.documentElement.lang = lang === 'fil' ? 'tl' : lang;
  document.getElementById('h-title').textContent = d.title;
  document.getElementById('h-tag').textContent = d.tag;
  const toolCards = d.tools.map(t => `<div class="tool"><div class="b">${t[0]}</div><h3>${t[1]}</h3><p>${t[2]}</p></div>`).join('');
  const loopRows = d.loop_steps.map(x => `<div class="row"><div>${x}</div></div>`).join('');
  const numCards = d.nums.map(n => `<div class="num"><div class="big">${n[0]}</div><div class="lab">${n[1]}</div></div>`).join('');
  const rubricRows = d.rubric.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
  const techCards = d.tech.map(t => `<div class="tool"><h3>${t[0]}</h3><p>${t[1]}</p></div>`).join('');
  const roadItems = d.road.map(r => `<li><span class="tag2">${r[0]}</span> ${r[1]}</li>`).join('');
  document.getElementById('content').innerHTML = `
    <section><div class="kick">${d.vision_k}</div><h2>${d.vision_t}</h2><p class="lead">${d.vision_p1}</p><p>${d.vision_p2}</p></section>
    <section><div class="kick">${d.metodo_k}</div><h2>${d.metodo_t}</h2><p>${d.metodo_p1}</p><div class="card"><h3>${d.metodo_pt}</h3><p>${d.metodo_pp}</p></div></section>
    <section><div class="kick">${d.loop_k}</div><h2>${d.loop_t}</h2><p>${d.loop_intro}</p><div class="loop">${loopRows}</div></section>
    <section><div class="kick">${d.tools_k}</div><h2>${d.tools_t}</h2><div class="grid">${toolCards}</div></section>
    <section><div class="kick">${d.assess_k}</div><h2>${d.assess_t}</h2><p>${d.assess_intro}</p><table class="rubric"><tr><th>${d.rubric_h[0]}</th><th>${d.rubric_h[1]}</th></tr>${rubricRows}</table><p style="margin-top:12px">${d.assess_cert}</p></section>
    <section><div class="kick">${d.nums_k}</div><h2>${d.nums_t}</h2><div class="nums">${numCards}</div><p style="margin-top:14px">${d.nums_fam}</p><div class="note">${d.nums_honesty}</div></section>
    <section><div class="kick">${d.tech_k}</div><h2>${d.tech_t}</h2><div class="grid">${techCards}</div></section>
    <section><div class="kick">${d.bridge_k}</div><h2>${d.bridge_t}</h2><p>${d.bridge_p}</p></section>
    <section><div class="kick">${d.road_k}</div><h2>${d.road_t}</h2><ul class="road">${roadItems}</ul></section>`;
  document.getElementById('foot').innerHTML = d.foot;
  document.querySelectorAll('.langbar button').forEach(b => b.classList.toggle('active', b.dataset.l === lang));
  try { localStorage.setItem('torna-lang', lang); } catch(e){}
}
document.querySelectorAll('.langbar button').forEach(b => b.addEventListener('click', () => render(b.dataset.l)));
let start = 'fil';
try { const s = localStorage.getItem('torna-lang'); if (s === 'en' || s === 'es' || s === 'fil') start = s; } catch(e){}
render(start);
</script>
