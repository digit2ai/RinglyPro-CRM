<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Sign NDA &mdash; Digit2AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --panel: #0f1320;
    --panel2: #131827;
    --line: rgba(255,255,255,0.10);
    --line2: rgba(255,255,255,0.18);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --white: #fff;
    --accent: #38bdf8;
    --purple: #7c5cff;
    --teal: #2dd4bf;
    --red: #ef4444;
    --green: #22c55e;
    --gold: #f59e0b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; font-size: 14px; min-height: 100vh;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(7,9,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .brand { font-weight: 700; color: #fff; font-size: 15px; letter-spacing: 0.3px; }
  .brand .grad {
    background: linear-gradient(135deg, var(--purple), var(--teal));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--accent); margin-bottom: 4px; }
  .lead { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .pill {
    display: inline-block; padding: 4px 10px; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; border-radius: 12px;
    background: rgba(56,189,248,0.13); color: var(--accent);
    margin-left: 10px; vertical-align: middle;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 20px; margin-bottom: 18px;
  }
  .card h2 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 10px; letter-spacing: 0.3px; }
  .label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600;
  }
  .input {
    width: 100%; padding: 10px 12px; background: #0b0e18;
    border: 1px solid var(--line2); border-radius: 8px;
    color: var(--text); font-size: 13px; outline: none;
    font-family: inherit;
  }
  .input:focus { border-color: var(--accent); }
  .ro {
    background: #0a0c14; color: #cbd5e1; font-size: 13px;
    padding: 10px 12px; border-radius: 8px; border: 1px solid var(--line);
  }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 640px) { .grid3, .grid2 { grid-template-columns: 1fr; } }
  .nda-pre {
    font-size: 12px; line-height: 1.6;
    white-space: pre-wrap; color: #cbd5e1;
    background: #0a0c14; border: 1px solid var(--line);
    border-radius: 8px; padding: 14px;
    max-height: 320px; overflow-y: auto;
    font-family: 'Inter', sans-serif;
  }
  .nda-pre.full { max-height: none; }
  .read-toggle {
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 12px; font-weight: 600;
  }
  .sig-wrap {
    position: relative; border: 2px dashed var(--line2);
    border-radius: 10px; overflow: hidden; background: #fff;
  }
  .sig-wrap.signed { border-color: var(--green); border-style: solid; }
  .sig-wrap canvas {
    display: block; width: 100%; height: 160px; cursor: crosshair; touch-action: none;
  }
  .sig-placeholder {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    pointer-events: none; color: #94a3b8;
    font-size: 13px; font-style: italic;
  }
  .sig-actions {
    position: absolute; bottom: 8px; right: 8px; display: flex; gap: 8px;
  }
  .sig-actions button {
    font-size: 11px; padding: 4px 10px; border-radius: 4px;
    background: rgba(255,255,255,0.92); border: 1px solid #d1d5db;
    color: #475569; cursor: pointer;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 14px; border: 1px solid transparent;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--purple));
    color: #020617; border: none;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--muted); border-color: var(--line2);
  }
  .alert {
    padding: 12px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 14px;
  }
  .alert.err {
    background: rgba(239,68,68,0.12); color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.35);
  }
  .alert.ok {
    background: rgba(34,197,94,0.12); color: #86efac;
    border: 1px solid rgba(34,197,94,0.35);
  }
  .footer-note {
    font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.6;
  }
  .center-box {
    max-width: 520px; margin: 80px auto; text-align: center; padding: 0 24px;
  }
  .center-box .circle {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(34,197,94,0.15);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .spin {
    width: 40px; height: 40px;
    border: 3px solid rgba(56,189,248,0.25);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ref-id {
    font-family: 'Courier New', monospace;
    color: #fff; background: rgba(255,255,255,0.05);
    padding: 4px 10px; border-radius: 6px;
    display: inline-block; font-size: 13px;
  }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; text-align: left; }
  .summary-grid .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .summary-grid .v { font-size: 14px; color: var(--text); margin-top: 4px; }
  .summary-grid .vsmall { font-size: 12px; color: var(--muted); margin-top: 2px; }
  @media (max-width: 640px) { .summary-grid { grid-template-columns: 1fr; } }
</style>
</head>

    function fitCanvas() {
      var ratio = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.scale(ratio, ratio);
      ctx.strokeStyle = '#0f172a';
      ctx.lineWidth = 2.4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
    fitCanvas();
    window.addEventListener('resize', function(){ /* keep current strokes; do not resize */ });

    function pos(e) {
      var rect = canvas.getBoundingClientRect();
      var src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }
    function start(e) { e.preventDefault(); drawing = true; last = pos(e); }
    function move(e) {
      if (!drawing) return; e.preventDefault();
      var p = pos(e);
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      last = p;
      if (!signed) {
        signed = true; placeholder.style.display = 'none'; wrap.classList.add('signed');
      }
    }
    function end() {
      if (!drawing) return; drawing = false;
      if (signed) state.sigData = canvas.toDataURL('image/png');
    }
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end); canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
    document.getElementById('sig-clear').onclick = function() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      signed = false; state.sigData = null;
      placeholder.style.display = ''; wrap.classList.remove('signed');
    };
  }

  function onSubmit() {
    var name = (document.getElementById('f-name').value || '').trim();
    var title = (document.getElementById('f-title').value || '').trim();
    var company = (document.getElementById('f-company').value || '').trim();
    var alertZone = document.getElementById('alert-zone');
    alertZone.innerHTML = '';
    if (!name || !title || !company) {
      alertZone.innerHTML = '<div class="alert err">' + escHtml(t('errMissingFields')) + '</div>';
      return;
    }
    if (!state.sigData) {
      alertZone.innerHTML = '<div class="alert err">' + escHtml(t('errMissingSig')) + '</div>';
      return;
    }
    var btn = document.getElementById('btn-sign');
    btn.disabled = true; btn.textContent = t('signing');
    fetch(API + '/' + encodeURIComponent(TOKEN) + '/sign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: state.info.stakeholder_email,
        name: name, title: title, company: company,
        signature_data: state.sigData
      })
    }).then(function(r){ return r.json().then(function(j){ return { ok: r.ok, j: j }; }); })
      .then(function(out) {
        if (!out.ok || !out.j.success) {
          alertZone.innerHTML = '<div class="alert err">' + escHtml(out.j.error || t('errGeneric')) + '</div>';
          btn.disabled = false; btn.textContent = t('signBtn');
          return;
        }
        state.result = out.j.data;
        state.submitted = true;
        render();
      })
      .catch(function(err){
        alertZone.innerHTML = '<div class="alert err">' + escHtml(t('errNetwork')) + escHtml(err.message) + '</div>';
        btn.disabled = false; btn.textContent = t('signBtn');
      });
  }

  function load() {
    if (!TOKEN || TOKEN === 'nda') {
      state.error = t('errTokenMissing'); render(); return;
    }
    fetch(API + '/' + encodeURIComponent(TOKEN))
      .then(function(r){ return r.json().then(function(j){ return { ok: r.ok, j: j, status: r.status }; }); })
      .then(function(out) {
        if (!out.ok || !out.j.success) {
          state.error = out.j.error || t('errLinkNotFound');
          render(); return;
        }
        state.info = out.j.data;
        render();
      })
      .catch(function(err) {
        state.error = t('errNetwork') + err.message;
        render();
      });
  }
  load();
})();
</script>
</body>
</html>
