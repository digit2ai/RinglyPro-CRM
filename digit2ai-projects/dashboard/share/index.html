<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Access &mdash; Digit2AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07090f;
            --panel: rgba(255,255,255,0.04);
            --line: rgba(255,255,255,0.10);
            --line2: rgba(255,255,255,0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --white: #fff;
            --purple: #7c5cff;
            --teal: #2dd4bf;
            --red: #ef4444;
            --green: #34d399;
            --gold: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 15px;
            min-height: 100vh;
        }
        .topbar {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: rgba(7,9,15,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
        }
        .brand {
            font-weight: 700;
            color: #fff;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        .brand .grad {
            background: linear-gradient(135deg, var(--purple), var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .who {
            font-size: 12px;
            color: var(--muted);
        }
        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 36px 24px 64px;
        }
        /* Auth gate */
        .gate {
            max-width: 460px;
            margin: 12vh auto 0;
            padding: 36px 32px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
        }
        .gate h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .gate p {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 22px;
            line-height: 1.55;
        }
        .gate label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 0.04em;
        }
        .gate input[type=email] {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--line2);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 16px;
        }
        .gate input[type=email]:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(124,92,255,0.18);
        }
        .gate button {
            width: 100%;
            background: linear-gradient(135deg, var(--purple), #5b3eff);
            border: none;
            color: #fff;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .gate button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124,92,255,0.4);
        }
        .gate button:disabled { opacity: 0.5; cursor: not-allowed; }
        .gate .err {
            background: rgba(239,68,68,0.10);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 12px;
        }
        /* Project view */
        .header {
            margin-bottom: 28px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--line);
        }
        .project-name {
            font-size: clamp(22px, 3vw, 32px);
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.4px;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid var(--line2);
            background: var(--panel);
            color: var(--text);
        }
        .badge.active { color: var(--green); border-color: rgba(52,211,153,0.4); }
        .badge.critical { color: var(--red); border-color: rgba(239,68,68,0.4); }
        .badge.high { color: var(--gold); border-color: rgba(245,158,11,0.4); }
        .section {
            margin-bottom: 26px;
        }
        .section h3 {
            font-size: 11px;
            font-weight: 700;
            color: var(--purple);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .section .body {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 18px 22px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-wrap;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
        }
        .info-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px 18px;
        }
        .info-card .label {
            font-size: 10.5px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .info-card .value {
            font-size: 14px;
            color: var(--white);
            font-weight: 600;
        }
        .milestone {
            display: grid;
            grid-template-columns: 14px 1fr auto;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
            align-items: center;
        }
        .milestone:last-child { border-bottom: none; }
        .ms-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--muted);
        }
        .ms-dot.completed { background: var(--green); }
        .ms-dot.in-progress { background: var(--gold); }
        .ms-title { color: var(--white); font-weight: 600; font-size: 14px; }
        .ms-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .ms-due { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
        .update {
            display: grid;
            grid-template-columns: 14px 1fr;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
        }
        .update:last-child { border-bottom: none; }
        .upd-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--purple);
            margin-top: 6px;
        }
        .upd-author { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
        .upd-text { font-size: 14px; color: var(--text); white-space: pre-wrap; }
        .comment-box {
            margin-top: 18px;
        }
        .comment-box textarea {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--line2);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        .comment-box textarea:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(124,92,255,0.18);
        }
        .comment-box .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .comment-box button {
            background: linear-gradient(135deg, var(--purple), #5b3eff);
            border: none;
            color: #fff;
            padding: 9px 22px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .comment-box button:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; left: 20px;
            max-width: 360px; margin-left: auto;
            background: rgba(15,23,42,0.96);
            border: 1px solid var(--line2);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text);
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.25s, opacity 0.25s;
            z-index: 100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(52,211,153,0.5); color: var(--green); }
        .toast.error { border-color: rgba(239,68,68,0.5); color: #fca5a5; }
        .notes-body { white-space: normal; }
        .notes-body p { margin: 0 0 0.6em; }
        .notes-body p:last-child { margin-bottom: 0; }
        .notes-body h1, .notes-body h2, .notes-body h3, .notes-body h4 {
            color: #fff; font-weight: 700; margin: 0.8em 0 0.4em;
        }
        .notes-body h1 { font-size: 1.4em; }
        .notes-body h2 { font-size: 1.25em; }
        .notes-body h3 { font-size: 1.1em; letter-spacing: 0; text-transform: none; color: #fff; }
        .notes-body ul, .notes-body ol { margin: 0.4em 0 0.6em; padding-left: 1.6em; }
        .notes-body li { margin: 0.2em 0; }
        .notes-body a { color: var(--teal); text-decoration: underline; }
        .notes-body strong, .notes-body b { color: #fff; font-weight: 700; }
        .notes-body em, .notes-body i { font-style: italic; }
        .notes-body code {
            background: rgba(255,255,255,0.08); padding: 1px 6px;
            border-radius: 4px; font-size: 0.92em;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .notes-body pre {
            background: rgba(255,255,255,0.06); border: 1px solid var(--line);
            border-radius: 6px; padding: 10px 12px; overflow-x: auto;
            font-size: 13px; line-height: 1.45; margin: 0.5em 0;
        }
        .notes-body blockquote {
            border-left: 3px solid var(--purple); padding-left: 12px;
            margin: 0.5em 0; color: var(--muted);
        }
        .notes-body img { max-width: 100%; height: auto; border-radius: 6px; margin: 0.4em 0; }
        .notes-body table { border-collapse: collapse; margin: 0.5em 0; }
        .notes-body td, .notes-body th {
            border: 1px solid var(--line2); padding: 6px 10px; font-size: 13px;
        }
        .notes-body hr { border: none; border-top: 1px solid var(--line); margin: 1em 0; }
        /* Kickoff meeting card */
        .meeting-card {
            display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 16px 20px;
        }
        .meeting-when {
            font-size: 15px; font-weight: 700; color: #fff;
        }
        .meeting-meta {
            font-size: 12.5px; color: var(--muted); margin-top: 2px;
        }
        .meeting-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
        .btn-secondary {
            background: rgba(124,92,255,0.14);
            border: 1px solid rgba(124,92,255,0.45);
            color: #d8d0ff;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-secondary:hover:not(:disabled) { background: rgba(124,92,255,0.22); }
        .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-link {
            background: transparent; border: none; color: var(--teal);
            font-size: 12.5px; cursor: pointer; padding: 4px 0; font-family: inherit;
        }
        .slot-row {
            display: grid; grid-template-columns: 1fr auto; gap: 10px;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .slot-row .slot-when { font-size: 13.5px; color: #fff; font-weight: 600; }
        .slot-row .slot-tz { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
        .slot-row button { padding: 7px 14px; font-size: 12px; }
        .slots-help { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
        .meeting-counter {
            font-size: 11px; color: var(--muted); letter-spacing: 0.04em;
            margin-top: 8px;
        }
        .hidden { display: none !important; }
        .empty {
            color: var(--muted);
            font-style: italic;
            font-size: 13px;
        }
        @media (max-width: 600px) {
            .topbar { padding: 12px 16px; }
            .container { padding: 24px 16px 48px; }
            .gate { margin-top: 8vh; padding: 26px 22px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">Digit2AI <span class="grad">Projects</span></div>
    <div class="who" id="whoami"></div>
</div>

<!-- Auth gate -->
<div id="gate" class="gate">
    <h1>Stakeholder Access</h1>
    <p>You've been invited to view a project. To confirm it's you, enter the email this link was sent to.</p>
    <label for="emailInput">Email address</label>
    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    <button id="gateBtn" onclick="identify()">Continue</button>
    <div class="err hidden" id="gateErr"></div>
</div>

<!-- Project view -->
<div id="view" class="container hidden">
    <div class="header">
        <h1 class="project-name" id="projectName">&nbsp;</h1>
        <div class="badges" id="badges"></div>
    </div>

    <div class="info-grid" id="infoGrid"></div>

    <div class="section" id="descSection">
        <h3>Description</h3>
        <div class="body" id="descBody"></div>
    </div>

    <div class="section" id="brSection">
        <h3>Business Requirements</h3>
        <div class="body" id="brBody"></div>
    </div>

    <div class="section hidden" id="meetingSection">
        <h3>Upcoming Meetings</h3>
        <div id="meetingsList"></div>
    </div>

    <div class="section hidden" id="notesSection">
        <h3>Notes</h3>
        <div class="body notes-body" id="notesBody"></div>
    </div>

    <div class="section" id="msSection">
        <h3>Milestones</h3>
        <div class="body" id="msBody"></div>
    </div>

    <div class="section" id="updSection">
        <h3>Updates &amp; Comments</h3>
        <div class="body" id="updBody"></div>
        <div class="comment-box">
            <label for="cmt" style="font-size:12px;color:var(--muted);letter-spacing:0.04em;display:block;margin-bottom:8px;">Add a comment</label>
            <textarea id="cmt" placeholder="Share feedback, ask a question, flag a concern..."></textarea>
            <div class="actions">
                <button id="postBtn" onclick="postComment()">Post Comment</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h3>Next Step</h3>
        <div class="body" id="nextBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
    // Extract token from /share/:token
    const parts = window.location.pathname.split('/').filter(Boolean);
    // Path is /share/{token} OR /projects/share/{token} depending on mount
    const tokenIdx = parts.indexOf('share');
    const TOKEN = tokenIdx >= 0 && parts[tokenIdx + 1] ? parts[tokenIdx + 1] : '';
    let EMAIL = sessionStorage.getItem('d2_share_email_' + TOKEN) || '';

    const apiBase = '/projects/api/v1/projects/share';

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + (type || '');
        clearTimeout(window._toastT);
        window._toastT = setTimeout(() => { t.className = 'toast'; }, 3200);
    }

    async function identify() {
        const email = document.getElementById('emailInput').value.trim();
        const errEl = document.getElementById('gateErr');
        errEl.classList.add('hidden');
        if (!email) {
            errEl.textContent = 'Please enter your email.';
            errEl.classList.remove('hidden');
            return;
        }
        const btn = document.getElementById('gateBtn');
        btn.disabled = true;
        btn.textContent = 'Verifying...';
        try {
            const r = await fetch(`${apiBase}/${TOKEN}/identify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const j = await r.json();
            if (!r.ok || !j.success) {
                errEl.textContent = j.error || 'Could not verify access.';
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Continue';
                return;
            }
            EMAIL = email;
            sessionStorage.setItem('d2_share_email_' + TOKEN, email);
            loadProject();
        } catch (e) {
            errEl.textContent = 'Network error. Please try again.';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Continue';
        }
    }
    window.identify = identify;

    async function loadProject() {
        try {
            const r = await fetch(`${apiBase}/${TOKEN}/data?email=${encodeURIComponent(EMAIL)}`);
            const j = await r.json();
            if (!r.ok || !j.success) {
                // Email was wrong or session went stale — back to gate
                sessionStorage.removeItem('d2_share_email_' + TOKEN);
                EMAIL = '';
                document.getElementById('gate').classList.remove('hidden');
                document.getElementById('view').classList.add('hidden');
                const errEl = document.getElementById('gateErr');
                errEl.textContent = j.error || 'Session expired. Please re-enter your email.';
                errEl.classList.remove('hidden');
                return;
            }
            renderProject(j.data);
            // Fire meetings fetch in parallel — failures are non-fatal
            loadMeetings().catch(() => {});
        } catch (e) {
            showToast('Could not load project: ' + e.message, 'error');
        }
    }

    let MEETINGS_STATE = { meetings: [], is_owner: false, reschedule_cap: 2 };

    async function loadMeetings() {
        try {
            const r = await fetch(`${apiBase}/${TOKEN}/meetings?email=${encodeURIComponent(EMAIL)}`);
            const j = await r.json();
            if (!r.ok || !j.success) {
                document.getElementById('meetingSection').classList.add('hidden');
                return;
            }
            MEETINGS_STATE = j.data || MEETINGS_STATE;
            renderMeetings();
        } catch (e) {
            // Soft fail — no meeting section
        }
    }

    function renderMeetings() {
        const sec = document.getElementById('meetingSection');
        const list = MEETINGS_STATE.meetings || [];
        if (!list.length) {
            sec.classList.add('hidden');
            return;
        }
        sec.classList.remove('hidden');
        const cap = MEETINGS_STATE.reschedule_cap || 2;
        document.getElementById('meetingsList').innerHTML = list.map(m => {
            const label = m.is_kickoff ? 'Kickoff meeting' : (m.title || 'Project meeting');
            const counterText = MEETINGS_STATE.is_owner
                ? `Reschedules used: ${m.reschedule_count} of ${cap}`
                : '';
            const canReschedule = m.can_reschedule;
            const lastChance = m.reschedule_count > 0 && canReschedule;
            return `
                <div class="meeting-card" style="margin-bottom:12px;flex-direction:column;align-items:stretch;gap:10px">
                  <div style="display:flex;flex-wrap:wrap;align-items:center;gap:14px">
                    <div style="flex:1;min-width:200px">
                        <div class="meeting-when">${escHtml(formatMeetingDateTime(m.start_time, m.end_time))}</div>
                        <div class="meeting-meta">${escHtml(label)} &middot; America/Bogota (Cali) time</div>
                    </div>
                    <div class="meeting-actions">
                        ${m.zoom_join_url ? `<a class="btn-link" href="${escAttr(m.zoom_join_url)}" target="_blank" rel="noopener noreferrer">Join Zoom</a>` : ''}
                        ${canReschedule ? `<button class="btn-secondary" data-event="${m.id}" data-action="open">${lastChance ? 'Reschedule (last one)' : 'Reschedule'}</button>` : ''}
                    </div>
                  </div>
                  ${counterText ? `<div class="meeting-counter">${counterText}</div>` : ''}
                  <div class="hidden" id="slotsPanel-${m.id}">
                    <div class="slots-help">Pick a new time. We will move the meeting to the slot you choose and resend the calendar invite.</div>
                    <div id="slotsList-${m.id}"></div>
                    <button class="btn-link" data-event="${m.id}" data-action="cancel" style="margin-top:4px;">Cancel</button>
                  </div>
                </div>
            `;
        }).join('');

        // Wire buttons (avoid inline handlers so the dataset stays clean)
        document.querySelectorAll('#meetingsList button[data-action="open"]').forEach(b => {
            b.addEventListener('click', () => openRescheduleSlots(parseInt(b.dataset.event, 10), b));
        });
        document.querySelectorAll('#meetingsList button[data-action="cancel"]').forEach(b => {
            b.addEventListener('click', () => closeRescheduleSlots(parseInt(b.dataset.event, 10)));
        });
    }

    async function openRescheduleSlots(eventId, btn) {
        if (btn) { btn.disabled = true; btn.textContent = 'Loading slots...'; }
        try {
            const r = await fetch(`${apiBase}/${TOKEN}/meetings/${eventId}/slots?email=${encodeURIComponent(EMAIL)}`);
            const j = await r.json();
            if (!r.ok || !j.success) {
                showToast(j.error || 'Could not load slot options.', 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Reschedule'; }
                return;
            }
            const slots = (j.data && j.data.slots) || [];
            const list = document.getElementById('slotsList-' + eventId);
            if (!list) return;
            list.innerHTML = slots.map((s, i) => `
                <div class="slot-row">
                    <div>
                        <div class="slot-when">${escHtml(formatMeetingDateTime(s.start_time, s.end_time))}</div>
                        <div class="slot-tz">America/Bogota (Cali) time</div>
                    </div>
                    <button class="btn-secondary" data-event="${eventId}" data-i="${i}" data-start="${s.start_time}" data-end="${s.end_time}">Pick this slot</button>
                </div>
            `).join('') || '<div class="empty">No slots available right now. Please contact us directly.</div>';
            list.querySelectorAll('button[data-start]').forEach(b2 => {
                b2.addEventListener('click', () => acceptSlot(eventId, b2.dataset.start, b2.dataset.end, b2));
            });
            const panel = document.getElementById('slotsPanel-' + eventId);
            if (panel) panel.classList.remove('hidden');
            if (btn) btn.style.display = 'none';
        } catch (e) {
            showToast('Network error: ' + e.message, 'error');
            if (btn) { btn.disabled = false; btn.textContent = 'Reschedule'; }
        }
    }

    function closeRescheduleSlots(eventId) {
        const panel = document.getElementById('slotsPanel-' + eventId);
        if (panel) panel.classList.add('hidden');
        const list = document.getElementById('slotsList-' + eventId);
        if (list) list.innerHTML = '';
        // Just re-render to restore the Reschedule button
        renderMeetings();
    }

    async function acceptSlot(eventId, startISO, endISO, buttonEl) {
        if (!confirm('Move this meeting to ' + formatMeetingDateTime(startISO, endISO) + '?')) return;
        const all = document.querySelectorAll('#slotsList-' + eventId + ' button');
        all.forEach(b => { b.disabled = true; });
        if (buttonEl) buttonEl.textContent = 'Updating...';
        try {
            const r = await fetch(`${apiBase}/${TOKEN}/meetings/${eventId}/reschedule`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: EMAIL, start_time: startISO, end_time: endISO })
            });
            const j = await r.json();
            if (!r.ok || !j.success) {
                showToast(j.error || 'Could not reschedule.', 'error');
                all.forEach(b => { b.disabled = false; });
                if (buttonEl) buttonEl.textContent = 'Pick this slot';
                return;
            }
            showToast('Meeting moved. We will send an updated calendar invite shortly.', 'success');
            await loadMeetings();
        } catch (e) {
            showToast('Network error: ' + e.message, 'error');
            all.forEach(b => { b.disabled = false; });
            if (buttonEl) buttonEl.textContent = 'Pick this slot';
        }
    }

    function escAttr(s) { return String(s || '').replace(/"/g, '&quot;'); }

    function formatMeetingDateTime(startISO, endISO) {
        try {
            const opts = { timeZone: 'America/Bogota', weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
            const start = new Date(startISO);
            const startStr = start.toLocaleString(undefined, opts);
            if (endISO) {
                const end = new Date(endISO);
                const endStr = end.toLocaleTimeString(undefined, { timeZone: 'America/Bogota', hour: 'numeric', minute: '2-digit' });
                return `${startStr} – ${endStr}`;
            }
            return startStr;
        } catch (_) {
            return String(startISO);
        }
    }

    function renderProject(p) {
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('view').classList.remove('hidden');
        document.getElementById('whoami').textContent = EMAIL;
        document.getElementById('projectName').textContent = p.name || 'Untitled';

        // Badges
        const badges = [];
        if (p.status) badges.push(`<span class="badge ${p.status}">${p.status}</span>`);
        if (p.priority) badges.push(`<span class="badge ${p.priority}">${p.priority}</span>`);
        if (p.company && p.company.name) badges.push(`<span class="badge">${escHtml(p.company.name)}</span>`);
        if (p.vertical && p.vertical.name) badges.push(`<span class="badge">${escHtml(p.vertical.name)}</span>`);
        document.getElementById('badges').innerHTML = badges.join('');

        // Info grid
        const info = [];
        if (p.due_date) info.push(['Due', formatDate(p.due_date)]);
        if (p.stage) info.push(['Stage', p.stage]);
        if (p.target_delivery_weeks) info.push(['Delivery', p.target_delivery_weeks + ' weeks']);
        if (p.target_total_usd) info.push(['Total', '$' + Number(p.target_total_usd).toLocaleString()]);
        document.getElementById('infoGrid').innerHTML = info.length
            ? info.map(([l, v]) => `<div class="info-card"><div class="label">${l}</div><div class="value">${escHtml(v)}</div></div>`).join('')
            : '';

        // Description
        if (p.description) {
            document.getElementById('descBody').textContent = p.description;
            document.getElementById('descSection').classList.remove('hidden');
        } else {
            document.getElementById('descSection').classList.add('hidden');
        }

        // Business Requirements
        if (p.business_requirements) {
            document.getElementById('brBody').textContent = p.business_requirements;
            document.getElementById('brSection').classList.remove('hidden');
        } else {
            document.getElementById('brSection').classList.add('hidden');
        }

        // Notes (rich text — sanitize HTML before rendering)
        if (p.notes && String(p.notes).trim()) {
            const html = renderNotesHtml(p.notes);
            document.getElementById('notesBody').innerHTML = sanitizeHtml(html);
            document.getElementById('notesSection').classList.remove('hidden');
        } else {
            document.getElementById('notesSection').classList.add('hidden');
        }

        // Milestones
        const msList = Array.isArray(p.milestones) ? p.milestones : [];
        const msBody = document.getElementById('msBody');
        if (msList.length) {
            msBody.innerHTML = msList.map(m => `
                <div class="milestone">
                    <div class="ms-dot ${m.status || ''}"></div>
                    <div>
                        <div class="ms-title">${escHtml(m.title || m.name || 'Untitled milestone')}</div>
                        ${m.status ? `<div class="ms-meta">${escHtml(m.status)}</div>` : ''}
                    </div>
                    <div class="ms-due">${m.due_date ? formatDate(m.due_date) : ''}</div>
                </div>
            `).join('');
        } else {
            msBody.innerHTML = '<div class="empty">No milestones yet.</div>';
        }

        // Updates
        const updList = Array.isArray(p.updates) ? p.updates : [];
        const updBody = document.getElementById('updBody');
        if (updList.length) {
            updBody.innerHTML = updList.map(u => `
                <div class="update">
                    <div class="upd-dot"></div>
                    <div>
                        <div class="upd-author">${escHtml(u.author || 'Team')} &middot; ${u.created_at ? formatDate(u.created_at) : ''}</div>
                        <div class="upd-text">${escHtml(u.text || '')}</div>
                    </div>
                </div>
            `).join('');
        } else {
            updBody.innerHTML = '<div class="empty">No updates yet.</div>';
        }

        // Next step
        document.getElementById('nextBody').textContent = p.next_step || 'No next step defined yet.';
    }

    async function postComment() {
        const ta = document.getElementById('cmt');
        const message = ta.value.trim();
        if (!message) return;
        const btn = document.getElementById('postBtn');
        btn.disabled = true;
        btn.textContent = 'Posting...';
        try {
            const r = await fetch(`${apiBase}/${TOKEN}/comment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: EMAIL, message })
            });
            const j = await r.json();
            if (!r.ok || !j.success) {
                showToast(j.error || 'Could not post comment.', 'error');
                btn.disabled = false;
                btn.textContent = 'Post Comment';
                return;
            }
            ta.value = '';
            showToast('Comment posted. Manuel will be notified.', 'success');
            await loadProject();
        } catch (e) {
            showToast('Network error: ' + e.message, 'error');
        }
        btn.disabled = false;
        btn.textContent = 'Post Comment';
    }
    window.postComment = postComment;

    function escHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // Backward-compat for Notes: plain text -> escape + br; HTML stays as HTML.
    function renderNotesHtml(s) {
        if (!s) return '';
        const looksLikeHtml = /<[a-z][\s\S]*>/i.test(s);
        if (looksLikeHtml) return s;
        return escHtml(s).replace(/\n/g, '<br>');
    }

    // Strict allowlist sanitizer for the Notes section. Strips <script>,
    // <iframe>, event handlers, javascript: urls, and any tag not on the
    // safe list. Operates on a detached DOM so unparsed content cannot
    // execute. Admin authors notes, stakeholders view them — defense in
    // depth in case admin pastes malicious markup from a 3rd-party source.
    function sanitizeHtml(dirty) {
        if (!dirty) return '';
        const ALLOWED_TAGS = new Set([
            'A','B','I','U','S','STRONG','EM','P','BR','HR','SPAN','DIV',
            'H1','H2','H3','H4','H5','H6',
            'UL','OL','LI',
            'BLOCKQUOTE','PRE','CODE','KBD',
            'TABLE','THEAD','TBODY','TFOOT','TR','TD','TH',
            'IMG','SUB','SUP','MARK','SMALL','DEL','INS'
        ]);
        const ALLOWED_ATTRS = {
            'A': ['href','title','target','rel'],
            'IMG': ['src','alt','title','width','height'],
            '*': ['style']  // allowed but filtered below
        };
        const SAFE_PROTOCOL = /^(https?:|mailto:|tel:|#|\/)/i;
        // Block dangerous CSS: url(javascript:), expression(), behavior:, -moz-binding
        const UNSAFE_CSS = /(javascript|expression|behavior|-moz-binding|url\s*\(\s*['"]?\s*javascript)/i;

        const doc = new DOMParser().parseFromString(`<div>${dirty}</div>`, 'text/html');
        const root = doc.body.firstChild;

        const walk = (node) => {
            const children = Array.from(node.childNodes);
            for (const child of children) {
                if (child.nodeType === 1) { // ELEMENT
                    const tag = child.tagName;
                    if (!ALLOWED_TAGS.has(tag)) {
                        // Unwrap unknown tags: preserve text children, drop the wrapper
                        while (child.firstChild) node.insertBefore(child.firstChild, child);
                        node.removeChild(child);
                        continue;
                    }
                    // Strip all attributes except those on the per-tag allowlist
                    const allowed = (ALLOWED_ATTRS[tag] || []).concat(ALLOWED_ATTRS['*'] || []);
                    for (const attr of Array.from(child.attributes)) {
                        const name = attr.name.toLowerCase();
                        if (name.startsWith('on') || !allowed.includes(name)) {
                            child.removeAttribute(attr.name);
                            continue;
                        }
                        if ((name === 'href' || name === 'src') && !SAFE_PROTOCOL.test(attr.value.trim())) {
                            child.removeAttribute(attr.name);
                            continue;
                        }
                        if (name === 'style' && UNSAFE_CSS.test(attr.value)) {
                            child.removeAttribute(attr.name);
                            continue;
                        }
                    }
                    // Force external links to open safely
                    if (tag === 'A' && child.getAttribute('href')) {
                        child.setAttribute('target', '_blank');
                        child.setAttribute('rel', 'noopener noreferrer');
                    }
                    walk(child);
                } else if (child.nodeType === 8) { // COMMENT
                    node.removeChild(child);
                }
                // TEXT nodes are kept as-is
            }
        };
        walk(root);
        return root.innerHTML;
    }
    function formatDate(d) {
        try { return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
        catch (_) { return String(d); }
    }

    // Enter key submits identify
    document.getElementById('emailInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') identify();
    });

    // Boot: if we have a stored email, try to load the project directly
    if (!TOKEN) {
        document.getElementById('gate').innerHTML = '<h1>Invalid link</h1><p>This URL is missing a token. Please use the link sent to you.</p>';
    } else if (EMAIL) {
        loadProject();
    }
})();
</script>
