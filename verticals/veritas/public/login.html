<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veritas — Iniciar sesión</title>
<link rel="icon" type="image/svg+xml" href="/veritas/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{--navy-900:#06102f;--navy-800:#0b1a47;--navy-700:#102258;--yellow:#ffcb05;--yellow-deep:#f5b900;--red:#ce1126;--text:#f6f8ff;--muted:#a9b4d6;--border:#1e2740;--cyan:#22d3ee;--violet:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--navy-900);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(ellipse 50% 60% at 85% 10%, rgba(255,122,0,.18) 0%, transparent 60%),
  radial-gradient(ellipse 50% 50% at 12% 85%, rgba(206,17,38,.15) 0%, transparent 60%)}
.card{position:relative;z-index:1;width:100%;max-width:400px;background:linear-gradient(160deg,var(--navy-800),var(--navy-900));border:1px solid var(--border);border-radius:18px;padding:34px 30px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
.mark{width:40px;height:40px;border-radius:10px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,203,5,.4),0 0 14px rgba(255,122,0,.25)}
.mark svg{display:block;width:100%;height:100%}
.brand .t{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:.02em}
.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:26px;text-transform:uppercase;letter-spacing:.12em;font-weight:700}
label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;background:var(--navy-700);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:10px;font-family:inherit;font-size:15px}
input:focus{outline:none;border-color:var(--yellow)}
button{width:100%;margin-top:24px;background:var(--yellow);color:var(--navy-900);border:none;padding:14px;border-radius:10px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;transition:background .15s,transform .15s}
button:hover{background:var(--yellow-deep);transform:translateY(-1px)}
button:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{margin-top:14px;color:#ff9aa6;font-size:13px;text-align:center;min-height:18px}
.foot{text-align:center;margin-top:22px;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.foot strong{color:var(--text)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="mark"><svg viewBox="0 0 40 40" aria-hidden="true"><defs><radialGradient id="d" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#0b1f3a"/><stop offset="1" stop-color="#05101f"/></radialGradient><linearGradient id="s" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffcb05" stop-opacity="0"/><stop offset="1" stop-color="#ffcb05" stop-opacity=".9"/></linearGradient></defs><rect width="40" height="40" fill="#05101f"/><circle cx="20" cy="20" r="17.5" fill="url(#d)"/><g stroke="#ffcb05" stroke-opacity=".28" fill="none" stroke-width="1"><circle cx="20" cy="20" r="6"/><circle cx="20" cy="20" r="11.5"/><circle cx="20" cy="20" r="17"/><line x1="3" y1="20" x2="37" y2="20"/><line x1="20" y1="3" x2="20" y2="37"/></g><g><path d="M20 20 L20 2.5 A17.5 17.5 0 0 1 35.2 11.5 Z" fill="url(#s)"/><line x1="20" y1="20" x2="20" y2="2.5" stroke="#ffe27a" stroke-width="1.3"/><animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="2.6s" repeatCount="indefinite"/></g></svg></span>
    <span class="t">Veritas</span>
  </div>
  <div class="sub">Consola de Protección</div>

  <form id="loginForm" autocomplete="on">
    <label for="email">Correo</label>
    <input id="email" type="email" placeholder="usuario@digit2ai.com" autocomplete="username" required />
    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
    <button id="btn" type="submit">Iniciar sesión</button>
    <div class="err" id="err"></div>
  </form>

  <div class="foot">Defensores de la Patria · <a href="https://digit2ai.com" target="_blank" rel="noopener" style="color:inherit"><strong>DIGIT2AI</strong></a></div>
</div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('btn');
const err = document.getElementById('err');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Verificando…';
  try {
    const r = await fetch('/veritas/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const j = await r.json();
    if (r.ok && j.success) {
      window.location.href = '/veritas/';
    } else {
      err.textContent = j.error || 'No se pudo iniciar sesión';
      btn.disabled = false; btn.textContent = 'Iniciar sesión';
    }
  } catch (e) {
    err.textContent = 'Error de conexión';
    btn.disabled = false; btn.textContent = 'Iniciar sesión';
  }
});
</script>
</body>
</html>
